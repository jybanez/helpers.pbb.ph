<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Assignments Demo</title>
  <link rel='stylesheet' href='../css/demo/demo.shell.css'>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }
    .controls,
    .panel {
      border: 1px solid #263146;
      border-radius: 10px;
      background: #111826;
      padding: 14px;
    }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .controls select {
      border-radius: 8px;
      border: 1px solid #334563;
      background: #0b1423;
      color: #d7e0f4;
      padding: 6px 8px;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    h1, h2 {
      margin: 0 0 10px;
      font-weight: 600;
    }
    .log {
      margin: 0;
      white-space: pre-wrap;
      font-size: 12px;
      color: #b2c2e5;
      font-family: Consolas, "Courier New", monospace;
      height: 220px;
      overflow-y: auto;
      overflow-x: auto;
    }
    .back {
      color: #b2c2e5;
      text-decoration: none;
      font-size: 13px;
    }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["incident.base", "incident.teams.assignments"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Team Assignments",
      overview: "Incident-domain assignment helper for dispatching teams, progressing assignment status, editing contact/notes, and viewing assignment state.",
      useWhen: [
        "Use <code>incidentTeamsAssignments(...)</code> when a PBB incident workflow needs editable or read-only dispatch assignment surfaces.",
        "Use it when the app should reuse the shared team picker drawer, assignment timeline, and resource-allocation rows."
      ],
      avoidWhen: [
        "Do not treat this as a generic team-management or staffing helper outside the incident domain.",
        "Do not replace the shared assignment editor/viewer with app-local timeline, cancel, or dispatch markup."
      ],
      description: "This helper owns the list shell, team-selection drawer, per-assignment timeline/status controls, and editable assignment sub-rows. The app still owns team catalogs, confirmation rules, persistence, and post-action workflow decisions.",
      sectionSamples: {
        "editable team assignments": `const assignmentsApi = incidentTeamsAssignments(host, incidentState, {\n  incident_id: incidentState.id,\n  operator_id: currentOperatorId,\n  categories: incidentCategories,\n  teams,\n  editable: true,\n  onAssignTeam(assignment) {\n    persistAssignment(assignment);\n  },\n  onItemChange(nextItem, meta) {\n    queueAutosave(nextItem, meta);\n  },\n  onChange(nextList, meta) {\n    renderPreview(nextList, meta);\n  },\n});`,
        "read-only team assignments": `incidentTeamsAssignments(host, incidentState, {\n  incident_id: incidentState.id,\n  operator_id: currentOperatorId,\n  categories: incidentCategories,\n  teams,\n  editable: false,\n});`
      },
      defaultSampleCode: `const assignmentsApi = incidentTeamsAssignments(host, incidentState, {\n  incident_id: incidentState.id,\n  operator_id: currentOperatorId,\n  categories: incidentCategories,\n  teams,\n  editable: true,\n  onItemChange(nextItem, meta) {\n    queueAutosave(nextItem, meta);\n  },\n  onChange(nextList, meta) {\n    renderPreview(nextList, meta);\n  },\n});`,
      constructor: [
        { factory: "<code>incidentTeamsAssignments(container, data, options)</code>", arguments: "assignment host, incident/assignment data, and domain options", returns: "Team-assignment list instance with drawer, list, and lifecycle methods" }
      ],
      options: [
        { option: "<code>incident_id</code>", default: "<code>required</code>", description: "Incident identifier required to create and normalize assignment payloads." },
        { option: "<code>operator_id</code>", default: "<code>required</code>", description: "Current operator identifier recorded on new assignments." },
        { option: "<code>categories</code>", default: "<code>[]</code>", description: "Incident-category list used to group/filter teams in the dispatch drawer." },
        { option: "<code>teams</code>", default: "<code>[]</code>", description: "Available team catalog used by the dispatch drawer and assignment cards." },
        { option: "<code>noticeAlreadyExist</code>", default: "<code>required</code>", description: "Duplicate-assignment notice hook used when a selected team is already dispatched." },
        { option: "<code>editable</code>", default: "<code>true</code>", description: "Switches between editable assignment cards and read-only viewer cards." },
        { option: "<code>headerText</code>", default: "<code>\"Dispatch Details\"</code>", description: "Header title shown above the assignment list." },
        { option: "<code>drawerHeaderText</code>", default: "<code>\"Select Teams to Dispatch\"</code>", description: "Drawer title used by the team-selection surface." },
        { option: "<code>theme</code>", default: "<code>\"dark\"</code>", description: "Applies the helper theme variant to the list shell and item cards." },
        { option: "<code>onOpenDrawer</code>", default: "<code>undefined</code>", description: "Called when the dispatch drawer opens." },
        { option: "<code>onCloseDrawer</code>", default: "<code>undefined</code>", description: "Called when the dispatch drawer closes." },
        { option: "<code>onAssignTeam</code>", default: "<code>undefined</code>", description: "Receives a normalized assignment payload when a team is dispatched from the drawer." },
        { option: "<code>onItemChange</code>", default: "<code>undefined</code>", description: "Normalized post-mutation hook that receives the candidate next assignment item plus a small <code>meta</code> reason payload." },
        { option: "<code>onChange</code>", default: "<code>undefined</code>", description: "Normalized post-mutation hook that receives the candidate next assignment list plus the same <code>meta</code> payload." },
        { option: "<code>confirmStatus</code>", default: "<code>undefined</code>", description: "Async or sync confirmation gate before progressing an assignment status." },
        { option: "<code>confirmCancel</code>", default: "<code>undefined</code>", description: "Async or sync confirmation gate before cancelling an assignment." },
        { option: "<code>confirmDelete</code>", default: "<code>undefined</code>", description: "Async or sync confirmation gate before deleting an assignment." },
        { option: "<code>confirmContactEdit</code>", default: "<code>window.confirm(...)</code>", description: "Editable-only confirmation gate before unlocking contact-person editing." },
        { option: "<code>onStatusNext</code>", default: "<code>undefined</code>", description: "Editable-only hook when status advances to the next step." },
        { option: "<code>onCancel</code>", default: "<code>undefined</code>", description: "Editable-only hook when an assignment is cancelled." },
        { option: "<code>onDelete</code>", default: "<code>undefined</code>", description: "Editable-only hook when an assignment is deleted." },
        { option: "<code>onContactChange</code>", default: "<code>undefined</code>", description: "Editable-only hook when the contact person changes." },
        { option: "<code>onNoteAdd</code>", default: "<code>undefined</code>", description: "Editable-only hook for adding assignment notes." },
        { option: "<code>onAllocateChange</code>", default: "<code>undefined</code>", description: "Editable-only hook for team resource allocation changes." }
      ],
      events: [
        { event: "<code>onOpenDrawer()</code>", arguments: "none", returns: "<code>void</code>" },
        { event: "<code>onCloseDrawer()</code>", arguments: "none", returns: "<code>void</code>" },
        { event: "<code>onAssignTeam(assignment)</code>", arguments: "normalized assignment payload for the selected team", returns: "<code>void</code>" },
        { event: "<code>onItemChange(nextItem, meta)</code>", arguments: "candidate next assignment plus a normalized mutation meta payload such as <code>{ reason: \"status\" }</code>", returns: "<code>void</code>" },
        { event: "<code>onChange(nextList, meta)</code>", arguments: "candidate next assignment list plus the same normalized mutation meta payload", returns: "<code>void</code>" },
        { event: "<code>onStatusNext(assignmentId, nextStatus)</code>", arguments: "assignment id and next timeline status", returns: "<code>void</code>" },
        { event: "<code>onCancel(assignmentId, fromStatus, reasonCode, reasonNote)</code>", arguments: "assignment id, current status, cancellation reason code, and note", returns: "<code>void</code>" },
        { event: "<code>onDelete(assignmentId)</code>", arguments: "assignment id", returns: "<code>void</code>" },
        { event: "<code>onContactChange(assignmentId, value)</code>", arguments: "assignment id and next contact-person value", returns: "<code>void</code>" },
        { event: "<code>onNoteAdd(assignmentId, note)</code>", arguments: "assignment id and note payload", returns: "<code>void</code>" },
        { event: "<code>onAllocateChange(assignmentId, resourceTypeId, allocated)</code>", arguments: "assignment id, resource type id, and next allocated quantity", returns: "<code>void</code>" }
      ],
      propertiesText: "The instance tracks normalized assignment <code>list</code> data, merged <code>options</code>, and current <code>drawerState</code>. Individual assignment cards keep domain details such as dispatch status, contact person, notes, cancellation metadata, and resource allocations. Aggregate state is available through <code>getData()</code> and <code>getState()</code>. Unsaved rows retain a stable <code>_client_key</code> for host-side reconciliation.",
      methods: [
        { method: "<code>update(nextData, nextOptions)</code>", arguments: "replacement assignment data and optional option patch", returns: "<code>void</code>" },
        { method: "<code>setList(items)</code>", arguments: "replacement assignment array", returns: "<code>void</code>" },
        { method: "<code>getData()</code>", arguments: "none", returns: "Current normalized assignment array" },
        { method: "<code>getState()</code>", arguments: "none", returns: "List, merged options, and drawer state" },
        { method: "<code>destroy()</code>", arguments: "none", returns: "<code>void</code>" }
      ]
    };
  </script>
  <script type='module' src='../js/demo/demo.shell.js'></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page">
    <section class="controls">
      <a class="back" href="./index.html">← Back to Home</a>
      <label for="sampleSelect">Sample</label>
      <select id="sampleSelect"></select>
      <label for="themeSelect">Theme</label>
      <select id="themeSelect">
        <option value="dark" selected>dark</option>
        <option value="light">light</option>
      </select>
      <label>
        <input id="debugToggle" type="checkbox">
        debug
      </label>
    </section>

    <section class="panel">
      <h1>Team Assignments Demo</h1>
      <p>Left is editable. Right mirrors left as read-only via <code>setList(items[])</code>.</p>
    </section>

    <section class="layout">
      <article class="panel">
        <h2>Editable Team Assignments</h2>
        <div id="teamsAssignmentsEditable"></div>
      </article>
      <article class="panel">
        <h2>Read-only Team Assignments</h2>
        <div id="teamsAssignmentsReadonly"></div>
      </article>
    </section>

    <section class="panel">
      <h2>Editor Events</h2>
      <pre id="eventLog" class="log">No events yet.</pre>
    </section>
  </main>

  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    await window.__demoLoaderReady;
    const incidentBase = await uiLoader.get("incident.base");
    const incidentTeamsAssignments = await uiLoader.get("incident.teams.assignments");

    const sampleSelect = document.getElementById("sampleSelect");
    const themeSelect = document.getElementById("themeSelect");
    const debugToggle = document.getElementById("debugToggle");
    const eventLog = document.getElementById("eventLog");
    const sampleCandidates = [
      "sampledata_1.json",
      "sampledata_2.json",
      "sampledata_6.json",
      "sampledata_7.json",
      "sampledata_15.json",
      "sampledata_16.json",
      "sampledata.json"
    ];

    async function fetchJson(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`Failed to load ${path}`);
      }
      return response.json();
    }

    function addEvent(message, payload) {
      const line = `[${new Date().toISOString()}] ${message}\n${JSON.stringify(payload, null, 2)}\n`;
      eventLog.textContent = eventLog.textContent === "No events yet."
        ? line
        : `${line}\n${eventLog.textContent}`;
    }

    async function main() {
      const [
        teamStatuses,
        incidentStatuses,
        alertLevels,
        incidentTypesLookup,
        incidentCategories,
        teams,
        resourceTypes,
        operators
      ] = await Promise.all([
        fetchJson("../boot.team.assignment.status.json"),
        fetchJson("../boot.incident.status.json"),
        fetchJson("../boot.alert.levels.json"),
        fetchJson("../boot.incident.types.json"),
        fetchJson("../boot.incident.categories.json"),
        fetchJson("../boot.teams.json"),
        fetchJson("../boot.resource.types.json"),
        fetchJson("../boot.operators.json")
      ]);

      const lookups = {
        teamStatuses,
        incidentStatuses,
        alertLevels,
        incidentTypes: incidentTypesLookup,
        incidentCategories,
        teams,
        resourceTypes,
        operators
      };

      let theme = "dark";
      let debug = false;
      const nowIso = () => new Date().toISOString();
      let incidentState = {};
      let listState = [];

      const baseApi = incidentBase(document.createElement("div"), {}, { lookups, debug });
      window.hhIncident = { baseApi };

      function updateListItem(assignmentId, patch) {
        listState = listState.map((item) =>
          item.id === assignmentId || (!item.id && item.team_id === patch.team_id)
            ? { ...item, ...patch }
            : item
        );
        incidentState.team_assignments = listState;
      }

      function removeListItem(assignmentId) {
        listState = listState.filter((item) => item.id !== assignmentId);
        incidentState.team_assignments = listState;
      }

      function getEditableOptions() {
        return {
          theme,
          debug,
          lookups,
          incident_id: incidentState?.id ?? 0,
          operator_id: 3,
          categories: incidentCategories,
          teams,
          editable: true,
          headerText: "Dispatch Details (Editable)",
          drawerHeaderText: "Select Teams to Dispatch",
          noticeAlreadyExist(team) {
            window.alert(`${team.name} is already assigned.`);
          },
          onOpenDrawer() {
            addEvent("incidentTeamsAssignments.onOpenDrawer", {});
          },
          onCloseDrawer() {
            addEvent("incidentTeamsAssignments.onCloseDrawer", {});
          },
          onAssignTeam(assignment) {
            const withMeta = {
              ...assignment,
              id: Date.now(),
              team: teams.find((t) => String(t.id) === String(assignment.team_id)),
              notes_log: [],
              allocated_resources: []
            };
            listState = [...listState, withMeta];
            incidentState.team_assignments = listState;
            addEvent("incidentTeamsAssignments.onAssignTeam", withMeta);
            syncColumns();
          },
          onItemChange(nextItem, meta) {
            addEvent("incidentTeamsAssignments.onItemChange", { nextItem, meta });
          },
          onChange(nextList, meta) {
            addEvent("incidentTeamsAssignments.onChange", {
              meta,
              count: nextList.length,
              keys: nextList.map((item) => item.id ?? item._client_key ?? item.team_id ?? null)
            });
          },
          confirmStatus(toStatus) {
            return window.confirm(`Confirm move to ${toStatus}?`);
          },
          confirmCancel(fromStatus, reasonCode, reasonNote) {
            return window.confirm(
              `Confirm cancellation from ${fromStatus}?\nReason: ${reasonCode}\nDetails: ${reasonNote || "-"}`
            );
          },
          confirmDelete() {
            return window.confirm("Confirm delete assignment?");
          },
          onStatusNext(assignmentId, toStatus) {
            const patch = { status: toStatus };
            if (toStatus === "accepted") patch.accepted_at = nowIso();
            if (toStatus === "on_scene") patch.arrived_at = nowIso();
            if (toStatus === "completed") patch.completed_at = nowIso();
            updateListItem(assignmentId, patch);
            addEvent("incidentTeamsAssignmentsEditor.onStatusNext", { assignmentId, toStatus });
            syncColumns();
          },
          onCancel(assignmentId, fromStatus, reasonCode, reasonNote) {
            updateListItem(assignmentId, {
              status: "cancelled",
              cancelled_from_status: fromStatus,
              cancel_reason_code: reasonCode,
              cancel_reason_note: reasonNote || null,
              cancelled_at: nowIso()
            });
            addEvent("incidentTeamsAssignmentsEditor.onCancel", {
              assignmentId,
              fromStatus,
              reasonCode,
              reasonNote
            });
            syncColumns();
          },
          onDelete(assignmentId) {
            addEvent("incidentTeamsAssignmentsEditor.onDelete", { assignmentId });
            removeListItem(assignmentId);
            syncColumns();
          },
          onContactChange(assignmentId, value) {
            updateListItem(assignmentId, { contact_person: value });
            addEvent("incidentTeamsAssignmentsEditor.onContactChange", { assignmentId, value });
            syncReadonlyOnly();
          },
          onNoteAdd(assignmentId, note) {
            const item = listState.find((row) => row.id === assignmentId) || {};
            const notes = Array.isArray(item.notes_log) ? [...item.notes_log] : [];
            notes.push({
              id: Date.now(),
              team_assignment_id: assignmentId,
              operator_id: item.assigned_by_operator_id || null,
              note,
              created_at: nowIso()
            });
            updateListItem(assignmentId, { notes_log: notes });
            addEvent("incidentTeamsAssignmentsEditor.onNoteAdd", { assignmentId, note });
            syncColumns();
          },
          onAllocateChange(assignmentId, resourceTypeId, allocated) {
            const item = listState.find((row) => row.id === assignmentId) || {};
            const allocations = Array.isArray(item.allocated_resources) ? [...item.allocated_resources] : [];
            const idx = allocations.findIndex((item) => item.resource_type_id === resourceTypeId);
            const nextRow = { resource_type_id: resourceTypeId, quantity_allocated: allocated };
            if (idx >= 0) {
              allocations[idx] = nextRow;
            } else {
              allocations.push(nextRow);
            }
            updateListItem(assignmentId, { allocated_resources: allocations });
            addEvent("incidentTeamsAssignmentsEditor.onAllocateChange", {
              assignmentId,
              resourceTypeId,
              allocated
            });
            syncColumns();
          }
        };
      }

      function getReadonlyOptions() {
        return {
          theme,
          debug,
          lookups,
          incident_id: incidentState?.id ?? 0,
          operator_id: 3,
          categories: incidentCategories,
          teams,
          editable: false,
          headerText: "Dispatch Details (Read-only)",
          drawerHeaderText: "Select Teams to Dispatch",
          noticeAlreadyExist() {}
        };
      }

      async function initSamplePicker() {
        const availability = await Promise.all(
          sampleCandidates.map(async (name) => {
            try {
              await fetchJson(`../samples/${name}`);
              return name;
            } catch (error) {
              return null;
            }
          })
        );
        const available = availability.filter(Boolean);
        if (!available.length) {
          throw new Error("No sampledata_*.json files could be loaded.");
        }
        sampleSelect.innerHTML = "";
        available.forEach((name) => {
          const option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          sampleSelect.appendChild(option);
        });
        sampleSelect.value = available.includes("sampledata_16.json")
          ? "sampledata_16.json"
          : available[0];
      }

      async function applySample(sampleFile) {
        const samplePayload = await fetchJson(`../samples/${sampleFile}`);
        incidentState = structuredClone(samplePayload?.incident || {});
        listState = structuredClone(incidentState.team_assignments || []);
        editableApi.update({ team_assignments: listState }, getEditableOptions());
        readonlyApi.update({ team_assignments: listState }, getReadonlyOptions());
        syncColumns();
        addEvent("demo.sample.change", {
          sample: sampleFile,
          incident_id: incidentState?.id,
          team_assignments: listState.length
        });
      }

      await initSamplePicker();

      const editableApi = incidentTeamsAssignments(
        document.getElementById("teamsAssignmentsEditable"),
        { team_assignments: [] },
        getEditableOptions()
      );
      const readonlyApi = incidentTeamsAssignments(
        document.getElementById("teamsAssignmentsReadonly"),
        { team_assignments: [] },
        getReadonlyOptions()
      );

      function syncColumns() {
        editableApi.setList(listState);
        readonlyApi.setList(listState);
      }

      function syncReadonlyOnly() {
        readonlyApi.setList(listState);
      }

      function rerenderAll() {
        editableApi.update({ team_assignments: listState }, getEditableOptions());
        readonlyApi.update({ team_assignments: listState }, getReadonlyOptions());
      }

      themeSelect.addEventListener("change", () => {
        theme = themeSelect.value;
        rerenderAll();
      });

      debugToggle.addEventListener("change", () => {
        debug = debugToggle.checked;
        rerenderAll();
      });

      sampleSelect.addEventListener("change", () => {
        applySample(sampleSelect.value).catch((error) => {
          console.error(error);
          addEvent("demo.sample.change.error", {
            sample: sampleSelect.value,
            message: error.message
          });
        });
      });

      await applySample(sampleSelect.value);
      window.hhIncident.instances = [editableApi, readonlyApi];
    }

    main().catch((error) => {
      console.error(error);
      eventLog.textContent = `Failed to initialize demo.\n${error.message}`;
    });
  </script>
</body>
</html>
