<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empty State Demo</title>
  <link rel='stylesheet' href='../css/demo/demo.shell.css'>
  <style>
    body { margin: 0; padding: 24px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .page { max-width: 980px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid #263146; border-radius: 10px; background: #111826; padding: 14px; display: grid; gap: 10px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .back { color: #b2c2e5; text-decoration: none; font-size: 13px; }
    .host-shell { border: 1px solid #2b3750; border-radius: 8px; padding: 10px; background: #0b1220; display: grid; gap: 10px; }
    .log { margin: 0; white-space: pre-wrap; font-size: 12px; color: #b2c2e5; font-family: Consolas, "Courier New", monospace; border: 1px solid #2b3750; border-radius: 8px; background: #0b1220; padding: 10px; height: 220px; overflow: auto; }
    .incident-list { display: grid; gap: 8px; }
    .incident-list-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .incident-list-title { margin: 0; font-size: 16px; }
    .incident-list-item { border: 1px solid #2b3750; border-radius: 8px; padding: 10px; background: #111b2f; display: grid; gap: 4px; }
    .incident-list-meta { color: #9fb2d8; font-size: 12px; }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.empty.state", "ui.dom"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Empty State",
      overview: "Standardized empty, error, and no-results presentation block for shared product surfaces.",
      useWhen: [
        "Use <code>createEmptyState(...)</code> when lists or views need consistent empty/error/no-result messaging.",
        "Use it to keep placeholder treatment aligned across projects."
      ],
      avoidWhen: [
        "Do not use it when the surface needs highly task-specific recovery actions or long explanatory content.",
        "Do not use it as a substitute for loading placeholders; use <code>createSkeleton(...)</code>."
      ],
      description: "Empty-state handling is a consistency problem more than a rendering problem. This helper standardizes the common placeholder cases so teams do not keep reinventing them.",
      sectionSamples: {
        "framed": `createEmptyState(host, {\n  title: "No incidents found",\n  description: "Try a different search or clear filters.",\n});`,
        "chrome-less": `createEmptyState(host, data, {\n  chrome: false,\n});`
      },
      constructor: [
        { factory: "<code>createEmptyState(container, data, options)</code>", arguments: "container, empty-state data, options", returns: "Empty-state instance" }
      ],
      methods: [
        { method: "<code>setData(data)</code>", arguments: "new state payload", returns: "<code>void</code>" },
        { method: "<code>update(nextOptions)</code>", arguments: "partial options", returns: "<code>void</code>" },
        { method: "<code>destroy()</code>", arguments: "none", returns: "<code>void</code>" }
      ]
    };
  </script>
  <script type='module' src='../js/demo/demo.shell.js'></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">← Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
      </div>
      <h1 class="ui-title">Empty State Demo</h1>
    </section>
    <section class="panel">
      <h2 class="ui-title">Framed</h2>
      <div id="host" class="host-shell"></div>
    </section>
    <section class="panel">
      <h2 class="ui-title">Chrome-less</h2>
      <div class="host-shell">
        <div id="hostChromeLess"></div>
      </div>
    </section>
    <section class="panel">
      <h2 class="ui-title">Event Log</h2>
      <pre id="log" class="log">No events yet.</pre>
    </section>
  </main>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    await window.__demoLoaderReady;
    const createEmptyState = await uiLoader.get("ui.empty.state");
    const clearNode = await uiLoader.get("ui.dom.clearNode");
    const createElement = await uiLoader.get("ui.dom.createElement");

    const page = document.querySelector("main.page");
    const host = document.getElementById("host");
    const hostChromeLess = document.getElementById("hostChromeLess");
    const log = document.getElementById("log");
    let emptyState = null;
    let emptyStateChromeLess = null;
    const sampleIncidents = [
      { id: 1016, caller: "Maria Santos", location: "Guadalupe", status: "Active", createdAt: "2026-03-08 22:13" },
      { id: 1017, caller: "Juan Dela Cruz", location: "Talamban", status: "Dispatched", createdAt: "2026-03-08 22:17" },
      { id: 1018, caller: "Ana Torres", location: "Lahug", status: "On Scene", createdAt: "2026-03-08 22:21" },
    ];

    function writeLog(label, payload) {
      const line = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(payload ?? {}, null, 2)}\n`;
      log.textContent = log.textContent === "No events yet." ? line : `${line}\n${log.textContent}`;
    }

    function mountEmptyState(data = {}) {
      clearNode(host);
      emptyState?.destroy?.();
      emptyState = createEmptyState(host, {
        title: data.title || "No linked incidents",
        description: data.description || "Try widening your date range or clear active filters.",
        iconHtml: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M7 10h10M9 14h6M5 18h14"/></svg>',
        actions: [
          { id: "reset", label: "Reset Filters" },
          { id: "refresh", label: "Refresh" },
          { id: "sample", label: "Load Sample Data" },
        ],
      }, {
        onActionClick(action) {
          writeLog("emptyState.action", action);
          if (action.id === "reset") {
            mountEmptyState({
              title: "Filters cleared",
              description: "All active filters were reset. Try refreshing or load sample data.",
            });
            return;
          }
          if (action.id === "sample") {
            mountSampleData();
            return;
          }
          if (action.id === "refresh") {
            emptyState.update({
              title: "Refreshing...",
              description: "Checking for newly linked incidents.",
              actions: [],
            });
            window.setTimeout(() => {
              mountSampleData();
              writeLog("emptyState.refresh.complete", { status: "results_found", count: sampleIncidents.length });
            }, 800);
          }
        },
      });

      clearNode(hostChromeLess);
      emptyStateChromeLess?.destroy?.();
      emptyStateChromeLess = createEmptyState(hostChromeLess, {
        title: "No linked incidents",
        description: "Same component with chrome disabled so the host layout owns the framing.",
        iconHtml: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M7 10h10M9 14h6M5 18h14"/></svg>',
        actions: [
          { id: "sample", label: "Load Sample Data" },
        ],
      }, {
        chrome: false,
        onActionClick(action) {
          writeLog("emptyStateChromeLess.action", action);
          if (action.id === "sample") {
            renderSampleResults();
          }
        },
      });
    }

    function mountSampleData() {
      clearNode(host);
      emptyState?.destroy?.();
      emptyState = null;
      const wrap = createElement("section", { className: "incident-list" });
      const head = createElement("div", { className: "incident-list-head" });
      head.append(
        createElement("h3", { className: "incident-list-title", text: `Linked incidents (${sampleIncidents.length})` }),
        createElement("button", { className: "ui-button", text: "Back To Empty", attrs: { type: "button" } }),
      );
      wrap.appendChild(head);
      sampleIncidents.forEach((incident) => {
        const item = createElement("article", { className: "incident-list-item" });
        item.append(
          createElement("strong", { text: `#${incident.id} · ${incident.status}` }),
          createElement("span", { text: `${incident.caller} · ${incident.location}` }),
          createElement("span", { className: "incident-list-meta", text: `Created: ${incident.createdAt}` }),
        );
        wrap.appendChild(item);
      });
      const backBtn = head.querySelector("button");
      backBtn.addEventListener("click", () => {
        writeLog("sampleData.backToEmpty", {});
        mountEmptyState();
      });
      host.appendChild(wrap);
      writeLog("sampleData.loaded", { count: sampleIncidents.length });
    }

    mountEmptyState();
    document.getElementById("themeToggle").addEventListener("click", () => {
      const next = page.dataset.theme === "dark" ? "light" : "dark";
      page.dataset.theme = next;
      writeLog("theme.toggle", { theme: next });
    });
  </script>
</body>
</html>
