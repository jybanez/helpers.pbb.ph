<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infrastructure Damage Field Group Preset Demo</title>
  <link rel="stylesheet" href="../css/demo/demo.shell.css">
  <style>
    body { margin: 0; padding: 24px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .page { max-width: 1180px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid #263146; border-radius: 8px; background: #111826; padding: 14px; display: grid; gap: 12px; }
    .row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
    .back { color: #b2c2e5; text-decoration: none; font-size: 13px; }
    .muted { margin: 0; color: #9fb2d8; font-size: 13px; line-height: 1.45; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(300px, 380px); gap: 14px; align-items: start; }
    .stack { display: grid; gap: 12px; }
    .log, pre:not(.log) { margin: 0; white-space: pre-wrap; font-size: 12px; font-family: Consolas, "Courier New", monospace; border: 1px solid #2b3750; border-radius: 8px; background: #0b1220; padding: 10px; overflow: auto; }
    .log { min-height: 260px; color: #b2c2e5; }
    @media (max-width: 920px) { .layout { grid-template-columns: 1fr; } }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.field.group", "ui.field.group.presets"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Infrastructure Damage Field Group Preset",
      overview: "Focused reference for repeatable damaged infrastructure records.",
      useWhen: ["Use <code>fieldGroupPresets.infrastructureDamage()</code> for roads, bridges, utilities, facilities, communications, and other damaged assets."],
      avoidWhen: ["Use <code>shelterDamage()</code> for residential/shelter impact and displaced family counts."],
      description: "The infrastructure damage preset captures asset type, name/location, damage level, operational status, and estimated affected users. It exposes SITREP hints for damaged infrastructure and impassable roads/bridges.",
      defaultSampleCode: `const group = createFieldGroup(host, {
  name: "damaged_infrastructure",
  ...fieldGroupPresets.infrastructureDamage({ label: "Damaged Infrastructure" }),
  value: [{
    asset_type: "Bridge",
    name_location: "North Creek Bridge",
    damage_level: "Major",
    operational_status: "Not usable",
    estimated_affected_users: "1200"
  }]
});`,
      constructor: [{ factory: "<code>fieldGroupPresets.infrastructureDamage(options?)</code>", arguments: "optional preset overrides", returns: "Plain repeatable field-group config for <code>createFieldGroup(...)</code>" }],
      options: [
        { option: "<code>label</code>", default: "<code>\"Infrastructure Damage\"</code>", description: "Visible group label." },
        { option: "<code>repeatable</code>", default: "<code>true</code>", description: "Returns an array value by default." },
        { option: "<code>config_json.preset</code>", default: "<code>undefined</code>", description: "JSON <code>{ \"preset\": \"infrastructureDamage\", \"repeatable\": true }</code> resolves the preset without duplicated <code>fields[]</code>." }
      ],
      properties: [
        { property: "<code>sitrep</code>", type: "<code>Array</code>", description: "<code>damaged_infrastructure_count</code>, <code>impassable_roads_bridges</code>." },
        { property: "<code>asset_type.options</code>", type: "<code>Array</code>", description: "Includes road, bridge, power, water, school, health facility, government facility, communications, and other." }
      ],
      events: [
        { event: "<code>onChange(value, meta)</code>", arguments: "<code>value</code> array, validation metadata", returns: "Provided to <code>createFieldGroup(...)</code>, not the preset factory." }
      ],
      methods: [
        { method: "<code>getValue()</code>", arguments: "none", returns: "Array of infrastructure damage objects." },
        { method: "<code>setValue(value)</code>", arguments: "array of infrastructure damage objects", returns: "<code>void</code>" },
        { method: "<code>validate()</code>", arguments: "none", returns: "<code>{ status, errors }</code>" }
      ]
    };
    window.fieldGroupPresetDemo = {
      presetKey: "infrastructureDamage",
      name: "damaged_infrastructure",
      label: "Damaged Infrastructure",
      initialValue: [{ asset_type: "Bridge", name_location: "North Creek Bridge", damage_level: "Major", operational_status: "Not usable", estimated_affected_users: "1200" }],
      sampleValue: [{ asset_type: "Water", name_location: "Pump Station 2", damage_level: "Partial", operational_status: "Limited", estimated_affected_users: "430" }]
    };
  </script>
  <script type="module" src="../js/demo/demo.shell.js"></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
      </div>
      <h1 class="ui-title">Infrastructure Damage Preset</h1>
      <p class="muted">Repeatable damaged asset entries for operational reporting.</p>
    </section>
    <section class="panel">
      <h2 class="ui-title">Damaged Infrastructure</h2>
      <div class="layout">
        <div class="stack">
          <div id="presetHost"></div>
          <div class="row">
            <button id="sampleBtn" class="ui-button" type="button">Set Sample</button>
            <button id="clearBtn" class="ui-button ui-button-ghost" type="button">Clear</button>
            <button id="validateBtn" class="ui-button ui-button-ghost" type="button">Validate</button>
          </div>
          <pre id="presetSchema"></pre>
        </div>
        <div class="stack">
          <pre id="presetLog" class="log">No changes yet.</pre>
          <button id="snapshotBtn" class="ui-button ui-button-ghost" type="button">Snapshot</button>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="../js/demo/demo.field.group.preset.js"></script>
</body>
</html>
