<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Demo</title>
  <link rel='stylesheet' href='../css/demo/demo.shell.css'>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }
    .panel {
      border: 1px solid #263146;
      border-radius: 10px;
      background: #111826;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .back {
      color: #b2c2e5;
      text-decoration: none;
      font-size: 13px;
    }
    #timelineHostVertical,
    #timelineHostHorizontal,
    #timelineHostCustom {
      border: 1px solid #2b3750;
      border-radius: 8px;
      padding: 10px;
      background: #0b1220;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
    }
    .log {
      margin: 0;
      white-space: pre-wrap;
      font-size: 12px;
      color: #b2c2e5;
      font-family: Consolas, "Courier New", monospace;
      border: 1px solid #2b3750;
      border-radius: 8px;
      background: #0b1220;
      padding: 10px;
      height: 220px;
      overflow-y: auto;
      overflow-x: auto;
    }
    .ui-timeline-item.is-active .ui-timeline-body {
      border-color: #7bb5ff;
      box-shadow: 0 0 0 1px rgba(123, 181, 255, 0.35), 0 0 14px rgba(89, 144, 224, 0.18);
    }
    .ui-timeline--horizontal .ui-timeline-item.is-active {
      border-color: #7bb5ff;
      box-shadow: 0 0 0 1px rgba(123, 181, 255, 0.35), 0 0 14px rgba(89, 144, 224, 0.18);
    }
    .timeline-call-card {
      display: grid;
      gap: 8px;
      border: 1px solid #2b4770;
      border-radius: 8px;
      background: #0b1424;
      padding: 10px;
    }
    .timeline-call-card strong,
    .timeline-call-card p {
      margin: 0;
    }
    .timeline-call-card p {
      color: #9fb2d8;
      font-size: 13px;
    }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.timeline"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Timeline",
      overview: "Timeline helper for event chronology, horizontal milestones, grouped logs, and lifecycle-managed custom item content.",
      useWhen: [
        "Use <code>createTimeline(...)</code> for ordered event history.",
        "Use custom content slots when a timeline row needs to host a nested Helper or app component."
      ],
      avoidWhen: [
        "Do not use it for full calendar scheduling; use <code>createScheduler(...)</code>.",
        "Do not use it for playback-range controls; use the dedicated Timeline Scrubber demo."
      ],
      description: "The timeline helper is meant for chronology, not generic record listing. This page focuses on event rendering, item actions, horizontal/vertical presentation, and custom row content lifecycle.",
      sectionSamples: {
        "vertical (grouped)": `createTimeline(host, items, {\n  orientation: "vertical",\n  groupByDate: true,\n});`,
        "horizontal": `createTimeline(host, items, {\n  orientation: "horizontal",\n});`,
        "custom content": `const timeline = createTimeline(host, items, {\n  mountItemContent(slot, item, context) {\n    if (item.type !== "call_session") return null;\n    const card = document.createElement("div");\n    slot.appendChild(card);\n    renderCallCard(card, item);\n    return {\n      update(nextItem) { renderCallCard(card, nextItem); },\n      destroy() { stopNestedPlayback(item.id); },\n    };\n  },\n});`
      },
      constructor: [
        { factory: "<code>createTimeline(container, items, options)</code>", arguments: "container, timeline items, options", returns: "Timeline instance" }
      ],
      options: [
        { option: "<code>orientation</code>", default: "<code>\"vertical\"</code>", description: "Timeline layout direction.", values: ["vertical", "horizontal"] },
        { option: "<code>density</code>", default: "<code>\"comfortable\"</code>", description: "Item spacing preset.", values: ["comfortable", "compact"] },
        { option: "<code>groupByDate</code>", default: "<code>true</code>", description: "Groups vertical timeline items under date labels." },
        { option: "<code>showConnector</code>", default: "<code>true</code>", description: "Shows connector lines between adjacent timeline items." },
        { option: "<code>linkedRange</code>", default: "<code>null</code>", description: "Filters visible items by relative timestamp range using <code>{ startMs, endMs, anchorMs? }</code>." },
        { option: "<code>includeUndatedInRange</code>", default: "<code>false</code>", description: "Keeps undated items visible while a linked range is active." },
        { option: "<code>mountItemContent</code>", default: "<code>null</code>", description: "Optional lifecycle hook for mounting app/helper content inside an item slot." },
        { option: "<code>onItemClick</code>", default: "<code>null</code>", description: "Called when a timeline item is activated outside nested custom content." },
        { option: "<code>onActionClick</code>", default: "<code>null</code>", description: "Called when an item action button is clicked." },
        { option: "<code>ariaLabel</code>", default: "<code>\"Timeline\"</code>", description: "Accessible label for the timeline region." }
      ],
      propertiesText: "Timeline items use stable <code>id</code> values for updates and lifecycle tracking. Common item fields are <code>timestamp</code>, <code>title</code>, <code>subtitle</code>, <code>description</code>, <code>status</code>, <code>meta</code>, <code>actions</code>, and <code>iconHtml</code>. Custom content can use app-owned fields such as <code>type</code>, media payloads, or structured metadata because unknown fields are preserved through normalization. Use optional <code>contentKey</code> to force a custom slot remount when the nested content identity changes, and <code>hasCustomContent: false</code> to skip slot mounting for a known plain item.",
      properties: [
        { property: "<code>item.id</code>", type: "<code>string | number</code>", description: "Stable item identity; required for reliable custom-content lifecycle preservation." },
        { property: "<code>item.contentKey</code>", type: "<code>string</code>", description: "Optional custom-content identity paired with <code>id</code>; changing it destroys and remounts the slot." },
        { property: "<code>item.actions</code>", type: "<code>Array&lt;{ id, label, className? }&gt;</code>", description: "Helper-rendered item action buttons that call <code>onActionClick</code>." },
        { property: "<code>custom lifecycle handle</code>", type: "<code>Function | { update?, destroy? }</code>", description: "Return value from <code>mountItemContent</code>. Functions are treated as destroy callbacks; objects can update preserved content and clean up on removal." }
      ],
      events: [
        { event: "<code>onItemClick</code>", arguments: "<code>item</code>", returns: "App-owned selection/navigation behavior." },
        { event: "<code>onActionClick</code>", arguments: "<code>action, item</code>", returns: "App-owned action handling for helper-rendered item buttons." },
        { event: "<code>mountItemContent</code>", arguments: "<code>host, item, context</code>", returns: "Mounts nested content; may return a disposer or lifecycle handle." },
        { event: "<code>customHandle.update</code>", arguments: "<code>nextItem, context</code>", returns: "Called when the same <code>id/contentKey</code> remains present across timeline updates." },
        { event: "<code>customHandle.destroy</code>", arguments: "none", returns: "Called when an item is removed, filtered out, remounted by <code>contentKey</code>, or the timeline is destroyed." }
      ],
      methods: [
        { method: "<code>update(nextItems, nextOptions?)</code>", arguments: "timeline items and optional options", returns: "<code>void</code>" },
        { method: "<code>append(items)</code>", arguments: "items to add after the current list", returns: "<code>void</code>" },
        { method: "<code>prepend(items)</code>", arguments: "items to add before the current list", returns: "<code>void</code>" },
        { method: "<code>setLinkedRange(range)</code>", arguments: "<code>{ startMs, endMs, anchorMs? } | null</code>", returns: "<code>void</code>" },
        { method: "<code>getState()</code>", arguments: "none", returns: "Normalized options, all items, and currently visible items" },
        { method: "<code>destroy()</code>", arguments: "none", returns: "<code>void</code>" }
      ]
    };
  </script>
  <script type='module' src='../js/demo/demo.shell.js'></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page" data-theme="dark">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">← Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
      </div>
      <h1 class="ui-title">Timeline Demo</h1>
      <p>Dedicated demo for timeline rendering and custom item content.</p>
    </section>

    <section class="panel">
      <h2 class="ui-title">Vertical (Grouped)</h2>
      <div id="timelineHostVertical"></div>
    </section>

    <section class="panel">
      <h2 class="ui-title">Horizontal</h2>
      <div id="timelineHostHorizontal"></div>
    </section>

    <section class="panel">
      <h2 class="ui-title">Custom Content</h2>
      <div class="row">
        <button id="timelineCustomUpdateBtn" class="ui-button" type="button">Update Content</button>
        <button id="timelineCustomRemountBtn" class="ui-button ui-button-ghost" type="button">Remount Content</button>
        <button id="timelineCustomRemoveBtn" class="ui-button ui-button-borderless" type="button">Remove Call Item</button>
      </div>
      <div id="timelineHostCustom"></div>
    </section>

    <section class="panel">
      <h2 class="ui-title">Event Log</h2>
      <pre id="log" class="log" tabindex="0" aria-label="Timeline event log">No events yet.</pre>
    </section>
  </main>

  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    await window.__demoLoaderReady;
    const createTimeline = await uiLoader.get("ui.timeline");

    const page = document.querySelector("main.page");
    const log = document.getElementById("log");
    const verticalHost = document.getElementById("timelineHostVertical");
    const horizontalHost = document.getElementById("timelineHostHorizontal");
    const customHost = document.getElementById("timelineHostCustom");

    function writeLog(label, payload) {
      const line = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(payload ?? {}, null, 2)}\n`;
      log.textContent = log.textContent === "No events yet." ? line : `${line}\n${log.textContent}`;
    }

    document.getElementById("themeToggle").addEventListener("click", () => {
      const next = page.dataset.theme === "dark" ? "light" : "dark";
      page.dataset.theme = next;
      writeLog("theme.toggle", { theme: next });
    });

    const timelineItems = [
      {
        id: 1,
        timestamp: "2026-03-09T08:04:00+08:00",
        title: "Call Received",
        subtitle: "Caller connected to hotline",
        description: "Initial intake completed by operator level 1.",
        status: "accepted",
        meta: ["Hotline", "Inbound"],
      },
      {
        id: 2,
        timestamp: "2026-03-09T08:07:00+08:00",
        title: "Dispatch Requested",
        subtitle: "Fire team assignment created",
        description: "Team marked as requested and awaiting acceptance.",
        status: "requested",
        meta: ["Dispatch", "Team Alpha"],
        actions: [{ id: "open", label: "Open" }],
      },
      {
        id: 3,
        timestamp: "2026-03-09T08:13:00+08:00",
        title: "Team On Scene",
        subtitle: "Responder arrived at location",
        description: "Situation stable; collecting additional details.",
        status: "on_scene",
        meta: ["On Scene"],
      },
      {
        id: 4,
        timestamp: "2026-03-07T21:50:00+08:00",
        title: "Prior Incident Linked",
        subtitle: "Historical record attached",
        description: "Previous report was associated for reference.",
        status: "completed",
        meta: ["Linked"],
      },
    ];
    let customRevision = 1;
    let customContentKey = "media-a";
    let customItems = buildCustomItems();

    const vertical = createTimeline(verticalHost, timelineItems, {
      ariaLabel: "Vertical incident timeline",
      orientation: "vertical",
      groupByDate: true,
      onItemClick(item) {
        writeLog("timeline.vertical.item.click", { id: item.id, title: item.title });
      },
      onActionClick(action, item) {
        writeLog("timeline.vertical.action.click", { actionId: action.id, itemId: item.id });
      },
    });

    const horizontal = createTimeline(horizontalHost, timelineItems, {
      ariaLabel: "Horizontal incident timeline",
      orientation: "horizontal",
      groupByDate: false,
      density: "compact",
      onItemClick(item) {
        writeLog("timeline.horizontal.item.click", { id: item.id, title: item.title });
      },
    });

    function buildCustomItems(includeCall = true) {
      const items = [];
      if (includeCall) {
        items.push({
          id: "call-session-42",
          contentKey: customContentKey,
          type: "call_session",
          timestamp: "2026-03-09T08:18:00+08:00",
          title: "Call Session Recording",
          subtitle: "Caller and operator media",
          description: "Custom content is mounted below this fixed timeline body.",
          status: "accepted",
          customRevision,
          callerLabel: `Caller audio rev ${customRevision}`,
          operatorLabel: `Operator audio rev ${customRevision}`,
        });
      }
      items.push({
        id: "note-custom",
        timestamp: "2026-03-09T08:16:00+08:00",
        title: "Plain timeline item",
        subtitle: "No custom content",
        status: "completed",
      });
      return items;
    }

    function renderCallCard(card, item) {
      card.className = "timeline-call-card";
      card.innerHTML = "";
      const title = document.createElement("strong");
      title.textContent = `Mounted AudioCallSession placeholder (${item.contentKey})`;
      const caller = document.createElement("p");
      caller.textContent = item.callerLabel;
      const operator = document.createElement("p");
      operator.textContent = item.operatorLabel;
      const control = document.createElement("button");
      control.type = "button";
      control.className = "ui-button ui-button-quiet";
      control.textContent = "Nested Control";
      control.addEventListener("click", () => {
        writeLog("timeline.custom.nested.click", { itemId: item.id, contentKey: item.contentKey });
      });
      card.append(title, caller, operator, control);
    }

    const customTimeline = createTimeline(customHost, customItems, {
      ariaLabel: "Timeline custom content demo",
      orientation: "vertical",
      groupByDate: false,
      onItemClick(item) {
        writeLog("timeline.custom.item.click", { id: item.id, title: item.title });
      },
      mountItemContent(slot, item, context) {
        if (item.type !== "call_session") {
          return null;
        }
        const card = document.createElement("div");
        slot.appendChild(card);
        renderCallCard(card, item);
        writeLog("timeline.custom.mount", { id: item.id, contentKey: item.contentKey, index: context.index });
        return {
          update(nextItem) {
            renderCallCard(card, nextItem);
            writeLog("timeline.custom.update", { id: nextItem.id, contentKey: nextItem.contentKey, revision: nextItem.customRevision });
          },
          destroy() {
            writeLog("timeline.custom.destroy", { id: item.id, contentKey: item.contentKey });
          },
        };
      },
    });

    document.getElementById("timelineCustomUpdateBtn").addEventListener("click", () => {
      customRevision += 1;
      customItems = buildCustomItems();
      customTimeline.update(customItems);
    });
    document.getElementById("timelineCustomRemountBtn").addEventListener("click", () => {
      customRevision += 1;
      customContentKey = customContentKey === "media-a" ? "media-b" : "media-a";
      customItems = buildCustomItems();
      customTimeline.update(customItems);
    });
    document.getElementById("timelineCustomRemoveBtn").addEventListener("click", () => {
      customItems = buildCustomItems(false);
      customTimeline.update(customItems);
    });

    // keep refs alive for debugging in console
    window.timelineDemo = { vertical, horizontal, customTimeline };
  </script>
</body>
</html>
