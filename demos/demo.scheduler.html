<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheduler Demo</title>
  <link rel='stylesheet' href='../css/demo/demo.shell.css'>
  <style>
    body { margin: 0; padding: 24px; background: var(--demo-bg, var(--ui-bg, #0c1017)); color: var(--demo-text, var(--ui-text, #d7e0f4)); font-family: var(--ui-font, "Segoe UI", Tahoma, Geneva, Verdana, sans-serif); }
    .page { max-width: 1200px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid var(--demo-border, var(--ui-border, #263146)); border-radius: 10px; background: var(--demo-panel-bg, var(--ui-bg-soft, #111826)); padding: 14px; display: grid; gap: 10px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .back { color: var(--demo-muted, var(--ui-muted, #b2c2e5)); text-decoration: none; font-size: 13px; }
    .host-shell { border: 1px solid var(--demo-border, var(--ui-border, #2b3750)); border-radius: 8px; padding: 10px; background: var(--demo-surface-bg, var(--ui-bg, #0b1220)); display: grid; gap: 10px; }
    .log { margin: 0; white-space: pre-wrap; font-size: 12px; color: var(--demo-code-text, var(--ui-text, #b2c2e5)); font-family: Consolas, "Courier New", monospace; border: 1px solid var(--demo-border, var(--ui-border, #2b3750)); border-radius: 8px; background: var(--demo-code-bg, var(--ui-bg, #0b1220)); padding: 10px; height: 220px; overflow: auto; }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.scheduler"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Scheduler",
      overview: "Month/week scheduling surface for time slots and scheduled events.",
      useWhen: [
        "Use <code>createScheduler(...)</code> when the user needs to see slot-based planning in calendar form.",
        "Use it for event placement and inspection rather than free-form Kanban movement."
      ],
      avoidWhen: [
        "Do not use it for task boards; use <code>createKanban(...)</code>.",
        "Do not use it for simple date picking; use <code>createDatepicker(...)</code>."
      ],
      description: "The scheduler sits between a picker and a full calendar system. It is appropriate for operational planning surfaces where slots and event summaries matter more than document-heavy record editing.",
      sectionSamples: {
        "framed": `const scheduler = createScheduler(host, data, {\n  chrome: true,\n  onSlotClick(slot) {\n    writeLog("scheduler.slot", slot);\n  },\n});`,
        "chrome-less": `createScheduler(host, data, {\n  chrome: false,\n  view: "week",\n});`
      },
      constructor: [
        { factory: "<code>createScheduler(container, data, options)</code>", arguments: "<code>container</code>, scheduler <code>data</code>, <code>options</code>", returns: "Scheduler instance" }
      ],
      options: [
        { option: "<code>view</code>", default: "documented default", description: "Initial scheduler view such as month or week." },
        { option: "<code>onSlotClick</code>", default: "<code>null</code>", description: "Handles slot selection." },
        { option: "<code>onEventClick</code>", default: "<code>null</code>", description: "Handles event selection." }
      ],
      events: [
        { event: "<code>onSlotClick</code>", arguments: "slot payload", returns: "No return effect" },
        { event: "<code>onEventClick</code>", arguments: "event payload", returns: "No return effect" }
      ],
      methods: [
        { method: "<code>setData(data)</code>", arguments: "scheduler data", returns: "<code>void</code>" },
        { method: "<code>update(nextOptions)</code>", arguments: "partial options", returns: "<code>void</code>" },
        { method: "<code>destroy()</code>", arguments: "none", returns: "<code>void</code>" }
      ]
    };
  </script>
  <script type='module' src='../js/demo/demo.shell.js'></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page">
    <section class="panel">
      <h1 class="ui-title">Scheduler Demo</h1>
      <p>Month and week calendar primitives with event/slot callbacks.</p>
    </section>

    <section class="panel">
      <h2 class="ui-title">Framed</h2>
      <div id="host"></div>
    </section>

    <section class="panel">
      <h2 class="ui-title">Chrome-less</h2>
      <div class="host-shell">
        <div id="hostChromeLess"></div>
      </div>
    </section>

    <section class="panel">
      <h2 class="ui-title">Event Log</h2>
      <pre id="log" class="log">No events yet.</pre>
    </section>
  </main>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    await window.__demoLoaderReady;
    const createScheduler = await uiLoader.get("ui.scheduler");

    const log = document.getElementById("log");
    const now = new Date();
    const pad = (value) => String(value).padStart(2, "0");
    const dateAt = (days, hour = 9, minute = 0) => {
      const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() + days, hour, minute, 0, 0);
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:00`;
    };

    function writeLog(label, payload) {
      const line = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(payload ?? {}, null, 2)}\n`;
      log.textContent = log.textContent === "No events yet." ? line : `${line}\n${log.textContent}`;
    }

    const schedulerData = {
      date: now,
      events: [
        { id: "e-1", title: "Morning Briefing", start: dateAt(-1, 8, 30), color: "#4f89ff" },
        { id: "e-2", title: "Responder Dispatch", start: dateAt(0, 10, 0), color: "#2abf7b" },
        { id: "e-3", title: "Operator Training", start: dateAt(2, 14, 0), color: "#ffb347" },
        { id: "e-4", title: "Resource Audit", start: dateAt(3, 16, 0), color: "#ff6a89" },
      ],
    };

    const scheduler = createScheduler(document.getElementById("host"), schedulerData, {
      view: "month",
      weekStartsOn: 1,
      onViewChange(view) {
        writeLog("scheduler.view", { view });
      },
      onDateChange(date) {
        writeLog("scheduler.date", { date: date.toISOString() });
      },
      onSlotClick(slot) {
        writeLog("scheduler.slot", { date: slot.date.toISOString(), view: slot.view });
      },
      onEventClick(entry) {
        writeLog("scheduler.event", { id: entry.id, title: entry.title, start: entry.start.toISOString() });
      },
    });

    const schedulerChromeLess = createScheduler(document.getElementById("hostChromeLess"), schedulerData, {
      view: "week",
      weekStartsOn: 1,
      chrome: false,
      onViewChange(view) {
        writeLog("schedulerChromeLess.view", { view });
      },
      onDateChange(date) {
        writeLog("schedulerChromeLess.date", { date: date.toISOString() });
      },
      onSlotClick(slot) {
        writeLog("schedulerChromeLess.slot", { date: slot.date.toISOString(), view: slot.view });
      },
      onEventClick(entry) {
        writeLog("schedulerChromeLess.event", { id: entry.id, title: entry.title, start: entry.start.toISOString() });
      },
    });

    window.schedulerDemo = { scheduler, schedulerChromeLess };
  </script>
</body>
</html>
