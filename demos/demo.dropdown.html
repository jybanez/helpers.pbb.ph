<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown Demo</title>
  <link rel='stylesheet' href='../css/demo/demo.shell.css'>
  <style>
    body { margin: 0; padding: 24px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .page { max-width: 980px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid #263146; border-radius: 10px; background: #111826; padding: 14px; display: grid; gap: 12px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .back { color: #b2c2e5; text-decoration: none; font-size: 13px; }
    .muted { margin: 0; color: #9fb2d8; font-size: 13px; line-height: 1.45; }
    .preview { border: 1px solid #2b3750; border-radius: 10px; padding: 18px; background: #0b1220; min-height: 120px; display: grid; place-items: start; }
    .log, pre:not(.log) { margin: 0; white-space: pre-wrap; font-size: 12px; font-family: Consolas, "Courier New", monospace; border: 1px solid #2b3750; border-radius: 8px; background: #0b1220; padding: 10px; overflow: auto; }
    .log { min-height: 220px; color: #b2c2e5; }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.dropdown"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Dropdown",
      overview: "Bottom-anchored menu wrapper over the shared menu core.",
      useWhen: [
        "Use <code>createDropdown(...)</code> when the trigger should open a menu below itself.",
        "Use it instead of rebuilding menu placement logic for action buttons or compact overflow controls."
      ],
      avoidWhen: [
        "Do not use it when the surface is actually a navbar or sidebar; use the proper navigation helper.",
        "Do not bypass the shared menu API with hand-positioned overlays for the same interaction."
      ],
      description: "Dropdown is a thin wrapper over <code>createMenu(...)</code>. Its only behavioral change is the default vertical placement (<code>bottom-start</code>) plus the <code>align</code> shortcut that resolves to <code>bottom-start</code> or <code>bottom-end</code>.",
      defaultSampleCode: `const dropdown = createDropdown(trigger, items, {
  align: "right",
  closeOnSelect: true,
  onSelect(item, meta) {
    writeLog("dropdown.select", { item, meta });
  },
});`,
      constructor: [
        { factory: "<code>createDropdown(triggerEl, items, options)</code>", arguments: "trigger element, menu items, menu options", returns: "Dropdown instance" }
      ],
      options: [
        { option: "<code>align</code>", default: "<code>\"left\"</code>", description: "Shortcut alignment for dropdown placement.", values: ["left", "right"] },
        { option: "<code>placement</code>", default: "<code>\"bottom-start\"</code>", description: "Explicit placement override passed through to the menu core." },
        { option: "<code>offset</code>", default: "<code>6</code>", description: "Pixel gap between trigger and menu." },
        { option: "<code>ariaLabel</code>", default: "<code>\"Menu\"</code>", description: "Accessible label for the menu surface." },
        { option: "<code>closeOnSelect</code>", default: "<code>true</code>", description: "Close after selecting an item.", values: ["true", "false"] },
        { option: "<code>closeOnOutsideClick</code>", default: "<code>true</code>", description: "Close when the user clicks away.", values: ["true", "false"] },
        { option: "<code>closeOnEscape</code>", default: "<code>true</code>", description: "Close on Escape.", values: ["true", "false"] },
        { option: "<code>matchTriggerWidth</code>", default: "<code>false</code>", description: "Match menu width to trigger width.", values: ["true", "false"] },
        { option: "<code>className</code>", default: "<code>\"\"</code>", description: "Extra menu class name." },
        { option: "<code>onOpenChange</code>", default: "<code>null</code>", description: "Called when the menu opens or closes." },
        { option: "<code>onSelect</code>", default: "<code>null</code>", description: "Called when a menu item is selected." }
      ],
      propertiesText: "Menu items support <code>id</code>, <code>label</code>, optional <code>icon</code>, optional <code>shortcut</code>, <code>disabled</code>, and <code>danger</code>.",
      events: [
        { event: "<code>onOpenChange(open)</code>", arguments: "boolean open state", returns: "<code>void</code>" },
        { event: "<code>onSelect(item, meta)</code>", arguments: "selected item and metadata with <code>index</code> and <code>source</code>", returns: "<code>void</code>" }
      ],
      methods: [
        { method: "<code>open()</code>", arguments: "none", returns: "<code>void</code>" },
        { method: "<code>close()</code>", arguments: "none", returns: "<code>void</code>" },
        { method: "<code>toggle()</code>", arguments: "none", returns: "<code>void</code>" },
        { method: "<code>update(items?, options?)</code>", arguments: "new item array and/or partial options", returns: "<code>void</code>" },
        { method: "<code>getState()</code>", arguments: "none", returns: "open state, active index, placement, and item snapshot" },
        { method: "<code>destroy()</code>", arguments: "none", returns: "<code>void</code>" }
      ]
    };
  </script>
  <script type='module' src='../js/demo/demo.shell.js'></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page" data-theme="dark">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
      </div>
      <h1 class="ui-title">Dropdown Demo</h1>
      <p class="muted">Dedicated helper page for the bottom-anchored menu wrapper.</p>
    </section>
    <section class="panel">
      <h2 class="ui-title">Preview</h2>
      <div class="preview">
        <button id="dropdownTrigger" class="ui-button" type="button">Open Dropdown</button>
      </div>
      <div class="row">
        <button id="openBtn" class="ui-button" type="button">Open</button>
        <button id="toggleAlignBtn" class="ui-button ui-button-ghost" type="button">Toggle Align</button>
        <button id="toggleWidthBtn" class="ui-button ui-button-ghost" type="button">Toggle Match Width</button>
        <button id="toggleCloseOnSelectBtn" class="ui-button ui-button-ghost" type="button">Toggle Close On Select</button>
      </div>
      <pre>const dropdown = createDropdown(trigger, items, {
  align: "right",
  closeOnSelect: true,
  onSelect(item, meta) {
    writeLog("dropdown.select", { item, meta });
  },
});</pre>
      <pre id="log" class="log">No events yet.</pre>
    </section>
  </main>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    await window.__demoLoaderReady;
    const createDropdown = await uiLoader.get("ui.dropdown");

    const page = document.querySelector("main.page");
    const log = document.getElementById("log");
    const trigger = document.getElementById("dropdownTrigger");
    const iconRefresh = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 11-3-6.7M21 3v6h-6"/></svg>';
    const iconDelete = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2m-7 0v14m6-14v14M5 6l1 14h12l1-14"/></svg>';
    let align = "right";
    let matchTriggerWidth = false;
    let closeOnSelect = true;
    const items = [
      { id: "refresh", label: "Refresh", icon: iconRefresh, shortcut: "R" },
      { id: "pin", label: "Pin Window", shortcut: "P" },
      { id: "delete", label: "Delete", icon: iconDelete, danger: true },
    ];

    function writeLog(label, payload) {
      const line = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(payload ?? {}, null, 2)}\n`;
      log.textContent = log.textContent === "No events yet." ? line : `${line}\n${log.textContent}`;
    }

    const dropdown = createDropdown(trigger, items, {
      align,
      matchTriggerWidth,
      closeOnSelect,
      onOpenChange(open) {
        writeLog("dropdown.openChange", { open, state: dropdown.getState() });
      },
      onSelect(item, meta) {
        writeLog("dropdown.select", { itemId: item.id, meta });
      },
    });

    function sync() {
      dropdown.update(items, { align, matchTriggerWidth, closeOnSelect });
      writeLog("dropdown.update", { align, matchTriggerWidth, closeOnSelect, state: dropdown.getState() });
    }

    document.getElementById("openBtn").addEventListener("click", () => dropdown.open());
    document.getElementById("toggleAlignBtn").addEventListener("click", () => {
      align = align === "left" ? "right" : "left";
      sync();
    });
    document.getElementById("toggleWidthBtn").addEventListener("click", () => {
      matchTriggerWidth = !matchTriggerWidth;
      sync();
    });
    document.getElementById("toggleCloseOnSelectBtn").addEventListener("click", () => {
      closeOnSelect = !closeOnSelect;
      sync();
    });
    document.getElementById("themeToggle").addEventListener("click", () => {
      const next = page.dataset.theme === "dark" ? "light" : "dark";
      page.dataset.theme = next;
      writeLog("theme.toggle", { theme: next });
    });
  </script>
</body>
</html>
