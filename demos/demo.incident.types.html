<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incident Types Demo</title>
  <link rel='stylesheet' href='../css/demo/demo.shell.css'>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }
    .controls,
    .panel {
      border: 1px solid #263146;
      border-radius: 10px;
      background: #111826;
      padding: 14px;
    }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .controls select {
      border-radius: 8px;
      border: 1px solid #334563;
      background: #0b1423;
      color: #d7e0f4;
      padding: 6px 8px;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    h1, h2 {
      margin: 0 0 10px;
      font-weight: 600;
    }
    .log {
      margin: 0;
      white-space: pre-wrap;
      font-size: 12px;
      color: #b2c2e5;
      font-family: Consolas, "Courier New", monospace;
      height: 220px;
      overflow-y: auto;
      overflow-x: auto;
    }
    .back {
      color: #b2c2e5;
      text-decoration: none;
      font-size: 13px;
    }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["incident.base", "incident.types"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Incident Types",
      overview: "Incident-domain list helper for editable and read-only incident-type records, including drawer-driven add flows and per-item field/resource updates.",
      useWhen: [
        "Use <code>incidentTypes(...)</code> when a PBB incident workflow needs to add, view, or edit multiple incident-type records within one incident.",
        "Use it when the app should reuse the shared incident drawer and incident-type detail rows instead of rebuilding incident-specific UI locally."
      ],
      avoidWhen: [
        "Do not treat this as a generic form/list helper outside the incident domain.",
        "Do not bypass the shared incident helper with app-local list, drawer, or incident-type detail markup."
      ],
      description: "This helper owns the incident-type list shell, add-from-drawer flow, and item editor/viewer switching. The app still owns the incident catalog, reference lookups, and persistence callbacks.",
      sectionSamples: {
        "incident.types (editor)": `const listApi = incidentTypes(host, incidentTypesData, {\n  theme: "dark",\n  editable: true,\n  lookups,\n  incidentCategories,\n  resources: resourceTypes,\n  headerText: "Reported Incident Types",\n  drawerHeaderText: "Select Reported Incidents",\n  onAddIncidentType(payload) {\n    persistIncidentType(payload);\n  },\n  onItemChange(nextItem, meta) {\n    queueAutosave(nextItem, meta);\n  },\n  onChange(nextList, meta) {\n    renderPreview(nextList, meta);\n  },\n});`,
        "incident.types (viewer)": `incidentTypes(host, incidentTypesData, {\n  theme: "dark",\n  editable: false,\n  lookups,\n  incidentCategories,\n  resources: resourceTypes,\n  headerText: "Reported Incident Types",\n});`
      },
      defaultSampleCode: `const listApi = incidentTypes(host, incidentTypesData, {\n  editable: true,\n  lookups,\n  incidentCategories,\n  resources: resourceTypes,\n  onAddIncidentType(payload) {\n    persistIncidentType(payload);\n  },\n  onItemChange(nextItem, meta) {\n    queueAutosave(nextItem, meta);\n  },\n  onChange(nextList, meta) {\n    renderPreview(nextList, meta);\n  },\n});`,
      constructor: [
        { factory: "<code>incidentTypes(container, data, options)</code>", arguments: "list host, incident-type array or incident payload, and domain options", returns: "Incident-type list instance with drawer, list, and lifecycle methods" }
      ],
      options: [
        { option: "<code>editable</code>", default: "<code>true</code>", description: "Switches between item editor rows and read-only viewer rows." },
        { option: "<code>headerText</code>", default: "<code>\"Incident Details\"</code>", description: "Header title shown above the incident-type list." },
        { option: "<code>drawerHeaderText</code>", default: "<code>\"Select Reported Incidents\"</code>", description: "Drawer title used by the add-incident-type picker." },
        { option: "<code>lookups</code>", default: "<code>{}</code>", description: "Shared incident lookup bag. The helper reads <code>lookups.incidentTypes</code>, <code>lookups.incidentCategories</code>, and <code>lookups.resourceTypes</code> as fallback catalogs when direct option arrays are omitted." },
        { option: "<code>incidentTypes</code>", default: "<code>[]</code>", description: "Direct incident-type catalog for the add-from-drawer picker. When omitted, the helper falls back to <code>lookups.incidentTypes</code>." },
        { option: "<code>incidentCategories</code>", default: "<code>[]</code>", description: "Incident-category list used to group and filter drawer items." },
        { option: "<code>resources</code>", default: "<code>[]</code>", description: "Resource-type catalog used by editable incident-type resource rows. Required-resource quantities now render through the shared numeric stepper." },
        { option: "<code>theme</code>", default: "<code>\"dark\"</code>", description: "Applies the helper theme variant to the list shell and child rows." },
        { option: "<code>className</code>", default: "<code>\"\"</code>", description: "Extra class added to the helper root element." },
        { option: "<code>onOpenDrawer</code>", default: "<code>undefined</code>", description: "Called when the add-incident-type drawer opens." },
        { option: "<code>onCloseDrawer</code>", default: "<code>undefined</code>", description: "Called when the add-incident-type drawer closes." },
        { option: "<code>onAddIncidentType</code>", default: "<code>undefined</code>", description: "Receives the normalized incident-type payload selected from the drawer." },
        { option: "<code>onItemChange</code>", default: "<code>undefined</code>", description: "Normalized post-mutation hook that receives the candidate next incident-type row plus a small <code>meta</code> reason payload." },
        { option: "<code>onChange</code>", default: "<code>undefined</code>", description: "Normalized post-mutation hook that receives the candidate next incident-type list plus the same <code>meta</code> payload." },
        { option: "<code>removeIncidentType</code>", default: "<code>undefined</code>", description: "Editable-only removal hook for an incident-type row." },
        { option: "<code>onFieldChange</code>", default: "<code>undefined</code>", description: "Editable-only hook for field changes within an incident-type row." },
        { option: "<code>onResourceChange</code>", default: "<code>undefined</code>", description: "Editable-only hook for required-resource quantity changes." }
      ],
      events: [
        { event: "<code>onOpenDrawer()</code>", arguments: "none", returns: "<code>void</code>" },
        { event: "<code>onCloseDrawer()</code>", arguments: "none", returns: "<code>void</code>" },
        { event: "<code>onAddIncidentType(payload)</code>", arguments: "normalized incident-type payload selected from the drawer", returns: "<code>void</code>" },
        { event: "<code>onItemChange(nextItem, meta)</code>", arguments: "candidate next row plus a normalized mutation meta payload such as <code>{ reason: \"field\" }</code>", returns: "<code>void</code>" },
        { event: "<code>onChange(nextList, meta)</code>", arguments: "candidate next list plus the same normalized mutation meta payload", returns: "<code>void</code>" },
        { event: "<code>removeIncidentType(payload)</code>", arguments: "incident-type payload being removed", returns: "<code>void</code>" },
        { event: "<code>onFieldChange(incidentTypeId, fieldKey, value)</code>", arguments: "row id, domain field key, and next value", returns: "<code>void</code>" },
        { event: "<code>onResourceChange(incidentTypeId, resourceTypeId, quantityNeeded)</code>", arguments: "row id, resource type id, and next quantity", returns: "<code>void</code>" }
      ],
      propertiesText: "The instance manages a normalized incident-type <code>list</code>, merged <code>options</code>, and current <code>drawerState</code>. Each incident-type row keeps its own domain fields and resource assignments, while the parent instance exposes aggregate list state through <code>getData()</code> and <code>getState()</code>. Unsaved rows retain a stable <code>_client_key</code> for host-side reconciliation.",
      methods: [
        { method: "<code>update(nextData, nextOptions)</code>", arguments: "replacement incident-type data and optional option patch", returns: "<code>void</code>" },
        { method: "<code>setList(items)</code>", arguments: "replacement incident-type array", returns: "<code>void</code>" },
        { method: "<code>getData()</code>", arguments: "none", returns: "Current normalized incident-type array" },
        { method: "<code>getState()</code>", arguments: "none", returns: "List, merged options, and drawer state" },
        { method: "<code>destroy()</code>", arguments: "none", returns: "<code>void</code>" }
      ]
    };
  </script>
  <script type='module' src='../js/demo/demo.shell.js'></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page">
    <section class="controls">
      <a class="back" href="./index.html">← Back to Home</a>
      <label for="sampleSelect">Sample</label>
      <select id="sampleSelect"></select>
      <label for="themeSelect">Theme</label>
      <select id="themeSelect">
        <option value="dark" selected>dark</option>
        <option value="light">light</option>
      </select>
      <label>
        <input id="debugToggle" type="checkbox">
        debug
      </label>
    </section>

    <section class="panel">
      <h1>Incident Types Demo</h1>
      <p>Left panel is editable. Right panel mirrors left data as viewer output.</p>
    </section>

    <section class="layout">
      <article class="panel">
        <h2>incident.types (Editor)</h2>
        <div id="incidentTypesEditorList"></div>
      </article>
      <article class="panel">
        <h2>incident.types (Viewer)</h2>
        <div id="incidentTypesViewerList"></div>
      </article>
    </section>

    <section class="panel">
      <h2>Editor Events</h2>
      <pre id="eventLog" class="log">No events yet.</pre>
    </section>
  </main>

  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    await window.__demoLoaderReady;
    const incidentBase = await uiLoader.get("incident.base");
    const incidentTypes = await uiLoader.get("incident.types");

    const sampleSelect = document.getElementById("sampleSelect");
    const themeSelect = document.getElementById("themeSelect");
    const debugToggle = document.getElementById("debugToggle");
    const eventLog = document.getElementById("eventLog");
    const sampleCandidates = [
      "sampledata_1.json",
      "sampledata_2.json",
      "sampledata_6.json",
      "sampledata_7.json",
      "sampledata_15.json",
      "sampledata_16.json",
      "sampledata.json"
    ];

    async function fetchJson(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`Failed to load ${path}`);
      }
      return response.json();
    }

    function addEvent(message, payload) {
      const line = `[${new Date().toISOString()}] ${message}\n${JSON.stringify(payload, null, 2)}\n`;
      eventLog.textContent = eventLog.textContent === "No events yet."
        ? line
        : `${line}\n${eventLog.textContent}`;
    }

    async function main() {
      const [
        teamStatuses,
        incidentStatuses,
        alertLevels,
        incidentTypesLookup,
        incidentCategories,
        teams,
        resourceTypes,
        operators
      ] = await Promise.all([
        fetchJson("../boot.team.assignment.status.json"),
        fetchJson("../boot.incident.status.json"),
        fetchJson("../boot.alert.levels.json"),
        fetchJson("../boot.incident.types.json"),
        fetchJson("../boot.incident.categories.json"),
        fetchJson("../boot.teams.json"),
        fetchJson("../boot.resource.types.json"),
        fetchJson("../boot.operators.json")
      ]);

      const lookups = {
        teamStatuses,
        incidentStatuses,
        alertLevels,
        incidentTypes: incidentTypesLookup,
        incidentCategories,
        teams,
        resourceTypes,
        operators
      };

      let theme = "dark";
      let debug = false;
      let editableListItems = [];
      let incidentState = {};

      const baseApi = incidentBase(document.createElement("div"), {}, { lookups, debug });
      window.hhIncident = { baseApi };

      function buildIncidentTypeItems(incidentPayload) {
        const incidentTypesFromPayload = Array.isArray(incidentPayload?.incident_types)
          ? incidentPayload.incident_types
          : [];
        const detailEntries = Array.isArray(incidentPayload?.detail_entries)
          ? incidentPayload.detail_entries
          : [];
        const resourcesNeeded = Array.isArray(incidentPayload?.resources_needed)
          ? incidentPayload.resources_needed
          : [];

        return incidentTypesFromPayload.map((type) => {
          const lookupType = (incidentTypesLookup || []).find((item) => String(item.id) === String(type.id));
          const fields = Array.isArray(lookupType?.fields) ? lookupType.fields : [];
          const resources = Array.isArray(lookupType?.resource_defaults)
            ? lookupType.resource_defaults.map((resourceDefault) => ({
                id: resourceDefault?.resource_type_id,
                name: resourceDefault?.resource_type?.name || "",
                resource_type_id: resourceDefault?.resource_type_id,
                sort_order: resourceDefault?.sort_order || 0
              }))
            : [];

          return {
            id: type.id,
            incident_id: incidentPayload.id,
            incident_type_id: type.id,
            incident_type_category_id: type.category_id,
            incident_type_category_name: type?.category?.name || lookupType?.category?.name || "",
            name: type.name,
            fields,
            detail_entries: detailEntries.filter((entry) => String(entry.incident_type_id) === String(type.id)),
            resources,
            resources_needed: resourcesNeeded.filter((entry) => String(entry.incident_type_id) === String(type.id))
          };
        });
      }

      async function initSamplePicker() {
        const availability = await Promise.all(
          sampleCandidates.map(async (name) => {
            try {
                await fetchJson(`../samples/${name}`);
              return name;
            } catch (error) {
              return null;
            }
          })
        );
        const available = availability.filter(Boolean);
        if (!available.length) {
          throw new Error("No sampledata_*.json files could be loaded.");
        }
        sampleSelect.innerHTML = "";
        available.forEach((name) => {
          const option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          sampleSelect.appendChild(option);
        });
        sampleSelect.value = available.includes("sampledata_2.json")
          ? "sampledata_2.json"
          : available[0];
      }

      async function applySample(sampleFile) {
        const samplePayload = await fetchJson(`../samples/${sampleFile}`);
        incidentState = samplePayload?.incident || {};
        editableListItems = buildIncidentTypeItems(incidentState);
        editorListApi.setList(editableListItems);
        viewerListApi.setList(editableListItems);
        editorListApi.update(editableListItems, {
          theme,
          debug,
          lookups,
          incident_id: incidentState?.id,
          categories: incidentCategories,
          incidentTypes: incidentTypesLookup,
          resources: resourceTypes,
          editable: true
        });
        viewerListApi.update(editableListItems, {
          theme,
          debug,
          lookups,
          categories: incidentCategories,
          incidentTypes: incidentTypesLookup,
          editable: false
        });
        addEvent("demo.sample.change", {
          sample: sampleFile,
          incident_id: incidentState?.id,
          incident_types: editableListItems.length
        });
      }

      await initSamplePicker();

      const editorListApi = incidentTypes(document.getElementById("incidentTypesEditorList"), editableListItems, {
        theme,
        debug,
        lookups,
        incident_id: null,
        categories: incidentCategories,
        incidentTypes: incidentTypesLookup,
        resources: resourceTypes,
        editable: true,
        noticeAlreadyExists(incidentType) {
          addEvent("incidentTypes.noticeAlreadyExists", {
            incident_type_id: incidentType?.id,
            name: incidentType?.name
          });
        },
        onOpenDrawer() {
          addEvent("incidentTypes.onOpenDrawer", {});
        },
        onCloseDrawer() {
          addEvent("incidentTypes.onCloseDrawer", {});
        },
        onAddIncidentType(payload) {
          addEvent("incidentTypes.onAddIncidentType", payload);
        },
        onItemChange(nextItem, meta) {
          addEvent("incidentTypes.onItemChange", { nextItem, meta });
        },
        onChange(nextList, meta) {
          editableListItems = nextList;
          viewerListApi.setList(editableListItems);
          addEvent("incidentTypes.onChange", {
            meta,
            count: nextList.length,
            keys: nextList.map((item) => item.id ?? item._client_key ?? item.incident_type_id ?? null)
          });
        },
        removeIncidentType(incidentTypeData) {
          editableListItems = editableListItems.filter(
            (item) => String(item.incident_type_id) !== String(incidentTypeData?.incident_type_id)
          );
          editorListApi.setList(editableListItems);
          viewerListApi.setList(editableListItems);
          addEvent("incidentTypes.removeIncidentType", incidentTypeData);
        },
        onFieldChange(incidentTypeId, fieldKey, value) {
          editableListItems = editorListApi.getData();
          viewerListApi.setList(editableListItems);
          addEvent("incidentTypes.onFieldChange", { incidentTypeId, fieldKey, value });
        },
        onResourceChange(incidentTypeId, resourceTypeId, quantityNeeded) {
          editableListItems = editorListApi.getData();
          viewerListApi.setList(editableListItems);
          addEvent("incidentTypes.onResourceChange", { incidentTypeId, resourceTypeId, quantityNeeded });
        }
      });

      const viewerListApi = incidentTypes(document.getElementById("incidentTypesViewerList"), editableListItems, {
        theme,
        debug,
        lookups,
        categories: incidentCategories,
        incidentTypes: incidentTypesLookup,
        editable: false
      });

      function rerenderAll() {
        editorListApi.update(editableListItems, {
          theme,
          debug,
          lookups,
          incident_id: incidentState?.id,
          categories: incidentCategories,
          incidentTypes: incidentTypesLookup,
          resources: resourceTypes,
          editable: true
        });
        viewerListApi.update(editableListItems, {
          theme,
          debug,
          lookups,
          categories: incidentCategories,
          incidentTypes: incidentTypesLookup,
          editable: false
        });
      }

      themeSelect.addEventListener("change", () => {
        theme = themeSelect.value;
        rerenderAll();
      });

      debugToggle.addEventListener("change", () => {
        debug = debugToggle.checked;
        rerenderAll();
      });

      sampleSelect.addEventListener("change", () => {
        applySample(sampleSelect.value).catch((error) => {
          console.error(error);
          addEvent("demo.sample.change.error", {
            sample: sampleSelect.value,
            message: error.message
          });
        });
      });

      await applySample(sampleSelect.value);
      window.hhIncident.instances = [editorListApi, viewerListApi];
    }

    main().catch((error) => {
      console.error(error);
      eventLog.textContent = `Failed to initialize demo.\n${error.message}`;
    });
  </script>
</body>
</html>
