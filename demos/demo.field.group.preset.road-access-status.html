<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road / Access Status Field Group Preset Demo</title>
  <link rel="stylesheet" href="../css/demo/demo.shell.css">
  <style>
    body { margin: 0; padding: 24px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .page { max-width: 1180px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid #263146; border-radius: 8px; background: #111826; padding: 14px; display: grid; gap: 12px; }
    .row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
    .back { color: #b2c2e5; text-decoration: none; font-size: 13px; }
    .muted { margin: 0; color: #9fb2d8; font-size: 13px; line-height: 1.45; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(300px, 380px); gap: 14px; align-items: start; }
    .stack { display: grid; gap: 12px; }
    .log, pre:not(.log) { margin: 0; white-space: pre-wrap; font-size: 12px; font-family: Consolas, "Courier New", monospace; border: 1px solid #2b3750; border-radius: 8px; background: #0b1220; padding: 10px; overflow: auto; }
    .log { min-height: 260px; color: #b2c2e5; }
    @media (max-width: 920px) { .layout { grid-template-columns: 1fr; } }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.field.group", "ui.field.group.presets"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Road / Access Status Field Group Preset",
      overview: "Focused reference for repeatable route access and clearance records.",
      useWhen: ["Use <code>fieldGroupPresets.roadAccessStatus()</code> for blocked routes, cleared routes, obstructions, and vehicle passability."],
      avoidWhen: ["Use <code>infrastructureDamage()</code> when the focus is asset damage rather than current access status."],
      description: "The road/access status preset captures route location, status, obstruction type, passable vehicle types, and clearance state. Vehicle passability uses the shared checkbox-group component.",
      defaultSampleCode: `const group = createFieldGroup(host, {
  name: "road_access",
  ...fieldGroupPresets.roadAccessStatus({ label: "Road / Access Status" }),
  value: [{
    route_location: "Coastal Road",
    status: "Blocked",
    obstruction_type: "Flooding",
    passable_by_vehicle_type: ["Pedestrian", "Motorcycle"],
    cleared: "No"
  }]
});`,
      constructor: [{ factory: "<code>fieldGroupPresets.roadAccessStatus(options?)</code>", arguments: "optional preset overrides", returns: "Plain repeatable field-group config for <code>createFieldGroup(...)</code>" }],
      options: [
        { option: "<code>label</code>", default: "<code>\"Road / Access Status\"</code>", description: "Visible group label." },
        { option: "<code>repeatable</code>", default: "<code>true</code>", description: "Returns an array value by default." },
        { option: "<code>config_json.preset</code>", default: "<code>undefined</code>", description: "JSON <code>{ \"preset\": \"roadAccessStatus\", \"repeatable\": true }</code> resolves the preset without duplicated <code>fields[]</code>." }
      ],
      properties: [
        { property: "<code>sitrep</code>", type: "<code>Array</code>", description: "<code>blocked_routes</code>, <code>cleared_routes</code>." },
        { property: "<code>passable_by_vehicle_type.type</code>", type: "<code>checkbox-group</code>", description: "Allows multiple passable modes such as pedestrian, motorcycle, light vehicle, truck, and emergency vehicle." }
      ],
      events: [
        { event: "<code>onChange(value, meta)</code>", arguments: "<code>value</code> array, validation metadata", returns: "Provided to <code>createFieldGroup(...)</code>, not the preset factory." }
      ],
      methods: [
        { method: "<code>getValue()</code>", arguments: "none", returns: "Array of road/access objects." },
        { method: "<code>setValue(value)</code>", arguments: "array of road/access objects", returns: "<code>void</code>" },
        { method: "<code>validate()</code>", arguments: "none", returns: "<code>{ status, errors }</code>" }
      ]
    };
    window.fieldGroupPresetDemo = {
      presetKey: "roadAccessStatus",
      name: "road_access",
      label: "Road / Access Status",
      initialValue: [{ route_location: "Coastal Road", status: "Blocked", obstruction_type: "Flooding", passable_by_vehicle_type: ["Pedestrian", "Motorcycle"], cleared: "No" }],
      sampleValue: [{ route_location: "Mountain Route", status: "Limited", obstruction_type: "Landslide", passable_by_vehicle_type: ["Pedestrian", "Emergency vehicle"], cleared: "No" }]
    };
  </script>
  <script type="module" src="../js/demo/demo.shell.js"></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page" data-theme="dark">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
      </div>
      <h1 class="ui-title">Road / Access Status Preset</h1>
      <p class="muted">Repeatable route access entries for response routing and SITREP updates.</p>
    </section>
    <section class="panel">
      <h2 class="ui-title">Road / Access Status</h2>
      <div class="layout">
        <div class="stack">
          <div id="presetHost"></div>
          <div class="row">
            <button id="sampleBtn" class="ui-button" type="button">Set Sample</button>
            <button id="clearBtn" class="ui-button ui-button-ghost" type="button">Clear</button>
            <button id="validateBtn" class="ui-button ui-button-ghost" type="button">Validate</button>
          </div>
          <pre id="presetSchema"></pre>
        </div>
        <div class="stack">
          <pre id="presetLog" class="log">No changes yet.</pre>
          <button id="snapshotBtn" class="ui-button ui-button-ghost" type="button">Snapshot</button>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="../js/demo/demo.field.group.preset.js"></script>
</body>
</html>
