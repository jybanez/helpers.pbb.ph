<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual List Demo</title>
  <link rel='stylesheet' href='../css/demo/demo.shell.css'>
  <style>
    body { margin: 0; padding: 24px; background: var(--demo-bg, var(--ui-bg, #0c1017)); color: var(--demo-text, var(--ui-text, #d7e0f4)); font-family: var(--ui-font, "Segoe UI", Tahoma, Geneva, Verdana, sans-serif); }
    .page { max-width: 1100px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid var(--demo-border, var(--ui-border, #263146)); border-radius: 10px; background: var(--demo-panel-bg, var(--ui-bg-soft, #111826)); padding: 14px; display: grid; gap: 10px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .back { color: var(--demo-muted, var(--ui-muted, #b2c2e5)); text-decoration: none; font-size: 13px; }
    #host { border: 1px solid var(--demo-border, var(--ui-border, #2b3750)); border-radius: 8px; padding: 10px; background: var(--demo-surface-bg, var(--ui-bg, #0b1220)); }
    .log { margin: 0; white-space: pre-wrap; font-size: 12px; color: var(--demo-code-text, var(--ui-text, #b2c2e5)); font-family: Consolas, "Courier New", monospace; border: 1px solid var(--demo-border, var(--ui-border, #2b3750)); border-radius: 8px; background: var(--demo-code-bg, var(--ui-bg, #0b1220)); padding: 10px; height: 220px; overflow: auto; }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.virtual.list", "ui.dom"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Virtual List",
      overview: "Low-level virtualization primitive for very large item sets when a full grid or tree shell is unnecessary.",
      useWhen: [
        "Use <code>createVirtualList(...)</code> when row count is large enough that only visible items should render.",
        "Use it as a primitive under custom list presentations instead of forcing grid behavior."
      ],
      avoidWhen: [
        "Do not use it when a standard list with a few dozen rows is enough.",
        "Do not use it when you need sorting, paging, or full tabular structure; use <code>createGrid(...)</code>."
      ],
      description: "The virtual-list helper solves rendering scale, not page-level data UX. It is the narrow primitive for large custom lists and should stay smaller than the grid and tree-grid helpers.",
      defaultSampleCode: `const list = createVirtualList(host, items, {\n  rowHeight: 40,\n  overscan: 6,\n  renderItem(item) {\n    return renderRow(item);\n  },\n});`,
      constructor: [
        { factory: "<code>createVirtualList(container, items, options)</code>", arguments: "<code>container</code>, items array, virtual-list options", returns: "Virtual-list instance" }
      ],
      options: [
        { option: "<code>rowHeight</code>", default: "documented default", description: "Fixed row height used for virtualization math." },
        { option: "<code>renderItem</code>", default: "<code>null</code>", description: "Custom row renderer for each visible item." },
        { option: "<code>overscan</code>", default: "documented default", description: "Extra rows rendered outside the immediate viewport." }
      ],
      methods: [
        { method: "<code>setItems(items)</code>", arguments: "items array", returns: "<code>void</code>" },
        { method: "<code>scrollToIndex(index)</code>", arguments: "number", returns: "<code>void</code>" },
        { method: "<code>destroy()</code>", arguments: "none", returns: "<code>void</code>" }
      ]
    };
  </script>
  <script type='module' src='../js/demo/demo.shell.js'></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page">
    <section class="panel">
      <h1 class="ui-title">Virtual List Demo</h1>
      <p>Shows stable rendering with large row counts using windowed virtualization.</p>
    </section>

    <section class="panel">
      <div class="row">
        <button id="scrollTopBtn" class="ui-button" type="button">Top</button>
        <button id="scrollMidBtn" class="ui-button" type="button">Middle</button>
        <button id="scrollEndBtn" class="ui-button" type="button">End</button>
      </div>
      <div id="host"></div>
    </section>

    <section class="panel">
      <h2 class="ui-title">Event Log</h2>
      <pre id="log" class="log">No events yet.</pre>
    </section>
  </main>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    await window.__demoLoaderReady;
    const createVirtualList = await uiLoader.get("ui.virtual.list");
    const createElement = await uiLoader.get("ui.dom.createElement");

    const log = document.getElementById("log");
    function writeLog(label, payload) {
      const line = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(payload ?? {}, null, 2)}\n`;
      log.textContent = log.textContent === "No events yet." ? line : `${line}\n${log.textContent}`;
    }

    const rows = Array.from({ length: 5000 }, (_, index) => ({
      id: index + 1,
      label: `Incident #${index + 1} - ${index % 2 ? "Active" : "Resolved"}`,
      location: ["Guadalupe", "Talamban", "Lahug", "Mabolo"][index % 4],
    }));

    const list = createVirtualList(document.getElementById("host"), rows, {
      height: 420,
      rowHeight: 38,
      overscan: 8,
      renderItem(item) {
        const row = createElement("div", {
          html: `<strong>${item.label}</strong> <span style="color:var(--ui-muted, #9fb2d8)">• ${item.location}</span>`,
        });
        return row;
      },
      onRangeChange(range) {
        writeLog("virtualList.range", range);
      },
    });

    document.getElementById("scrollTopBtn").addEventListener("click", () => list.scrollToIndex(0, "smooth"));
    document.getElementById("scrollMidBtn").addEventListener("click", () => list.scrollToIndex(Math.floor(rows.length / 2), "smooth"));
    document.getElementById("scrollEndBtn").addEventListener("click", () => list.scrollToIndex(rows.length - 1, "smooth"));
    window.virtualListDemo = { list };
  </script>
</body>
</html>
