<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casualty / Patient Field Group Preset Demo</title>
  <link rel="stylesheet" href="../css/demo/demo.shell.css">
  <style>
    body { margin: 0; padding: 24px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .page { max-width: 1180px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid #263146; border-radius: 8px; background: #111826; padding: 14px; display: grid; gap: 12px; }
    .row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
    .back { color: #b2c2e5; text-decoration: none; font-size: 13px; }
    .muted { margin: 0; color: #9fb2d8; font-size: 13px; line-height: 1.45; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(300px, 380px); gap: 14px; align-items: start; }
    .stack { display: grid; gap: 12px; }
    .log, pre:not(.log) { margin: 0; white-space: pre-wrap; font-size: 12px; font-family: Consolas, "Courier New", monospace; border: 1px solid #2b3750; border-radius: 8px; background: #0b1220; padding: 10px; overflow: auto; }
    .log { min-height: 260px; color: #b2c2e5; }
    @media (max-width: 920px) { .layout { grid-template-columns: 1fr; } }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.field.group", "ui.field.group.presets"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Casualty / Patient Field Group Preset",
      overview: "Focused reference for repeatable casualty and patient intake records.",
      useWhen: ["Use <code>fieldGroupPresets.casualtyPatient()</code> for injured, critical, triage, and transported patient tracking."],
      avoidWhen: ["Use <code>person()</code> when medical condition and transport details are not needed."],
      description: "The casualty/patient preset extends person fields with condition, injury type, consciousness, triage color, transported state, and destination facility. Consciousness, triage, and transported state hide when condition is Deceased; destination remains visible for morgue/hospital/funeral-home routing. It exposes SITREP hints for injured, critical, and transported counts.",
      defaultSampleCode: `const group = createFieldGroup(host, {
  name: "patients",
  ...fieldGroupPresets.casualtyPatient({ label: "Patients" }),
  value: [{
    last_name: "Rizal",
    first_name: "Jose",
    age: "47",
    gender: "Male",
    condition: "Critical",
    injury_type: "Head injury",
    consciousness: "Conscious",
    triage_color: "Red",
    transported: "Yes",
    destination_facility: "District Hospital"
  }]
});`,
      constructor: [{ factory: "<code>fieldGroupPresets.casualtyPatient(options?)</code>", arguments: "optional preset overrides", returns: "Plain repeatable field-group config for <code>createFieldGroup(...)</code>" }],
      options: [
        { option: "<code>label</code>", default: "<code>\"Casualty / Patient\"</code>", description: "Visible group label." },
        { option: "<code>repeatable</code>", default: "<code>true</code>", description: "Returns an array value by default." },
        { option: "<code>config_json.preset</code>", default: "<code>undefined</code>", description: "JSON <code>{ \"preset\": \"casualtyPatient\", \"repeatable\": true }</code> resolves the preset without duplicated <code>fields[]</code>." }
      ],
      properties: [
        { property: "<code>sitrep</code>", type: "<code>Array</code>", description: "<code>injured_count</code>, <code>critical_count</code>, <code>transported_count</code>." },
        { property: "<code>triage_color.options</code>", type: "<code>Array</code>", description: "<code>Green</code>, <code>Yellow</code>, <code>Red</code>, <code>Black</code>." },
        { property: "<code>visibleWhen</code>", type: "<code>Object</code>", description: "Hides consciousness, triage, and transported fields when <code>condition</code> is <code>Deceased</code>." }
      ],
      events: [
        { event: "<code>onChange(value, meta)</code>", arguments: "<code>value</code> array, validation metadata", returns: "Provided to <code>createFieldGroup(...)</code>, not the preset factory." }
      ],
      methods: [
        { method: "<code>getValue()</code>", arguments: "none", returns: "Array of patient objects." },
        { method: "<code>setValue(value)</code>", arguments: "array of patient objects", returns: "<code>void</code>" },
        { method: "<code>validate()</code>", arguments: "none", returns: "<code>{ status, errors }</code>" }
      ]
    };
    window.fieldGroupPresetDemo = {
      presetKey: "casualtyPatient",
      name: "patients",
      label: "Patients",
      initialValue: [{ last_name: "Rizal", first_name: "Jose", age: "47", gender: "Male", condition: "Critical", injury_type: "Head injury", consciousness: "Conscious", triage_color: "Red", transported: "Yes", destination_facility: "District Hospital" }],
      sampleValue: [{ last_name: "Santos", first_name: "Maria", age: "25", gender: "Female", condition: "Deceased", injury_type: "Head injury", destination_facility: "District Hospital morgue" }]
    };
  </script>
  <script type="module" src="../js/demo/demo.shell.js"></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page" data-theme="dark">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
      </div>
      <h1 class="ui-title">Casualty / Patient Preset</h1>
      <p class="muted">Repeatable patient entries for medical response and SITREP counts.</p>
    </section>
    <section class="panel">
      <h2 class="ui-title">Patients</h2>
      <div class="layout">
        <div class="stack">
          <div id="presetHost"></div>
          <div class="row">
            <button id="sampleBtn" class="ui-button" type="button">Set Sample</button>
            <button id="clearBtn" class="ui-button ui-button-ghost" type="button">Clear</button>
            <button id="validateBtn" class="ui-button ui-button-ghost" type="button">Validate</button>
          </div>
          <pre id="presetSchema"></pre>
        </div>
        <div class="stack">
          <pre id="presetLog" class="log">No changes yet.</pre>
          <button id="snapshotBtn" class="ui-button ui-button-ghost" type="button">Snapshot</button>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="../js/demo/demo.field.group.preset.js"></script>
</body>
</html>
