<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stepper Demo</title>
  <link rel='stylesheet' href='../css/demo/demo.shell.css'>
  <style>
    body { margin: 0; padding: 24px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .page { max-width: 980px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid #263146; border-radius: 10px; background: #111826; padding: 14px; display: grid; gap: 10px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .back { color: #b2c2e5; text-decoration: none; font-size: 13px; }
    #host { border: 1px solid #2b3750; border-radius: 8px; padding: 10px; background: #0b1220; }
    .log { margin: 0; white-space: pre-wrap; font-size: 12px; color: #b2c2e5; font-family: Consolas, "Courier New", monospace; border: 1px solid #2b3750; border-radius: 8px; background: #0b1220; padding: 10px; height: 220px; overflow: auto; }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.stepper"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Stepper",
      overview: "Step-indicator helper for multi-step flows where sequence and current stage need to remain visible.",
      useWhen: [
        "Use <code>createStepper(...)</code> when the workflow has a clear linear or bounded sequence.",
        "Use it to show step status without building a full wizard framework."
      ],
      avoidWhen: [
        "Do not use it for free-form progress that is not step-based; use <code>createProgress(...)</code>.",
        "Do not use it for large page navigation."
      ],
      description: "The stepper is a flow indicator, not a form container. It helps with orientation in multi-step tasks without owning the content of each step.",
      defaultSampleCode: `const stepper = createStepper(host, steps, {\n  currentStepId: "validate",\n  clickable: true,\n  onStepClick(step) {\n    stepper.update(steps, { currentStepId: step.id });\n  },\n});`,
      constructor: [
        { factory: "<code>createStepper(container, steps, options)</code>", arguments: "container, step list, options", returns: "Stepper instance" }
      ],
      options: [
        { option: "orientation", default: "<code>\"horizontal\"</code>", description: "Stepper layout. Allowed values: <code>horizontal</code>, <code>vertical</code>." },
        { option: "clickable", default: "<code>true</code>", description: "Enables step triggers and <code>onStepClick</code>." },
        { option: "currentStepId", default: "<code>null</code>", description: "Explicit active step id. When supplied, update repainting treats this as authoritative over stale per-step <code>status: \"current\"</code> values." },
        { option: "onStepClick", default: "<code>null</code>", description: "Callback fired with <code>(step, index, state)</code> when a clickable step is selected." }
      ],
      properties: [
        { property: "<code>steps</code>", description: "Each step accepts <code>id</code>, <code>title</code>, optional <code>subtitle</code>, <code>status</code>, <code>disabled</code>, and <code>icon</code>." },
        { property: "<code>status</code>", description: "Supported visual states include <code>complete</code>/<code>completed</code>, <code>current</code>, <code>future</code>, and <code>error</code>." }
      ],
      methods: [
        { method: "<code>update(nextSteps, nextOptions)</code>", arguments: "step list, options", returns: "<code>void</code>" },
        { method: "<code>setCurrentStep(stepId)</code>", arguments: "step id", returns: "<code>void</code>" },
        { method: "<code>getState()</code>", arguments: "none", returns: "<code>object</code>" },
        { method: "<code>destroy()</code>", arguments: "none", returns: "<code>void</code>" }
      ]
    };
  </script>
  <script type='module' src='../js/demo/demo.shell.js'></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page" data-theme="dark">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">← Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
      </div>
      <h1 class="ui-title">Stepper Demo</h1>
    </section>
    <section class="panel">
      <div class="row">
        <button id="prevBtn" class="ui-button" type="button">Previous</button>
        <button id="nextBtn" class="ui-button" type="button">Next</button>
        <button id="toggleOrientationBtn" class="ui-button" type="button">Toggle Orientation</button>
      </div>
      <div id="host"></div>
    </section>
    <section class="panel">
      <h2 class="ui-title">Event Log</h2>
      <pre id="log" class="log">No events yet.</pre>
    </section>
  </main>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    await window.__demoLoaderReady;
    const createStepper = await uiLoader.get("ui.stepper");

    const page = document.querySelector("main.page");
    const host = document.getElementById("host");
    const log = document.getElementById("log");
    const steps = [
      { id: "intake", title: "Intake", subtitle: "Call accepted" },
      { id: "dispatch", title: "Dispatch", subtitle: "Team assignment" },
      { id: "response", title: "Response", subtitle: "Field operations" },
      { id: "closure", title: "Closure", subtitle: "Resolved report" },
    ];
    let currentIndex = 1;
    let orientation = "horizontal";

    function writeLog(label, payload) {
      const line = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(payload ?? {}, null, 2)}\n`;
      log.textContent = log.textContent === "No events yet." ? line : `${line}\n${log.textContent}`;
    }

    function materialize() {
      return steps.map((step, index) => ({
        ...step,
        status: index < currentIndex ? "complete" : (index === currentIndex ? "current" : "future"),
      }));
    }

    const instance = createStepper(host, materialize(), {
      orientation,
      onStepClick(step) {
        currentIndex = steps.findIndex((entry) => entry.id === step.id);
        instance.update(materialize(), { currentStepId: step.id, orientation });
        writeLog("stepper.click", { id: step.id });
      },
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      currentIndex = Math.max(0, currentIndex - 1);
      instance.update(materialize(), { orientation });
      writeLog("stepper.prev", { currentIndex });
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      currentIndex = Math.min(steps.length - 1, currentIndex + 1);
      instance.update(materialize(), { orientation });
      writeLog("stepper.next", { currentIndex });
    });
    document.getElementById("toggleOrientationBtn").addEventListener("click", () => {
      orientation = orientation === "horizontal" ? "vertical" : "horizontal";
      instance.update(materialize(), { orientation });
      writeLog("stepper.orientation", { orientation });
    });
    document.getElementById("themeToggle").addEventListener("click", () => {
      const next = page.dataset.theme === "dark" ? "light" : "dark";
      page.dataset.theme = next;
      writeLog("theme.toggle", { theme: next });
    });
  </script>
</body>
</html>
