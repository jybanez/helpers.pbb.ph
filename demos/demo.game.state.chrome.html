<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game State Chrome Demo</title>
  <link rel="stylesheet" href="../css/demo/demo.shell.css">
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .page {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }
    .panel {
      border: 1px solid #263146;
      border-radius: 10px;
      background: #111826;
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .button-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .demo-stage {
      position: relative;
      min-height: 560px;
      border: 1px solid #2b3750;
      border-radius: 8px;
      background: #07101d;
      overflow: hidden;
    }
    #sessionHost {
      position: absolute;
      inset: 0;
    }
    .fake-game-board {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(110, 152, 219, 0.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(110, 152, 219, 0.09) 1px, transparent 1px),
        #07101d;
      background-size: 42px 42px;
      color: #9fb2d8;
      font-weight: 800;
    }
    pre {
      margin: 0;
      min-height: 180px;
      max-height: 300px;
      white-space: pre-wrap;
      font-size: 12px;
      color: #d7e0f4;
      font-family: Consolas, "Courier New", monospace;
      border: 1px solid #2b3750;
      border-radius: 8px;
      background: #0b1220;
      padding: 10px;
      overflow: auto;
    }
    @media (max-width: 860px) {
      .workspace {
        grid-template-columns: 1fr;
      }
      .demo-stage {
        min-height: 420px;
      }
    }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.game.core", "ui.game.state.chrome"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Game State Chrome",
      overview: "Focused reference for createGameStateChrome, the optional lifecycle chrome layer for Helper game sessions.",
      useWhen: [
        "Use <code>createGameStateChrome(session, options)</code> when a canvas game needs standard pause/result overlays and close-vs-pause control behavior.",
        "Use <code>updateProgress()</code> for game-owned score, level, lives, wave, or objective metadata that Helper can display.",
        "Use <code>onAction</code> to wire Helper chrome actions to app-owned controller methods."
      ],
      avoidWhen: [
        "Do not use it as a game engine; rules, scoring, level progression, and controller lifecycle remain app-owned.",
        "Do not put game-specific level states into the lifecycle state vocabulary; use progress or milestone metadata instead."
      ],
      description: "This page isolates the state chrome helper so developers can inspect lifecycle states, pause/result/milestone overlays, progress metadata, actions, shortcuts, and cleanup.",
      defaultSampleCode: `const session = createGameSession(host, {\n  closeControl: { variant: "icon", icon: "actions.close" },\n  closeOnEscape: false,\n});\n\nconst chrome = createGameStateChrome(session, {\n  initialState: "ready",\n  shortcuts: { enabled: true, escape: "pause-or-exit" },\n  overlays: {\n    pause: {\n      actions: [\n        "resume",\n        "restart",\n        { id: "exit", label: "Home", nextState: "ready", closeSession: false },\n      ],\n    },\n  },\n  onAction(action, context) {\n    if (action === "pause") controller.pause();\n    if (action === "resume") controller.resume();\n    if (action === "restart") controller.restart();\n    if (action === "exit" && context.actionConfig?.closeSession === false) showGameHome();\n  },\n});\n\nchrome.updateProgress({ score: 120, level: 2 });\nchrome.setState("playing");`,
      constructor: [
        { factory: "<code>createGameStateChrome(session, options)</code>", arguments: "<code>createGameSession()</code> result, state chrome options", returns: "State chrome instance" }
      ],
      options: [
        { option: "<code>initialState</code>", default: "<code>\"ready\"</code>", description: "Initial lifecycle state." },
        { option: "<code>controls</code>", default: "playing pauses, other states close", description: "Maps lifecycle states to the contextual top-right control." },
        { option: "<code>overlays</code>", default: "pause/result/milestone presets", description: "Configures default titles, actions, and labels for state overlays." },
        { option: "<code>shortcuts</code>", default: "disabled", description: "Opt-in keyboard behavior such as P pause and Escape pause-or-exit." },
        { option: "<code>onAction</code>", default: "<code>null</code>", description: "Receives standard actions so apps can wire controller methods." },
        { option: "<code>onStateChange</code>", default: "<code>null</code>", description: "Receives lifecycle state transitions." }
      ],
      propertiesText: "State chrome exposes <code>root</code>, <code>overlayHost</code>, and <code>progressHost</code>. <code>getState()</code> returns lifecycle state, previous state, active control, progress metadata, overlay type, and destroyed status.",
      events: [
        { event: "<code>chrome.on(\"action\")</code>", arguments: "<code>({ action, state, source })</code>", returns: "Fires after a chrome action is selected." },
        { event: "<code>chrome.on(\"statechange\")</code>", arguments: "<code>({ state, previousState })</code>", returns: "Fires after lifecycle state changes." },
        { event: "<code>chrome.on(\"progresschange\")</code>", arguments: "<code>({ progress })</code>", returns: "Fires after progress metadata changes." }
      ],
      methods: [
        { method: "<code>chrome.setState(state)</code>", arguments: "Lifecycle state", returns: "Current state" },
        { method: "<code>chrome.updateProgress(data)</code>", arguments: "Progress metadata", returns: "Merged progress" },
        { method: "<code>chrome.showPause(options)</code>", arguments: "Optional overlay settings", returns: "<code>void</code>" },
        { method: "<code>chrome.showResult(options)</code>", arguments: "Result overlay settings", returns: "<code>void</code>" },
        { method: "<code>chrome.showMilestone(options)</code>", arguments: "Milestone overlay settings", returns: "<code>void</code>" },
        { method: "<code>chrome.hideOverlay()</code>", arguments: "None", returns: "<code>void</code>" },
        { method: "<code>chrome.setControl(mode)</code>", arguments: "<code>\"pause\"</code> or <code>\"close\"</code>", returns: "Current control mode" },
        { method: "<code>chrome.destroy()</code>", arguments: "None", returns: "<code>void</code>" }
      ]
    };
  </script>
  <script type="module" src="../js/demo/demo.shell.js"></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page" data-theme="dark" data-demo-structured="true">
    <section class="panel">
      <h1 class="ui-title">Game State Chrome Demo</h1>
      <div class="button-row">
        <button id="createSession" class="ui-button ui-button-primary" type="button">Create Session</button>
        <button id="destroySession" class="ui-button" type="button">Destroy</button>
      </div>
    </section>

    <section class="workspace">
      <div class="panel">
        <h2 class="ui-title">States</h2>
        <div class="button-row">
          <button class="ui-button" data-state="loading" type="button">Loading</button>
          <button class="ui-button" data-state="splash" type="button">Splash</button>
          <button class="ui-button" data-state="countdown" type="button">Countdown</button>
          <button class="ui-button" data-state="ready" type="button">Ready</button>
          <button class="ui-button ui-button-primary" data-state="playing" type="button">Playing</button>
          <button class="ui-button" data-state="paused" type="button">Paused</button>
          <button class="ui-button" data-state="won" type="button">Won</button>
          <button class="ui-button" data-state="gameOver" type="button">Game Over</button>
        </div>
        <h2 class="ui-title">Progress</h2>
        <div class="button-row">
          <button id="scoreUp" class="ui-button" type="button">Score +10</button>
          <button id="levelUp" class="ui-button" type="button">Level +1</button>
          <button id="milestone" class="ui-button" type="button">Milestone</button>
          <button id="result" class="ui-button" type="button">Result</button>
        </div>
        <h2 class="ui-title">Readout</h2>
        <pre id="readout"></pre>
      </div>

      <div class="panel">
        <h2 class="ui-title">Session Host</h2>
        <div class="demo-stage">
          <div id="sessionHost"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";

    await window.__demoLoaderReady;
    const { createGameSession } = await uiLoader.get("ui.game.core");
    const { createGameStateChrome } = await uiLoader.get("ui.game.state.chrome");

    const host = document.getElementById("sessionHost");
    const readout = document.getElementById("readout");
    let session = null;
    let chrome = null;
    let score = 0;
    let level = 1;
    const log = [];

    document.getElementById("createSession").addEventListener("click", createDemoSession);
    document.getElementById("destroySession").addEventListener("click", destroyDemoSession);
    document.querySelectorAll("[data-state]").forEach((button) => {
      button.addEventListener("click", () => {
        chrome?.setState(button.dataset.state, { source: "demo-button" });
        renderReadout();
      });
    });
    document.getElementById("scoreUp").addEventListener("click", () => {
      score += 10;
      chrome?.updateProgress({ score, level, lives: 3 });
      renderReadout();
    });
    document.getElementById("levelUp").addEventListener("click", () => {
      level += 1;
      chrome?.updateProgress({ score, level, objective: `Clear level ${level}` });
      renderReadout();
    });
    document.getElementById("milestone").addEventListener("click", () => {
      chrome?.showMilestone({
        type: "levelComplete",
        title: `Level ${level} Complete`,
        detail: `Next: Level ${level + 1}`,
        actions: ["continue", "restart", "exit"],
      });
      renderReadout();
    });
    document.getElementById("result").addEventListener("click", () => {
      chrome?.showResult({
        state: "gameOver",
        title: "Game Over",
        detail: `Score ${score}`,
      });
      renderReadout();
    });

    function createDemoSession() {
      destroyDemoSession();
      score = 0;
      level = 1;
      session = createGameSession(host, {
        title: "State Chrome Demo",
        ariaLabel: "State Chrome Demo",
        fullscreen: false,
        width: 960,
        height: 540,
        closeOnEscape: false,
        closeControl: { variant: "icon", icon: "actions.close" },
      });
      const board = document.createElement("div");
      board.className = "fake-game-board";
      board.textContent = "Canvas game stage";
      session.stage.appendChild(board);
      chrome = createGameStateChrome(session, {
        initialState: "ready",
        shortcuts: { enabled: true, escape: "pause-or-exit" },
        onAction(action, context) {
          log.unshift(`${action} from ${context.source || "unknown"}`);
        },
        onStateChange(next, previous) {
          log.unshift(`${previous || "-"} -> ${next}`);
        },
      });
      chrome.updateProgress({ score, level, lives: 3 });
      chrome.on("action", renderReadout);
      chrome.on("statechange", renderReadout);
      chrome.on("progresschange", renderReadout);
      renderReadout();
    }

    function destroyDemoSession() {
      chrome?.destroy();
      chrome = null;
      session?.destroy();
      session = null;
      host.innerHTML = "";
      renderReadout();
    }

    function renderReadout() {
      readout.textContent = JSON.stringify({
        chrome: chrome?.getState?.() || null,
        recent: log.slice(0, 8),
      }, null, 2);
    }

    createDemoSession();
  </script>
</body>
</html>
