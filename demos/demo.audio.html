<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Session Demo</title>
  <link rel='stylesheet' href='../css/demo/demo.shell.css'>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .page {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }
    .panel {
      border: 1px solid #263146;
      border-radius: 10px;
      background: #111826;
      padding: 14px;
    }
    .back {
      color: #b2c2e5;
      text-decoration: none;
      font-size: 13px;
    }
    .log {
      margin: 0;
      white-space: pre-wrap;
      font-size: 12px;
      color: #b2c2e5;
      font-family: Consolas, "Courier New", monospace;
      border: 1px solid #2b3750;
      border-radius: 8px;
      background: #0b1220;
      padding: 10px;
      height: 220px;
      overflow-y: auto;
      overflow-x: auto;
    }
    h1, h2, p {
      margin: 0;
    }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.audio.callSession"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Audio Session",
      overview: "Operational audio-call session playback surface for stitched incident-call samples.",
      useWhen: [
        "Use the audio call-session helper when recorded call segments need a cohesive playback experience.",
        "Use it for incident-review and call-audit surfaces where segment metadata matters."
      ],
      avoidWhen: [
        "Do not use it as a generic audio player for unrelated media galleries.",
        "Do not use it when simple browser audio controls are enough."
      ],
      description: "The audio demo loads incident sample JSON and resolves supported relative segment paths against the repo base. It is an operational playback surface, not a generic entertainment-style media player.",
      defaultSampleCode: `const session = createAudioCallSession(host, data, {\n  baseUrl: "..",\n});`,
      constructor: [
        { factory: "<code>createAudioCallSession(container, data, options)</code>", arguments: "<code>container</code>, call-session <code>data</code>, <code>options</code>", returns: "Audio-session instance" }
      ],
      options: [
        { option: "<code>baseUrl</code>", default: "<code>\"\"</code>", description: "Base URL for relative audio segment paths." },
        { option: "<code>audiographStyle</code>", default: '<code>"vu"</code>', description: "Graph style used for role tracks." },
        { option: "<code>sensitivity</code>", default: '<code>3.4</code>', description: "Audiograph sensitivity multiplier." },
        { option: "<code>showMute</code>", default: '<code>true</code>', description: "Shows per-role mute controls on the graph tracks." },
        { option: "<code>autoplay</code>", default: '<code>false</code>', description: "Starts playback automatically after build." }
      ],
      propertiesText: "Use <code>getState()</code> for playback/session state instead of reading the internal audio elements directly.",
      events: [
        { event: "<code>onError(error)</code>", arguments: "error object", returns: "<code>void</code>", description: "Fires when the session build or metadata loading hits a recoverable error." },
        { event: "<code>onStateChange(state)</code>", arguments: "playback/session state", returns: "<code>void</code>", description: "Fires as playback state changes during seeking and play/pause transitions." }
      ],
      methods: [
        { method: "<code>update(data, options?)</code>", arguments: "incident payload and optional options", returns: "<code>void</code>" },
        { method: "<code>play()</code>", arguments: "none", returns: "<code>Promise&lt;void&gt;</code>" },
        { method: "<code>pause()</code>", arguments: "none", returns: "<code>void</code>" },
        { method: "<code>seek(ms)</code>", arguments: "timeline milliseconds", returns: "<code>void</code>" },
        { method: "<code>getState()</code>", arguments: "none", returns: "current playback/session state" },
        { method: "<code>destroy()</code>", arguments: "none", returns: "<code>void</code>" }
      ]
    };
  </script>
  <script type='module' src='../js/demo/demo.shell.js'></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page" data-theme="dark">
    <section class="panel">
      <div class="audio-demo-controls">
        <a class="back" href="./index.html">← Back to Home</a>
        <label for="sampleSelect">Sample</label>
        <select id="sampleSelect"></select>
        <label for="styleSelect">Graph</label>
        <select id="styleSelect">
          <option value="vu" selected>VU Meter</option>
          <option value="dots">Dot Matrix Pulse</option>
          <option value="mirrored">Mirrored Waveform</option>
          <option value="spectrum">Spectrum Bars</option>
          <option value="neon">Neon Ribbon Wave</option>
          <option value="particle">Particle Pulse</option>
          <option value="shockwave">Shockwave</option>
          <option value="tsunami">Tsunami Ribbon</option>
          <option value="plasma">Plasma Arc</option>
          <option value="burst">Burst Columns</option>
          <option value="heartbeat">Heartbeat Oscilloscope</option>
        </select>
        <label for="themeSelect">Theme</label>
        <select id="themeSelect">
          <option value="dark" selected>dark</option>
          <option value="light">light</option>
        </select>
        <label for="sensitivityRange">Sensitivity</label>
        <input id="sensitivityRange" type="range" min="1" max="6" step="0.1" value="3.4">
        <code id="sensitivityValue">3.4x</code>
      </div>
    </section>

    <section class="panel">
      <h1>Audio Session Demo</h1>
      <p>Uses <code>incident.media[]</code> with <code>recording_role=&lt;role&gt;-&lt;call_id&gt;-&lt;timestamp&gt;</code>.</p>
    </section>

    <section class="panel">
      <div id="audioHost"></div>
    </section>

    <section class="panel">
      <h2>Event Log</h2>
      <pre id="eventLog" class="log">No events yet.</pre>
    </section>
  </main>

  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    await window.__demoLoaderReady;
    const createAudioCallSession = await uiLoader.get("ui.audio.callSession");

    const page = document.querySelector("main.page");
    const sampleSelect = document.getElementById("sampleSelect");
    const styleSelect = document.getElementById("styleSelect");
    const themeSelect = document.getElementById("themeSelect");
    const sensitivityRange = document.getElementById("sensitivityRange");
    const sensitivityValue = document.getElementById("sensitivityValue");
    const host = document.getElementById("audioHost");
    const eventLog = document.getElementById("eventLog");
    const sampleCandidates = [
      "sampledata_1.json",
      "sampledata_2.json",
      "sampledata_6.json",
      "sampledata_7.json",
      "sampledata_15.json",
      "sampledata_16.json",
      "sampledata.json"
    ];

    function addEvent(message, payload) {
      const line = `[${new Date().toISOString()}] ${message}\n${JSON.stringify(payload ?? {}, null, 2)}\n`;
      eventLog.textContent = eventLog.textContent === "No events yet."
        ? line
        : `${line}\n${eventLog.textContent}`;
    }

    async function fetchJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load ${path}`);
      }
      return response.json();
    }

    function sampleHasSupportedAudioPaths(payload) {
      const media = Array.isArray(payload?.incident?.media) ? payload.incident.media : [];
      const audioRows = media.filter((row) => String(row?.type || "").toLowerCase() === "audio");
      if (!audioRows.length) {
        return false;
      }
      return audioRows.every((row) => {
        const value = String(row?.path || "").trim();
        if (!value) {
          return false;
        }
        return value.startsWith("samples/")
          || value.startsWith("./")
          || value.startsWith("/")
          || /^(https?:)?\/\//i.test(value);
      });
    }

    async function initSamplePicker() {
      const available = [];
      for (const name of sampleCandidates) {
        try {
          const payload = await fetchJson(`../samples/${name}`);
          if (sampleHasSupportedAudioPaths(payload)) {
            available.push(name);
          }
        } catch (error) {
          // skip missing file
        }
      }
      if (!available.length) {
        throw new Error("No compatible audio sampledata_*.json files could be loaded.");
      }
      sampleSelect.innerHTML = "";
      available.forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        sampleSelect.appendChild(option);
      });
      sampleSelect.value = available.includes("sampledata_16.json")
        ? "sampledata_16.json"
        : available[0];
    }

    let audioApi = null;
    let lastLoggedSecond = -1;

    function getSensitivity() {
      const value = Number(sensitivityRange.value);
      return Number.isFinite(value) ? value : 3.4;
    }

    function updateSensitivityLabel() {
      sensitivityValue.textContent = `${getSensitivity().toFixed(1)}x`;
    }

    async function mountSelectedSample() {
      const samplePath = `../samples/${sampleSelect.value}`;
      const payload = await fetchJson(samplePath);
      const incident = payload?.incident || {};
      const mediaCount = Array.isArray(incident.media) ? incident.media.length : 0;
      if (audioApi) {
        audioApi.destroy();
      }
      audioApi = createAudioCallSession(host, incident, {
        ariaLabel: "Incident call session playback",
        baseUrl: "..",
        audiographStyle: styleSelect.value,
        sensitivity: getSensitivity(),
        showMute: true,
        autoplay: false,
        onError(error) {
          addEvent("audio.error", { message: error?.message || "Unknown error" });
        },
        onStateChange(state) {
          if (!state) {
            return;
          }
          const currentSecond = Math.floor((state.currentMs || 0) / 1000);
          if (currentSecond !== lastLoggedSecond) {
            lastLoggedSecond = currentSecond;
            addEvent("audio.state", {
              currentMs: state.currentMs,
              durationMs: state.durationMs,
              isPlaying: state.isPlaying
            });
          }
        }
      });
      lastLoggedSecond = -1;
      addEvent("audio.sample.loaded", {
        sample: sampleSelect.value,
        incident_id: incident?.id,
        mediaCount
      });
    }

    try {
      await initSamplePicker();
      updateSensitivityLabel();
      await mountSelectedSample();
    } catch (error) {
      console.error(error);
      host.innerHTML = '<div class="ui-empty-state"><strong>Audio demo failed to load.</strong><div>Check the sample payloads and audio paths for this page.</div></div>';
      addEvent("audio.demo.error", { message: error?.message || "Unknown error" });
    }

    sampleSelect.addEventListener("change", () => {
      mountSelectedSample().catch((error) => {
        console.error(error);
        addEvent("audio.sample.error", { sample: sampleSelect.value, message: error.message });
      });
    });

    styleSelect.addEventListener("change", () => {
      mountSelectedSample().catch((error) => {
        console.error(error);
        addEvent("audio.style.error", { style: styleSelect.value, message: error.message });
      });
    });

    themeSelect.addEventListener("change", () => {
      page.dataset.theme = themeSelect.value;
      addEvent("theme.toggle", { theme: themeSelect.value });
    });

    sensitivityRange.addEventListener("input", () => {
      updateSensitivityLabel();
      mountSelectedSample().catch((error) => {
        console.error(error);
        addEvent("audio.sensitivity.error", { sensitivity: getSensitivity(), message: error.message });
      });
    });
  </script>
</body>
</html>
