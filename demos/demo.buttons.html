<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buttons Demo</title>
  <link rel='stylesheet' href='../css/demo/demo.shell.css'>
  <style>
    body { margin: 0; padding: 24px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .page { max-width: 1100px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid #263146; border-radius: 10px; background: #111826; padding: 14px; display: grid; gap: 12px; }
    .row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
    .back { color: #b2c2e5; text-decoration: none; font-size: 13px; }
    .muted { margin: 0; color: #9fb2d8; font-size: 13px; line-height: 1.45; }
    pre { margin: 0; white-space: pre-wrap; font-size: 12px; font-family: Consolas, "Courier New", monospace; border: 1px solid #2b3750; border-radius: 8px; background: #0b1220; padding: 10px; overflow: auto; }
  </style>
  <script>
    window.demoMeta = {
      title: "Buttons",
      overview: "Reference page for shared button style classes used across the helper library.",
      useWhen: [
        "Use the shared button classes to keep action emphasis consistent across helper and app surfaces.",
        "Use this page to compare variants before choosing the narrowest appropriate emphasis."
      ],
      avoidWhen: [
        "Do not invent new button emphasis classes in app code when an existing helper variant is already close enough.",
        "Do not overload one screen with multiple primary actions."
      ],
      description: "This is a styling reference, not a JS helper. It exists because buttons were previously buried in the utilities catch-all page.",
      defaultSampleCode: "<button class=\"ui-button\">Default</button>\n<button class=\"ui-button ui-button-primary\">Primary</button>\n<button class=\"ui-button ui-button-danger\">Danger</button>",
      propertiesText: "No JS instance. This page documents shared button classes only."
    };
  </script>
  <script type='module' src='../js/demo/demo.shell.js'></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page" data-theme="dark">
    <section class="panel"><div class="row"><a class="back" href="./index.html">← Back to Home</a></div><h1 class="ui-title">Buttons Demo</h1><p class="muted">Reference page for shared button classes and emphasis variants.</p></section>
    <section class="panel">
      <h2 class="ui-title">Shared Button Styles</h2>
      <div class="row">
        <button class="ui-button" type="button">Default</button>
        <button class="ui-button ui-button-primary" type="button">Primary</button>
        <button class="ui-button ui-button-ghost" type="button">Ghost</button>
        <button class="ui-button ui-button-borderless" type="button">Borderless</button>
        <button class="ui-button ui-button-quiet" type="button">Quiet</button>
        <button class="ui-button ui-button-link" type="button">Link</button>
        <button class="ui-button ui-button-danger" type="button">Danger</button>
        <button class="ui-button ui-button-icon ui-button-ghost" type="button" aria-label="Settings" title="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true" width="16" height="16"><path d="M12 8.5a3.5 3.5 0 1 1 0 7a3.5 3.5 0 0 1 0-7zm8 3.5l-1.9-.6a6.9 6.9 0 0 0-.5-1.3l1-1.7l-1.8-1.8l-1.7 1a6.9 6.9 0 0 0-1.3-.5L12 4l-1.8.6a6.9 6.9 0 0 0-1.3.5l-1.7-1L5.4 5.9l1 1.7c-.2.4-.4.9-.5 1.3L4 12l.6 1.8c.1.4.3.9.5 1.3l-1 1.7l1.8 1.8l1.7-1c.4.2.9.4 1.3.5L12 20l1.8-.6c.4-.1.9-.3 1.3-.5l1.7 1l1.8-1.8l-1-1.7c.2-.4.4-.9.5-1.3L20 12z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <pre><button class="ui-button">Default</button>
<button class="ui-button ui-button-primary">Primary</button>
<button class="ui-button ui-button-danger">Danger</button>
<button class="ui-button ui-button-icon ui-button-ghost" aria-label="Settings">...</button></pre>
    </section>
  </main>
</body>
</html>
