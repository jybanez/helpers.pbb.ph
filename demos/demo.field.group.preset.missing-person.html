<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missing Person Field Group Preset Demo</title>
  <link rel="stylesheet" href="../css/demo/demo.shell.css">
  <style>
    body { margin: 0; padding: 24px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .page { max-width: 1180px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid #263146; border-radius: 8px; background: #111826; padding: 14px; display: grid; gap: 12px; }
    .row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
    .back { color: #b2c2e5; text-decoration: none; font-size: 13px; }
    .muted { margin: 0; color: #9fb2d8; font-size: 13px; line-height: 1.45; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(300px, 380px); gap: 14px; align-items: start; }
    .stack { display: grid; gap: 12px; }
    .log, pre:not(.log) { margin: 0; white-space: pre-wrap; font-size: 12px; font-family: Consolas, "Courier New", monospace; border: 1px solid #2b3750; border-radius: 8px; background: #0b1220; padding: 10px; overflow: auto; }
    .log { min-height: 260px; color: #b2c2e5; }
    @media (max-width: 920px) { .layout { grid-template-columns: 1fr; } }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.field.group", "ui.field.group.presets"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Missing Person Field Group Preset",
      overview: "Focused reference for repeatable missing-person intake fields.",
      useWhen: [
        "Use <code>fieldGroupPresets.missingPerson()</code> for incident reporting, missing-person registries, and related intake workflows.",
        "Use metadata-only <code>preset: \"missingPerson\"</code> or <code>config_json.preset</code> for incident type fields stored without duplicated <code>fields[]</code>."
      ],
      avoidWhen: ["Use <code>person()</code> when last-seen metadata is not part of the workflow."],
      description: "The missing-person preset extends person with last-seen days and last-seen location. It defaults to repeatable values.",
      defaultSampleCode: `const group = createFieldGroup(host, {
  name: "missing_persons",
  ...fieldGroupPresets.missingPerson({ label: "Missing Persons" }),
  value: [{
    last_name: "Dela Cruz",
    first_name: "Juan",
    gender: "Male",
    age: "17",
    last_seen_days: "2",
    last_seen_location: "Barangay Hall"
  }]
});`,
      constructor: [{ factory: "<code>fieldGroupPresets.missingPerson(options?)</code>", arguments: "optional preset overrides", returns: "Plain repeatable field-group config for <code>createFieldGroup(...)</code>" }],
      options: [
        { option: "<code>label</code>", default: "<code>\"Missing Person\"</code>", description: "Visible group label. Use plural labels for repeatable intake surfaces." },
        { option: "<code>repeatable</code>", default: "<code>true</code>", description: "Returns an array value by default." },
        { option: "<code>required</code>", default: "<code>false</code>", description: "Requires at least one non-empty missing-person entry when hosted by <code>createFieldGroup(...)</code>." },
        { option: "<code>fields</code>", default: "preset row layout", description: "Array replacement for the preset fields. Object overrides are merged by field key." },
        { option: "<code>preset</code>", default: "<code>undefined</code>", description: "Set to <code>\"missingPerson\"</code> on a group field to resolve this preset without duplicating <code>fields[]</code>." },
        { option: "<code>config_json.preset</code>", default: "<code>undefined</code>", description: "Backend-friendly metadata shape. JSON <code>{ \"preset\": \"missingPerson\", \"repeatable\": true }</code> resolves the same child fields." },
        { option: "<code>extraFields</code>", default: "<code>[]</code>", description: "Additional fields or field rows appended after the last-seen fields." }
      ],
      properties: [
        { property: "<code>repeatable</code>", type: "<code>boolean</code>", description: "Defaults to true because incident and registry workflows commonly capture multiple missing persons." },
        { property: "<code>fields</code>", type: "<code>Array</code>", description: "Person rows plus a last_seen_days/last_seen_location row." },
        { property: "<code>last_seen_days</code>", type: "<code>number</code>", description: "Uses <code>min: 0</code> for days since last seen." }
      ],
      events: [
        { event: "<code>onChange(value, meta)</code>", arguments: "<code>value</code> array, validation metadata", returns: "Provided to <code>createFieldGroup(...)</code>, not the preset factory." }
      ],
      methods: [
        { method: "<code>getValue()</code>", arguments: "none", returns: "Array of missing-person objects." },
        { method: "<code>setValue(value)</code>", arguments: "array of missing-person objects", returns: "<code>void</code>" },
        { method: "<code>validate()</code>", arguments: "none", returns: "<code>{ status, errors }</code>" },
        { method: "<code>update(options)</code>", arguments: "partial field-group options", returns: "<code>void</code>" }
      ]
    };
    window.fieldGroupPresetDemo = {
      presetKey: "missingPerson",
      name: "missing_persons",
      label: "Missing Persons",
      initialValue: [{ last_name: "Dela Cruz", first_name: "Juan", gender: "Male", age: "17", last_seen_days: "2", last_seen_location: "Barangay Hall" }],
      sampleValue: [
        { last_name: "Santos", first_name: "Maria", gender: "Female", age: "22", last_seen_days: "1", last_seen_location: "Public Market" },
        { last_name: "Cruz", first_name: "Ramon", gender: "Male", age: "64", last_seen_days: "3", last_seen_location: "Riverside Road" }
      ]
    };
  </script>
  <script type="module" src="../js/demo/demo.shell.js"></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page" data-theme="dark">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
      </div>
      <h1 class="ui-title">Missing Person Preset</h1>
      <p class="muted">Repeatable structured entries for missing-person intake.</p>
    </section>
    <section class="panel">
      <h2 class="ui-title">Missing Persons</h2>
      <div class="layout">
        <div class="stack">
          <div id="presetHost"></div>
          <div class="row">
            <button id="sampleBtn" class="ui-button" type="button">Set Sample</button>
            <button id="clearBtn" class="ui-button ui-button-ghost" type="button">Clear</button>
            <button id="validateBtn" class="ui-button ui-button-ghost" type="button">Validate</button>
          </div>
          <pre id="presetSchema"></pre>
        </div>
        <div class="stack">
          <pre id="presetLog" class="log">No changes yet.</pre>
          <button id="snapshotBtn" class="ui-button ui-button-ghost" type="button">Snapshot</button>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="../js/demo/demo.field.group.preset.js"></script>
</body>
</html>
