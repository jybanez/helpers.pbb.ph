<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Field Group Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.icons.css">
  <link rel="stylesheet" href="../css/ui/ui.checkbox.css">
  <link rel="stylesheet" href="../css/ui/ui.checkbox.group.css">
  <link rel="stylesheet" href="../css/ui/ui.combobox.css">
  <link rel="stylesheet" href="../css/ui/ui.number.stepper.css">
  <link rel="stylesheet" href="../css/ui/ui.field.group.css">
</head>
<body data-status="pending">
  <div id="host"></div>
  <div id="chromeLessHost"></div>
  <pre id="results">Running...</pre>

  <script type="module">
    import {
      createFieldGroup,
      isRepeatableFieldGroup,
      resolveFieldGroupFields
    } from "../js/ui/ui.field.group.js";

    const failures = [];
    const host = document.getElementById("host");
    const chromeLessHost = document.getElementById("chromeLessHost");
    const results = document.getElementById("results");

    const group = createFieldGroup(host, {
      name: "evacuees",
      label: "Evacuees",
      repeatable: true,
      value: [{ name: "Ana Reyes", gender: "Female", age: "34", local_citizen: "Yes" }],
      fields: [
        { key: "name", label: "Complete name", type: "text", required: true },
        [
          { key: "gender", label: "Gender", type: "select", options: ["Male", "Female"] },
          { key: "age", label: "Age", type: "number-stepper", min: 0, max: 120 }
        ],
        { key: "local_citizen", label: "Local citizen", type: "select", options: ["Yes", "No"] }
      ]
    });

    assertRowShape("initial");
    assertRepeatableHeader("initial");
    assert(group.getValue()[0]?.gender === "Female", "nested row field values should normalize into the same object");
    assert(Boolean(host.querySelector('[data-field-key="age"] .ui-number-stepper')), "number-stepper child fields should render the shared number stepper");
    host.querySelector('[data-field-key="age"] .ui-number-stepper-button-increment')?.click();
    assert(group.getValue()[0]?.age === 35, "number-stepper child fields should update group values");

    group.update({ label: "Registered Evacuees" });
    assertRowShape("after update");
    assertRepeatableHeader("after update");

    group.setValue([{ name: "Ben Cruz", gender: "Male", age: "9", local_citizen: "No" }]);
    assert(group.getValue()[0]?.age === 9, "setValue should preserve nested number-stepper row field values");

    const chromeLess = createFieldGroup(chromeLessHost, {
      name: "missing_persons",
      label: "Missing Persons",
      repeatable: true,
      chrome: false,
      value: [{ name: "Juan Dela Cruz" }],
      fields: [
        { key: "name", label: "Complete name", type: "text", required: true }
      ]
    });
    const chromeLessRoot = chromeLessHost.querySelector(".ui-field-group");
    const chromeLessBody = chromeLessHost.querySelector(".ui-field-group-body");
    assert(chromeLessRoot?.classList.contains("is-chrome-less"), "chrome:false should add chrome-less class");
    assert(chromeLessRoot?.dataset.chrome === "false", "chrome:false should set data chrome state");
    assert(chromeLessHost.querySelector(".ui-field-group-label-row")?.hidden === true, "chrome:false should hide the outer label row");
    assert(getComputedStyle(chromeLessHost.querySelector(".ui-field-group-label-row")).display === "none", "chrome:false should visually suppress the outer label row");
    assert(getComputedStyle(chromeLessBody).backgroundColor === "rgba(0, 0, 0, 0)", "chrome:false should remove group body background");
    assert(getComputedStyle(chromeLessBody).borderTopWidth === "0px", "chrome:false should remove group body border");
    assert(chromeLessHost.querySelector(".ui-field-group-item-title")?.textContent === "#1", "chrome:false should keep repeatable item content");

    chromeLess.update({ chrome: true });
    assert(!chromeLessRoot?.classList.contains("is-chrome-less"), "update({ chrome:true }) should restore chrome class state");
    assert(chromeLessRoot?.dataset.chrome === "true", "update({ chrome:true }) should restore data chrome state");
    assert(chromeLessHost.querySelector(".ui-field-group-label-row")?.hidden === false, "update({ chrome:true }) should restore label row");
    assert(getComputedStyle(chromeLessHost.querySelector(".ui-field-group-label-row")).display !== "none", "update({ chrome:true }) should visually restore label row");

    const presetHost = document.createElement("div");
    presetHost.style.width = "360px";
    document.body.appendChild(presetHost);
    const presetGroup = createFieldGroup(presetHost, {
      key: "missing",
      field_label: "Missing Details",
      input_type: "group",
      config_json: JSON.stringify({
        preset: "missingPerson",
        preset_label: "Missing Details",
        repeatable: true
      }),
      value: [{ name: "Liza Santos", gender: "Female", age: "28", last_seen_days: "2" }]
    });
    assert(isRepeatableFieldGroup({ config: { preset: "missingPerson" } }) === true, "preset metadata should resolve repeatable group options");
    assert(resolveFieldGroupFields({ config_json: JSON.stringify({ preset: "missingPerson" }) }).map((field) => field.key).join(",") === "name,last_name,first_name,gender,age,last_seen_days,last_seen_location", "preset metadata should resolve child fields without fields[]");
    assert(!presetHost.querySelector('[data-field-key="name"]'), "preset computed complete name should stay hidden");
    assert(Boolean(presetHost.querySelector('[data-field-key="last_name"] .ui-input')), "preset-backed groups should render split last name controls");
    assert(Boolean(presetHost.querySelector('[data-field-key="first_name"] .ui-input')), "preset-backed groups should render split first name controls");
    assert(Boolean(presetHost.querySelector('[data-field-key="last_seen_location"] .ui-combobox')), "preset-backed groups should render preset combobox child controls without expanded fields[]");
    assert(presetGroup.getValue()[0]?.last_seen_days === 2, "preset-backed groups should normalize preset number-stepper child values");
    presetGroup.update({ config: { preset: "evacuee" }, value: [{ name: "Liza Santos", local_citizen: "Yes" }] });
    assert(Boolean(presetHost.querySelector('[data-field-key="local_citizen"] .ui-input')), "updating preset metadata should refresh resolved child controls");
    assert(!presetHost.querySelector('[data-field-key="last_seen_location"]'), "updating preset metadata should remove stale preset child controls");
    presetGroup.update({ config: { preset: "missingPerson" }, value: [{ name: "Liza Santos", last_seen_location: "Gym" }] });
    const narrowItem = presetHost.querySelector(".ui-field-group-item")?.getBoundingClientRect();
    const narrowInput = presetHost.querySelector('[data-field-key="last_seen_location"] .ui-input')?.getBoundingClientRect();
    const inputStyle = getComputedStyle(presetHost.querySelector('[data-field-key="last_seen_location"] .ui-input'));
    assert(inputStyle.boxSizing === "border-box", "group child inputs should use border-box sizing");
    assert(narrowInput?.right <= narrowItem?.right + 1, "two-column group child inputs should stay inside the repeatable item border");

    const conditionalHost = document.createElement("div");
    document.body.appendChild(conditionalHost);
    const conditionalGroup = createFieldGroup(conditionalHost, {
      name: "patients",
      preset: "casualtyPatient",
      value: [{ last_name: "Rizal", first_name: "Jose", condition: "Critical", consciousness: "Conscious", triage_color: "Red", transported: "Yes" }]
    });
    const conditionSelect = conditionalHost.querySelector('[data-field-key="condition"] .ui-input');
    assert(Boolean(conditionalHost.querySelector('[data-field-key="consciousness"]')), "visibleWhen fields should render while their rule matches");
    assert(Boolean(conditionalHost.querySelector('[data-field-key="triage_color"]')), "visibleWhen row peers should render while their rule matches");
    assert(Boolean(conditionalHost.querySelector('[data-field-key="transported"]')), "visibleWhen fields should render before deceased status");
    conditionSelect.value = "Deceased";
    conditionSelect.dispatchEvent(new Event("change", { bubbles: true }));
    assert(!conditionalHost.querySelector('[data-field-key="consciousness"]'), "visibleWhen fields should hide when condition changes to deceased");
    assert(!conditionalHost.querySelector('[data-field-key="triage_color"]'), "visibleWhen row peers should hide when condition changes to deceased");
    assert(!conditionalHost.querySelector('[data-field-key="transported"]'), "visibleWhen fields should hide transported for deceased patients");
    assert(Boolean(conditionalHost.querySelector('[data-field-key="destination_facility"]')), "destination facility should stay visible for deceased patients");
    assert(Boolean(conditionalHost.querySelector('[data-field-key="destination_facility"] .ui-combobox')), "casualty patient destination facility should render the shared combobox input");

    const breakdownHost = document.createElement("div");
    document.body.appendChild(breakdownHost);
    const breakdownGroup = createFieldGroup(breakdownHost, {
      name: "families",
      repeatable: true,
      value: [{ household_head: "Ana", adult_count: 2, children_count: 3 }],
      validations: [
        {
          type: "sum_eq",
          fields: ["adult_male_count", "adult_female_count"],
          maxField: "adult_count",
          message: "Adult male + female counts should equal adult count."
        }
      ],
      fields: [
        { key: "household_head", label: "Household head", type: "text" },
        [
          {
            key: "adult_count",
            label: "Adult count",
            type: "number-stepper",
            min: 0,
            allowEmpty: false,
            breakdown: {
              label: "Adult breakdown",
              fields: [
                [
                  { key: "adult_male_count", label: "Male", type: "number-stepper", min: 0 },
                  { key: "adult_female_count", label: "Female", type: "number-stepper", min: 0 }
                ],
                [
                  { key: "adult_pregnant_count", label: "Pregnant", type: "number-stepper", min: 0 },
                  null
                ]
              ]
            }
          },
          { key: "children_count", label: "Children count", type: "number-stepper", min: 0, allowEmpty: false }
        ],
        { key: "member_count", label: "Member count", type: "number-stepper", min: 0, readonly: true, allowEmpty: false, computed: "adult_count + children_count", hidden: true }
      ]
    });
    assert(breakdownGroup.getValue()[0]?.member_count === 5, "computed fields should initialize from their expression");
    assert(!breakdownHost.querySelector('[data-field-key="member_count"]'), "hidden computed fields should stay out of the rendered operator UI");
    let breakdownToggle = breakdownHost.querySelector('[data-field-key="adult_count"] .ui-field-group-breakdown-toggle');
    assert(Boolean(breakdownToggle), "fields with breakdown should render a breakdown toggle");
    assert(breakdownToggle?.getAttribute("aria-expanded") === "false", "breakdown should start collapsed by default");
    breakdownGroup.setValue([{ household_head: "Ana", adult_count: 2, children_count: 3, adult_male_count: 1 }]);
    assert(breakdownGroup.validate().warnings?.length === 0, "collapsed breakdowns should not validate breakdown rules even when subfield values exist");
    breakdownToggle = breakdownHost.querySelector('[data-field-key="adult_count"] .ui-field-group-breakdown-toggle');
    breakdownToggle.click();
    assert(breakdownGroup.validate().warnings?.length === 1, "enabled breakdowns should validate breakdown rules");
    assert(Boolean(breakdownHost.querySelector(".ui-field-group-breakdown")), "breakdown toggle should reveal subfields");
    assert(getComputedStyle(breakdownHost.querySelector(".ui-field-group-breakdown")).gridColumnStart === "1", "expanded breakdown should start at the first parent row column");
    assert(getComputedStyle(breakdownHost.querySelector(".ui-field-group-breakdown")).gridColumnEnd === "-1", "expanded breakdown should span the full parent field row");
    const placeholderRow = Array.from(breakdownHost.querySelectorAll(".ui-field-group-breakdown-row")).find((candidate) => candidate.querySelector(".ui-field-group-placeholder"));
    assert(placeholderRow?.style.getPropertyValue("--ui-field-group-columns") === "2", "breakdown placeholder rows should preserve two-column layout");
    assert(breakdownHost.querySelector('[data-field-key="adult_female_count"] .ui-number-stepper-input')?.value === "", "empty breakdown subfield values should stay flat in the group item");
    breakdownHost.querySelector('[data-field-key="adult_count"] .ui-number-stepper-button-increment')?.click();
    assert(breakdownGroup.getValue()[0]?.member_count === 6, "computed fields should update when dependencies change");
    assert(!breakdownHost.querySelector('[data-field-key="member_count"]'), "hidden computed fields should remain hidden after computed updates");
    breakdownGroup.setValue([{ household_head: "Ana", adult_count: 2, children_count: 3, adult_male_count: 1, adult_female_count: 1 }]);
    assert(!breakdownHost.querySelector(".ui-field-group-item-warning:not([hidden])"), "valid breakdown values should not show warning indicators");
    assert(Boolean(breakdownHost.querySelector(".ui-field-group-breakdown-warning.is-valid")), "valid enabled breakdown rules should render muted validation text");
    assert(!breakdownHost.querySelector(".ui-field-group-breakdown-warning.is-invalid"), "valid enabled breakdown rules should not render highlighted validation text");
    breakdownHost.querySelector('[data-field-key="adult_female_count"] .ui-number-stepper-button-increment')?.click();
    const breakdownValidation = breakdownGroup.validate();
    assert(breakdownValidation.status === true, "warning-only field group validation should not block status");
    assert(breakdownValidation.warnings?.length === 1, "field group validation should return warning entries");
    assert(breakdownGroup.getValue()[0]?.adult_female_count === 2, "auto-validation should keep changed breakdown values");
    assert(breakdownHost.querySelector(".ui-field-group-item-warning")?.textContent === "1 warning", "repeatable items should show warning counts");
    assert(Boolean(breakdownHost.querySelector('[data-field-key="adult_count"] .ui-field-group-warning-badge')), "collapsed breakdown parents should show a warning badge");
    assert(Boolean(breakdownHost.querySelector(".ui-field-group-breakdown-warning.is-invalid")), "invalid enabled breakdown rules should highlight existing validation text");

    const narrowStepperHost = document.createElement("div");
    narrowStepperHost.style.width = "280px";
    document.body.appendChild(narrowStepperHost);
    const narrowStepperGroup = createFieldGroup(narrowStepperHost, {
      name: "affected_families",
      repeatable: true,
      value: [{ adult_count: 0, children_count: 0 }],
      fields: [
        [
          { key: "adult_count", label: "Adult count", type: "number-stepper", min: 0 },
          { key: "children_count", label: "Children count", type: "number-stepper", min: 0 }
        ]
      ]
    });
    const narrowRow = narrowStepperHost.querySelector(".ui-field-group-row");
    const adultChild = narrowStepperHost.querySelector('[data-field-key="adult_count"]');
    const childrenChild = narrowStepperHost.querySelector('[data-field-key="children_count"]');
    const adultStepper = adultChild?.querySelector(".ui-number-stepper");
    const childrenStepper = childrenChild?.querySelector(".ui-number-stepper");
    const narrowItemRect = narrowStepperHost.querySelector(".ui-field-group-item")?.getBoundingClientRect();
    const adultStepperRect = adultStepper?.getBoundingClientRect();
    const childrenStepperRect = childrenStepper?.getBoundingClientRect();
    assert(getComputedStyle(narrowRow).gridTemplateColumns.split(" ").length === 1, "narrow field group rows should stack based on component width");
    assert(adultStepperRect?.right <= narrowItemRect?.right + 1, "narrow adult number-stepper should stay inside the repeatable item border");
    assert(childrenStepperRect?.right <= narrowItemRect?.right + 1, "narrow children number-stepper should stay inside the repeatable item border");
    assert(childrenStepperRect?.top > adultStepperRect?.bottom, "narrow sibling number-steppers should not overlap vertically");

    const roadAccessHost = document.createElement("div");
    document.body.appendChild(roadAccessHost);
    const roadAccessGroup = createFieldGroup(roadAccessHost, {
      name: "road_access",
      preset: "roadAccessStatus",
      value: [{ route_location: "Coastal Road", status: "Open", obstruction_type: "Flooding" }]
    });
    assert(Boolean(roadAccessHost.querySelector('[data-field-key="route_location"] .ui-combobox')), "road access route/location should render the shared combobox input");
    assert(!roadAccessHost.querySelector('[data-field-key="obstruction_type"]'), "road access obstruction type should stay hidden while access is passable");
    const accessSelect = roadAccessHost.querySelector('[data-field-key="status"] .ui-input');
    accessSelect.value = "Blocked";
    accessSelect.dispatchEvent(new Event("change", { bubbles: true }));
    assert(Boolean(roadAccessHost.querySelector('[data-field-key="obstruction_type"]')), "road access obstruction type should render when access is blocked");
    roadAccessGroup.setValue([{ route_location: "Coastal Road", status: "Blocked", passable_by_vehicle_type: [] }]);
    const blockedValidation = roadAccessGroup.validate();
    assert(blockedValidation.warnings?.some((warning) => warning.field_key === "road_access.0.obstruction_type"), "road access should warn when blocked access has no obstruction type");
    assert(Boolean(roadAccessHost.querySelector('[data-field-key="obstruction_type"] .ui-field-group-warning-badge')), "road access obstruction warnings should show a field warning badge");
    roadAccessGroup.setValue([{ route_location: "Coastal Road", status: "Closed", obstruction_type: "Flooding", passable_by_vehicle_type: ["Pedestrian"] }]);
    const closedValidation = roadAccessGroup.validate();
    assert(closedValidation.warnings?.some((warning) => warning.field_key === "road_access.0.passable_by_vehicle_type"), "road access should warn when closed access has passable vehicle types");
    assert(!roadAccessHost.querySelector('[data-field-key="passable_by_vehicle_type"]'), "closed road access should hide passable vehicle choices");
    assert(Boolean(roadAccessHost.querySelector('[data-field-key="passability_warning"] .ui-field-group-notice.is-warning')), "closed road access should render a highlighted passability warning notice");
    assert(
      roadAccessHost.querySelector('[data-field-key="passability_warning"] .ui-field-group-notice')?.textContent.includes("not passable"),
      "closed road access warning should explain that the route is not passable"
    );

    chromeLess.destroy();
    presetGroup.destroy();
    presetHost.remove();
    conditionalGroup.destroy();
    conditionalHost.remove();
    breakdownGroup.destroy();
    breakdownHost.remove();
    narrowStepperGroup.destroy();
    narrowStepperHost.remove();
    roadAccessGroup.destroy();
    roadAccessHost.remove();
    group.destroy();
    assert(host.innerHTML.trim() === "", "destroy should remove field group markup");
    assert(chromeLessHost.innerHTML.trim() === "", "destroy should remove chrome-less field group markup");

    if (failures.length) {
      document.body.dataset.status = "fail";
      results.textContent = `FAIL\n${failures.map((line) => `- ${line}`).join("\n")}`;
    } else {
      document.body.dataset.status = "pass";
      results.textContent = "PASS";
    }

    function assertRowShape(label) {
      const rows = host.querySelectorAll(".ui-field-group-row");
      assert(rows.length === 3, `${label}: nested declarations should render three field rows`);
      assert(rows[0]?.style.getPropertyValue("--ui-field-group-columns") === "1", `${label}: object declaration should render one-column row`);
      assert(rows[1]?.style.getPropertyValue("--ui-field-group-columns") === "2", `${label}: nested array declaration should render two-column row`);
      assert(rows[2]?.style.getPropertyValue("--ui-field-group-columns") === "1", `${label}: trailing object declaration should render one-column row`);
    }

    function assertRepeatableHeader(label) {
      const title = host.querySelector(".ui-field-group-item-title");
      const remove = host.querySelector(".ui-field-group-remove");
      assert(title?.textContent === "#1", `${label}: repeatable group item title should render as #number`);
      assert(remove?.textContent.trim() === "", `${label}: remove button should be icon-only`);
      assert(remove?.getAttribute("aria-label") === "Remove #1", `${label}: remove button should keep accessible remove label`);
      assert(remove?.querySelector('[data-icon="actions.delete"]'), `${label}: remove button should render delete icon`);
    }

    function assert(condition, message) {
      if (!condition) {
        failures.push(message);
      }
    }
  </script>
</body>
</html>
