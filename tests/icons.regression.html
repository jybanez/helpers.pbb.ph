<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Icons Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.icons.css">
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    #results {
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body data-status="pending">
  <div id="host"></div>
  <pre id="results">Running...</pre>

  <script type="module">
    import { createIcon, getIconDefinition, listIcons, listIconCategories } from "../js/ui/ui.icons.js";

    const failures = [];
    const host = document.getElementById("host");
    const results = document.getElementById("results");
    window.addEventListener("error", (event) => {
      failures.push(`error: ${event.message}`);
      finish();
    });
    window.addEventListener("unhandledrejection", (event) => {
      failures.push(`rejection: ${String(event.reason?.message || event.reason || "unknown")}`);
      finish();
    });

    try {
      const categories = listIconCategories();
      const names = listIcons();
      const operationalCategories = [
        "alert",
        "hazard",
        "map",
        "notifications",
        "population",
        "quality",
        "resource",
        "route",
        "sitrep",
        "team",
      ];
      const operationalNames = [
        "sitrep.report",
        "sitrep.summary",
        "sitrep.situation",
        "sitrep.gaps",
        "sitrep.needs",
        "sitrep.actions",
        "sitrep.population",
        "sitrep.damage",
        "sitrep.source",
        "sitrep.consolidated",
        "alert.normal",
        "alert.elevated",
        "alert.critical",
        "alert.watch",
        "alert.escalate",
        "hazard.flood",
        "hazard.fire",
        "hazard.medical",
        "hazard.rescue",
        "hazard.landslide",
        "hazard.infrastructure",
        "hazard.vehicle",
        "hazard.public-safety",
        "hazard.missing-person",
        "hazard.evacuation",
        "population.people-at-risk",
        "population.people-helped",
        "population.family",
        "population.children",
        "population.senior",
        "population.pwd",
        "population.pregnant",
        "population.patient",
        "population.displaced",
        "population.shelter",
        "route.clear",
        "route.limited",
        "route.blocked",
        "route.caution",
        "route.obstruction",
        "route.bridge",
        "route.road",
        "resource.requested",
        "resource.deployed",
        "resource.shortage",
        "resource.medical-supplies",
        "resource.food-water",
        "resource.rescue-equipment",
        "resource.heavy-equipment",
        "resource.sanitation",
        "resource.shelter-supplies",
        "resource.transport",
        "team.rescue",
        "team.medical",
        "team.law-enforcement",
        "team.fire",
        "team.engineering",
        "team.social-services",
        "team.public-safety",
        "team.assessment",
        "team.command",
        "map.boundary",
        "map.cluster",
        "map.hotspot",
        "map.source-hub",
        "map.target-hub",
        "map.uplink",
        "map.coverage-area",
        "community.badge",
        "community.award",
        "community.medal",
        "community.certificate",
        "quality.verified",
        "quality.unverified",
        "quality.partial",
        "quality.duplicate-risk",
        "quality.stale",
        "quality.redacted",
      ];

      assert(categories.length === 22, "icons registry should expose 22 categories");
      assert(names.includes("actions.close"), "icons registry should include actions.close");
      assert(names.includes("actions.hide"), "icons registry should include actions.hide");
      assert(names.includes("actions.settings"), "icons registry should include actions.settings");
      assert(names.includes("actions.options"), "icons registry should include actions.options");
      assert(names.includes("actions.lock"), "icons registry should include actions.lock");
      assert(names.includes("actions.unlock"), "icons registry should include actions.unlock");
      assert(names.includes("actions.volume"), "icons registry should include actions.volume");
      assert(names.includes("actions.volume-muted"), "icons registry should include actions.volume-muted");
      assert(names.includes("actions.sound-on"), "icons registry should include actions.sound-on alias");
      assert(names.includes("actions.sound-off"), "icons registry should include actions.sound-off alias");
      assert(names.includes("actions.rotate-left"), "icons registry should include actions.rotate-left");
      assert(names.includes("actions.rotate-right"), "icons registry should include actions.rotate-right");
      assert(names.includes("media.gamepad"), "icons registry should include media.gamepad");
      assert(names.includes("media.video"), "icons registry should include media.video");
      assert(names.includes("media.microphone"), "icons registry should include media.microphone");
      assert(names.includes("community.badge"), "icons registry should include community.badge");
      assert(names.includes("community.award"), "icons registry should include community.award");
      assert(names.includes("community.medal"), "icons registry should include community.medal");
      assert(names.includes("community.certificate"), "icons registry should include community.certificate");
      assert(names.includes("people.user"), "icons registry should include people.user");
      assert(names.includes("people.userBlocked"), "icons registry should include people.userBlocked");
      assert(names.includes("people.userAllowed"), "icons registry should include people.userAllowed");
      assert(names.includes("people.profile"), "icons registry should include people.profile");
      assert(names.includes("people.account"), "icons registry should include people.account");
      assert(names.includes("notifications.muted"), "icons registry should include notifications.muted");
      assert(names.includes("notifications.unmuted"), "icons registry should include notifications.unmuted");
      assert(names.includes("workflow.requested"), "icons registry should include workflow.requested");
      assert(names.includes("places.pin"), "icons registry should include places.pin");
      assert(names.includes("time.clock"), "icons registry should include time.clock");
      assert(names.includes("comms.phone"), "icons registry should include comms.phone");
      assert(names.includes("comms.envelope"), "icons registry should include comms.envelope");
      assert(names.includes("comms.envelope-plus"), "icons registry should include comms.envelope-plus");
      assert(names.includes("comms.envelope-minus"), "icons registry should include comms.envelope-minus");
      assert(names.includes("comms.envelope-open"), "icons registry should include comms.envelope-open");
      assert(names.includes("comms.notification"), "icons registry should include comms.notification");
      assert(names.includes("assets.vehicle"), "icons registry should include assets.vehicle");
      operationalCategories.forEach((category) => {
        assert(categories.includes(category), `icons registry should include ${category} category`);
      });
      operationalNames.forEach((name) => {
        assert(names.includes(name), `icons registry should include ${name}`);
        assert(getIconDefinition(name)?.nodes?.length > 0, `${name} should resolve to drawable nodes`);
        const node = createIcon(name, { title: name, decorative: false });
        assert(node.getAttribute("data-icon") === name, `${name} should render with its icon id`);
        assert(node.getAttribute("stroke") === "currentColor", `${name} should inherit currentColor`);
      });

      const closeIcon = createIcon("actions.close", { size: 18, title: "Close", decorative: false });
      host.appendChild(closeIcon);
      assert(closeIcon.tagName.toLowerCase() === "svg", "createIcon should return an svg element");
      assert(closeIcon.getAttribute("data-icon") === "actions.close", "createIcon should stamp the icon id");
      assert(closeIcon.getAttribute("width") === "18", "createIcon should apply the requested size");
      assert(closeIcon.getAttribute("aria-label") === "Close", "non-decorative icons should expose an aria-label");

      const viewIcon = createIcon("actions.view");
      const hideIcon = createIcon("actions.hide");
      const settingsIcon = createIcon("actions.settings");
      const lockIcon = createIcon("actions.lock");
      const unlockIcon = createIcon("actions.unlock");
      const volumeIcon = createIcon("actions.volume");
      const mutedIcon = createIcon("actions.volume-muted");
      const soundOnIcon = createIcon("actions.sound-on");
      const soundOffIcon = createIcon("actions.sound-off");
      const rotateLeftIcon = createIcon("actions.rotate-left");
      const rotateRightIcon = createIcon("actions.rotate-right");
      const gamepadIcon = createIcon("media.gamepad");
      const envelopeIcon = createIcon("comms.envelope");
      const envelopePlusIcon = createIcon("comms.envelope-plus");
      const envelopeMinusIcon = createIcon("comms.envelope-minus");
      const envelopeOpenIcon = createIcon("comms.envelope-open");
      const userBlockedIcon = createIcon("people.userBlocked");
      const userAllowedIcon = createIcon("people.userAllowed");
      const notificationsMutedIcon = createIcon("notifications.muted");
      const notificationsUnmutedIcon = createIcon("notifications.unmuted");
      host.append(viewIcon, hideIcon, settingsIcon, lockIcon, unlockIcon, volumeIcon, mutedIcon, soundOnIcon, soundOffIcon, rotateLeftIcon, rotateRightIcon, gamepadIcon, envelopeIcon, envelopePlusIcon, envelopeMinusIcon, envelopeOpenIcon, userBlockedIcon, userAllowedIcon, notificationsMutedIcon, notificationsUnmutedIcon);
      assert(viewIcon.querySelector("path")?.getAttribute("d")?.length > 0, "actions.view should render a valid outline path");
      assert(hideIcon.querySelector("path")?.getAttribute("d")?.length > 0, "actions.hide should render a valid outline path");
      assert(settingsIcon.querySelector('path[d*="h-.44"]'), "actions.settings should render a lobed gear outline path");
      assert(!settingsIcon.querySelector('circle[r="7"]'), "actions.settings should not render the old bearing-style outer circle");
      assert(lockIcon.querySelector('rect[x="5"][y="10"]'), "actions.lock should render a lock body");
      assert(lockIcon.querySelector('path[d="M8 10V7a4 4 0 0 1 8 0v3"]'), "actions.lock should render a closed shackle");
      assert(unlockIcon.querySelector('path[d="M8 10V7a4 4 0 0 1 7.5-1.9"]'), "actions.unlock should render an open shackle");
      assert(volumeIcon.querySelector('path[d="M4 10v4h4l5 4V6l-5 4H4z"]'), "actions.volume should render a speaker path");
      assert(volumeIcon.querySelector('path[d="M16 9a4 4 0 0 1 0 6"]'), "actions.volume should render a sound wave path");
      assert(mutedIcon.querySelector('line[x1="16"][y1="9"][x2="21"][y2="14"]'), "actions.volume-muted should render a mute slash");
      assert(soundOnIcon.querySelector('path[d="M18.5 6.5a7 7 0 0 1 0 11"]'), "actions.sound-on alias should render volume nodes");
      assert(soundOffIcon.querySelector('line[x1="21"][y1="9"][x2="16"][y2="14"]'), "actions.sound-off alias should render muted nodes");
      assert(rotateLeftIcon.querySelector('path[d="M4 5v5h5"]'), "actions.rotate-left should render a valid left rotation arrowhead path");
      assert(rotateRightIcon.querySelector('path[d="M20 5v5h-5"]'), "actions.rotate-right should render a valid right rotation arrowhead path");
      assert(gamepadIcon.querySelector('path[d*="4.5 4.5"]'), "media.gamepad should render a controller body");
      assert(gamepadIcon.querySelector('line[x1="7"][y1="13"][x2="11"][y2="13"]'), "media.gamepad should render a directional control");
      assert(envelopeIcon.querySelector('rect[x="3.5"][y="6"]'), "comms.envelope should render a closed envelope body");
      assert(envelopeIcon.querySelector('path[d="M4.5 8l7.5 5.5L19.5 8"]'), "comms.envelope should render a closed flap");
      assert(envelopePlusIcon.querySelector('rect[x="2.5"][y="8"]'), "comms.envelope-plus should render a smaller compact envelope body");
      assert(envelopePlusIcon.querySelector('path[d="M3.5 10l4.25 3L12 10"]'), "comms.envelope-plus should render a smaller compact flap");
      assert(envelopePlusIcon.querySelector('line[x1="18.5"][y1="9"][x2="18.5"][y2="15"][stroke-width="5.6"]'), "comms.envelope-plus should render a double-weight detached plus vertical stroke");
      assert(envelopePlusIcon.querySelector('line[x1="15.5"][y1="12"][x2="21.5"][y2="12"][stroke-width="5.6"]'), "comms.envelope-plus should render a double-weight detached plus horizontal stroke");
      assert(envelopeMinusIcon.querySelector('rect[x="2.5"][y="8"]'), "comms.envelope-minus should render a smaller compact envelope body");
      assert(envelopeMinusIcon.querySelector('path[d="M3.5 10l4.25 3L12 10"]'), "comms.envelope-minus should render a smaller compact flap");
      assert(envelopeMinusIcon.querySelector('line[x1="15.5"][y1="12"][x2="21.5"][y2="12"][stroke-width="5.6"]'), "comms.envelope-minus should render a double-weight detached minus stroke");
      assert(envelopeOpenIcon.querySelector('path[d="M4 10l8-5 8 5v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8Z"]'), "comms.envelope-open should render an opened envelope body");
      assert(envelopeOpenIcon.querySelector('path[d="M4.5 10.5 12 15l7.5-4.5"]'), "comms.envelope-open should render an opened flap");
      assert(userBlockedIcon.querySelector('line[x1="16"][y1="10"][x2="21"][y2="15"]'), "people.userBlocked should render a user-x slash");
      assert(userBlockedIcon.querySelector('line[x1="21"][y1="10"][x2="16"][y2="15"]'), "people.userBlocked should render a user-x cross stroke");
      assert(userAllowedIcon.querySelector('polyline[points="15.5 13 18 15.5 22 10.5"]'), "people.userAllowed should render a user-check mark");
      assert(notificationsUnmutedIcon.querySelector('path[d="M12 5a4 4 0 0 0-4 4v2.5c0 1-.4 2-1.1 2.7L5.5 16h13l-1.4-1.8a4 4 0 0 1-1.1-2.7V9a4 4 0 0 0-4-4Z"]'), "notifications.unmuted should render a bell body");
      assert(notificationsMutedIcon.querySelector('line[x1="5"][y1="21"][x2="21"][y2="5"]'), "notifications.muted should render a bell-off slash");

      const decorative = createIcon("status.info");
      assert(decorative.getAttribute("aria-hidden") === "true", "decorative icons should be aria-hidden by default");

      const definition = getIconDefinition("data.grid");
      assert(definition?.category === "data", "getIconDefinition should return the correct category");
      assert(Array.isArray(definition?.nodes) && definition.nodes.length > 0, "getIconDefinition should expose icon nodes");

      const workflow = getIconDefinition("workflow.on-scene");
      assert(workflow?.category === "workflow", "getIconDefinition should expose workflow icon categories");
      const asset = getIconDefinition("assets.document");
      assert(asset?.category === "assets", "getIconDefinition should expose assets icon categories");

      let threw = false;
      try {
        createIcon("missing.icon");
      } catch (_error) {
        threw = true;
      }
      assert(threw, "createIcon should throw for unknown icon ids");
    } catch (error) {
      failures.push(`exception: ${String(error?.message || error)}`);
    }
    finish();

    function assert(condition, message) {
      if (!condition) {
        failures.push(message);
      }
    }

    function finish() {
      if (failures.length) {
        document.body.dataset.status = "fail";
        results.textContent = `FAIL\n${failures.map((item) => `- ${item}`).join("\n")}`;
      } else {
        document.body.dataset.status = "pass";
        results.textContent = "PASS";
      }
    }
  </script>
</body>
</html>
