<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Icons Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.icons.css">
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    #results {
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body data-status="pending">
  <div id="host"></div>
  <pre id="results">Running...</pre>

  <script type="module">
    import { createIcon, getIconDefinition, listIcons, listIconCategories } from "../js/ui/ui.icons.js";

    const failures = [];
    const host = document.getElementById("host");
    const results = document.getElementById("results");
    window.addEventListener("error", (event) => {
      failures.push(`error: ${event.message}`);
      finish();
    });
    window.addEventListener("unhandledrejection", (event) => {
      failures.push(`rejection: ${String(event.reason?.message || event.reason || "unknown")}`);
      finish();
    });

    try {
      const categories = listIconCategories();
      const names = listIcons();

      assert(categories.length === 5, "icons registry should expose 5 categories in V1");
      assert(names.includes("actions.close"), "icons registry should include actions.close");
      assert(names.includes("media.video"), "icons registry should include media.video");

      const closeIcon = createIcon("actions.close", { size: 18, title: "Close", decorative: false });
      host.appendChild(closeIcon);
      assert(closeIcon.tagName.toLowerCase() === "svg", "createIcon should return an svg element");
      assert(closeIcon.getAttribute("data-icon") === "actions.close", "createIcon should stamp the icon id");
      assert(closeIcon.getAttribute("width") === "18", "createIcon should apply the requested size");
      assert(closeIcon.getAttribute("aria-label") === "Close", "non-decorative icons should expose an aria-label");

      const decorative = createIcon("status.info");
      assert(decorative.getAttribute("aria-hidden") === "true", "decorative icons should be aria-hidden by default");

      const definition = getIconDefinition("data.grid");
      assert(definition?.category === "data", "getIconDefinition should return the correct category");
      assert(Array.isArray(definition?.nodes) && definition.nodes.length > 0, "getIconDefinition should expose icon nodes");

      let threw = false;
      try {
        createIcon("missing.icon");
      } catch (_error) {
        threw = true;
      }
      assert(threw, "createIcon should throw for unknown icon ids");
    } catch (error) {
      failures.push(`exception: ${String(error?.message || error)}`);
    }
    finish();

    function assert(condition, message) {
      if (!condition) {
        failures.push(message);
      }
    }

    function finish() {
      if (failures.length) {
        document.body.dataset.status = "fail";
        results.textContent = `FAIL\n${failures.map((item) => `- ${item}`).join("\n")}`;
      } else {
        document.body.dataset.status = "pass";
        results.textContent = "PASS";
      }
    }
  </script>
</body>
</html>
