      document.body.dataset.status = "fail";
      result.textContent = `FAIL ${error.message || error}`;
    });

    async function run() {
      for (const testCase of cases) {
        await loadCase(testCase);
      }
      document.body.dataset.status = "pass";
      result.textContent = "PASS";
    }

    async function loadCase(testCase) {
      await loadFrame(testCase.url);
      await waitFor(() => frame.contentDocument?.querySelector(".demo-shell-theme__select"), 10000);
      const doc = frame.contentDocument;
      await waitFor(() => testCase.selectors.every((selector) => doc.querySelector(selector)), 10000);

      const select = doc.querySelector(".demo-shell-theme__select");
      select.value = "care-light";
      select.dispatchEvent(new Event("change", { bubbles: true }));
      await delay(220);
      const after = snapshot(doc, testCase.selectors);

      testCase.selectors.forEach((selector, index) => {
        assert(!testCase.stale.includes(after[index]), `${testCase.label} ${selector} should not keep stale dark background ${after[index]}`);
      });

      if (testCase.textSelectors?.length) {
        await waitFor(() => testCase.textSelectors.every((selector) => doc.querySelector(selector)), 10000);
        const textAfter = snapshot(doc, testCase.textSelectors, "color");
        testCase.textSelectors.forEach((selector, index) => {
          assert(
            !testCase.staleText.includes(textAfter[index]),
            `${testCase.label} ${selector} should not keep stale dark text color ${textAfter[index]}`
          );
        });
      }
    }

    function loadFrame(url) {
      return new Promise((resolve) => {
        frame.addEventListener("load", resolve, { once: true });
        frame.src = url;
      });
    }

    function snapshot(doc, selectors, property = "backgroundColor") {
      return selectors.map((selector) => getComputedStyle(doc.querySelector(selector))[property]);
    }

    async function waitFor(predicate, timeout = 4000) {
      const started = performance.now();
      while (performance.now() - started < timeout) {
        if (predicate()) {
          return;
        }
        await delay(40);
      }
      throw new Error("Timed out waiting for condition");
    }

    function delay(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message);
      }
    }
