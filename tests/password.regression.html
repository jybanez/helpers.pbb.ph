<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Field Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.modal.css">
  <link rel="stylesheet" href="../css/ui/ui.form.modal.css">
  <link rel="stylesheet" href="../css/ui/ui.password.css">
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    #results {
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }
    #host {
      max-width: 320px;
    }
  </style>
</head>
<body data-status="pending">
  <div id="host"></div>
  <pre id="results">Running...</pre>

  <script type="module">
    import { createPasswordField } from "../js/ui/ui.password.js";
    import { createLoginFormModal, createReauthFormModal, createChangePasswordFormModal } from "../js/ui/ui.form.modal.presets.js";

    const results = document.getElementById("results");
    const failures = [];
    const host = document.getElementById("host");
    let changeCount = 0;
    let lastVisible = null;

    const password = createPasswordField(host, {
      id: "standalone-password",
      name: "standalone_password",
      value: "seed",
      onChange() {
        changeCount += 1;
      },
      onToggle(visible) {
        lastVisible = visible;
      },
    });

    assert(password.getValue() === "seed", "standalone password field should expose initial value");
    assert(password.input.type === "password", "standalone password field should default to hidden input type");
    assert(Boolean(password.toggle.querySelector('svg[data-icon="actions.view"]')), "standalone password field should render the view icon when hidden");
    assert(password.toggle.getAttribute("aria-label") === "Show password", "standalone password field should expose the icon toggle label");
    password.toggle.click();
    assert(password.input.type === "text", "toggle should reveal standalone password value");
    assert(Boolean(password.toggle.querySelector('svg[data-icon="actions.hide"]')), "standalone password field should render the hide icon when visible");
    assert(password.isVisible() === true && lastVisible === true, "toggle should update standalone visible state");
    password.setValue("correct-password");
    assert(password.getValue() === "correct-password", "setValue should update standalone password field");
    password.update({ disabled: true });
    assert(password.input.disabled === true && password.toggle.disabled === true, "update should disable standalone field and toggle");
    password.update({ disabled: false, visible: false });
    password.input.value = "changed";
    password.input.dispatchEvent(new Event("input", { bubbles: true }));
    assert(changeCount >= 1, "standalone password field should notify on input");

    password.destroy();
    assert(host.innerHTML.trim() === "", "destroy should clear standalone password container");

    const loginModal = createLoginFormModal({
      initialValues: {
        user_password: "correct-password",
      },
      fields: {
        identifier: "user_email",
        password: "user_password",
      },
      onSubmit() {
        return true;
      },
    });

    loginModal.open();
    await wait(80);

    const loginPasswordInput = document.querySelector('input[name="user_password"]');
    const loginPasswordToggle = loginPasswordInput?.closest(".ui-form-modal-field")?.querySelector(".ui-password-toggle");
    assert(Boolean(loginPasswordToggle), "login preset should render shared password toggle");
    assert(loginPasswordInput?.type === "password", "login preset password should start hidden");
    loginPasswordToggle.click();
    assert(loginPasswordInput?.type === "text", "login preset password toggle should reveal value");
    loginModal.destroy();
    await wait(80);

    const reauthModal = createReauthFormModal({
      fields: {
        identifier: "account_email",
        password: "reauth_password",
      },
      identifierValue: "operator@pbb.ph",
      initialValues: {
        reauth_password: "correct-password",
      },
      onSubmit() {
        return true;
      },
    });

    reauthModal.open();
    await wait(80);

    const reauthPasswordInput = document.querySelector('input[name="reauth_password"]');
    const reauthPasswordToggle = reauthPasswordInput?.closest(".ui-form-modal-field")?.querySelector(".ui-password-toggle");
    assert(Boolean(reauthPasswordToggle), "reauth preset should render shared password toggle");
    assert(reauthPasswordInput?.type === "password", "reauth preset password should start hidden");
    reauthPasswordToggle.click();
    assert(reauthPasswordInput?.type === "text", "reauth preset toggle should reveal password");
    reauthModal.destroy();
    await wait(80);

    const changePasswordModal = createChangePasswordFormModal({
      initialValues: {
        current_password: "old-secret",
        new_password: "new-secret",
        confirm_password: "new-secret",
      },
      onSubmit() {
        return true;
      },
    });

    changePasswordModal.open();
    await wait(80);

    const currentPasswordInput = document.querySelector('input[name="current_password"]');
    const newPasswordInput = document.querySelector('input[name="new_password"]');
    const confirmPasswordInput = document.querySelector('input[name="confirm_password"]');
    const passwordToggles = Array.from(document.querySelectorAll(".ui-password-toggle"));
    assert(Boolean(currentPasswordInput && newPasswordInput && confirmPasswordInput), "change-password preset should render current/new/confirm password fields");
    assert(passwordToggles.length >= 3, "change-password preset should render shared password toggles for all password rows");
    passwordToggles[0]?.click();
    assert(currentPasswordInput?.type === "text", "change-password preset toggle should reveal current password");
    changePasswordModal.destroy();
    await wait(80);

    finish();

    function assert(condition, message) {
      if (!condition) {
        failures.push(message);
      }
    }

    function finish() {
      if (failures.length) {
        document.body.dataset.status = "fail";
        results.textContent = `FAIL\n${failures.map((item) => `- ${item}`).join("\n")}`;
        return;
      }
      document.body.dataset.status = "pass";
      results.textContent = "PASS";
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
