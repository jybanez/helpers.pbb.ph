<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Navbar Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.nav.css">
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    #results {
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body data-status="pending">
  <div id="host"></div>
  <pre id="results">Running...</pre>

  <script type="module">
    import { createNavbar } from "../js/ui/ui.navbar.js";

    const failures = [];
    const results = document.getElementById("results");
    const host = document.getElementById("host");
    const events = [];
    const originalMatchMedia = window.matchMedia?.bind(window);

    window.addEventListener("error", (event) => {
      failures.push(`error: ${event.message}`);
      finish();
    });
    window.addEventListener("unhandledrejection", (event) => {
      failures.push(`rejection: ${String(event.reason?.message || event.reason || "unknown")}`);
      finish();
    });

    try {
      const navbar = createNavbar(host, {}, {
        brandText: "Workspace",
        brandSubtitle: "Build app-DWv_LvMM",
        brandMedia: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3Z"/></svg>',
        contentStart: "Operations",
        contentCenter: () => {
          const badge = document.createElement("span");
          badge.className = "center-badge";
          badge.textContent = "Realtime Connected";
          return badge;
        },
        contentEnd: () => {
          const badge = document.createElement("span");
          badge.className = "end-badge";
          badge.textContent = "Region 7";
          return badge;
        },
        items: [
          { id: "dashboard", label: "Dashboard" },
          {
            id: "apps",
            label: "Apps",
            menuItems: [
              { id: "app:relay", label: "Relay" },
              { id: "app:workspace", label: "Workspace" },
            ],
          },
        ],
        actions: [
          {
            id: "profile",
            label: "Profile",
            menuItems: [
              { id: "logout", label: "Logout" },
            ],
          },
        ],
        onNavigate(item) {
          events.push({ type: "navigate", id: item?.id || null });
        },
        onItemMenuSelect(item, menuItem, meta) {
          events.push({ type: "item-menu-select", itemId: item.id, menuItemId: menuItem.id, source: meta.source });
        },
        onItemMenuOpenChange(item, open) {
          events.push({ type: "item-menu-open", itemId: item.id, open });
        },
        onActionMenuSelect(action, menuItem, meta) {
          events.push({ type: "action-menu-select", actionId: action.id, menuItemId: menuItem.id, source: meta.source });
        },
      });

      const brandButton = host.querySelector(".ui-navbar-brand");
      const brandLabel = host.querySelector(".ui-navbar-brand-label");
      const brandSubtitle = host.querySelector(".ui-navbar-brand-subtitle");
      const brandMedia = host.querySelector(".ui-navbar-brand-media svg");
      const contentStart = host.querySelector(".ui-navbar-slot-start");
      const contentCenter = host.querySelector(".ui-navbar-slot-center .center-badge");
      const contentEnd = host.querySelector(".ui-navbar-slot-end .end-badge");
      assert(Boolean(brandButton), "brand button should render");
      assert(Boolean(brandLabel) && brandLabel.textContent.trim() === "Workspace", "brand label should render");
      assert(Boolean(brandSubtitle) && brandSubtitle.textContent.trim() === "Build app-DWv_LvMM", "brand subtitle should render");
      assert(Boolean(brandMedia), "brand media should render");
      assert(Boolean(contentStart) && contentStart.textContent.includes("Operations"), "start slot should render text content");
      assert(Boolean(contentCenter) && contentCenter.textContent.trim() === "Realtime Connected", "center slot should render callback content");
      assert(Boolean(contentEnd) && contentEnd.textContent.trim() === "Region 7", "end slot should render callback content");

      const navButtons = Array.from(host.querySelectorAll(".ui-navbar-item"));
      assert(navButtons.length === 2, "navbar should render 2 primary items");

      navButtons[0].click();
      assert(events.some((event) => event.type === "navigate" && event.id === "dashboard"), "plain primary items should still navigate");

      navButtons[1].click();
      await wait(50);
      assert(events.some((event) => event.type === "item-menu-open" && event.itemId === "apps" && event.open === true), "menu-backed primary item should emit open state");

      const relayMenuButton = Array.from(document.querySelectorAll(".ui-menu-item")).find((node) => node.textContent.includes("Relay"));
      assert(Boolean(relayMenuButton), "menu-backed primary item should render a menu");
      relayMenuButton.click();
      await wait(50);

      assert(events.some((event) => event.type === "item-menu-select" && event.itemId === "apps" && event.menuItemId === "app:relay"), "menu-backed primary item should emit selection callback");
      assert(events.filter((event) => event.type === "navigate" && event.id === "apps").length === 0, "menu-backed primary item should not also emit onNavigate");

      const actionButton = host.querySelector(".ui-navbar-action");
      actionButton.click();
      await wait(50);
      const logoutMenuButton = Array.from(document.querySelectorAll(".ui-menu-item")).find((node) => node.textContent.includes("Logout"));
      assert(Boolean(logoutMenuButton), "menu-backed action should still render a menu");
      logoutMenuButton.click();
      await wait(50);
      assert(events.some((event) => event.type === "action-menu-select" && event.actionId === "profile" && event.menuItemId === "logout"), "existing action-menu behavior should remain intact");

      window.matchMedia = (query) => ({
        matches: query === "(max-width: 720px)",
        media: query,
        onchange: null,
        addListener() {},
        removeListener() {},
        addEventListener() {},
        removeEventListener() {},
        dispatchEvent() { return false; },
      });
      navbar.update({}, {});
      await wait(20);
      const mobileToggle = host.querySelector(".ui-navbar-mobile-toggle");
      assert(Boolean(mobileToggle), "mobile-collapsible navbar should render a hamburger toggle");
      assert(!mobileToggle.disabled, "mobile hamburger toggle should enable inside the mobile viewport");
      mobileToggle.click();
      const mobileMenu = await waitFor(() => document.querySelector(".ui-menu.is-open"));
      assert(Boolean(mobileMenu), "mobile hamburger toggle should open a menu");
      const mobileMenuLabels = Array.from(mobileMenu.querySelectorAll(".ui-menu-item .ui-menu-item-label")).map((node) => node.textContent.trim());
      assert(
        mobileMenuLabels.slice(0, 7).join("|") === [
          "Operations",
          "Realtime Connected",
          "Region 7",
          "Dashboard",
          "Apps: Relay",
          "Apps: Workspace",
          "Profile: Logout",
        ].join("|"),
        "mobile menu should order content entries before items and actions"
      );
      const mobileDashboard = Array.from(document.querySelectorAll(".ui-menu-item")).find((node) => node.textContent.includes("Dashboard"));
      mobileDashboard.click();
      await wait(50);
      assert(events.some((event) => event.type === "navigate" && event.id === "dashboard"), "mobile menu should navigate direct navbar items");

      mobileToggle.click();
      await waitFor(() => document.querySelector(".ui-menu.is-open"));
      const mobileWorkspace = Array.from(document.querySelectorAll(".ui-menu-item")).find((node) => node.textContent.includes("Apps: Workspace"));
      mobileWorkspace.click();
      await wait(50);
      assert(
        events.some((event) => event.type === "item-menu-select" && event.itemId === "apps" && event.menuItemId === "app:workspace" && event.source === "mobile-menu"),
        "mobile menu should flatten menu-backed navbar items and emit selection callbacks"
      );

      mobileToggle.click();
      await waitFor(() => document.querySelector(".ui-menu.is-open"));
      const mobileLogout = Array.from(document.querySelectorAll(".ui-menu-item")).find((node) => node.textContent.includes("Profile: Logout"));
      mobileLogout.click();
      await wait(50);
      assert(
        events.some((event) => event.type === "action-menu-select" && event.actionId === "profile" && event.menuItemId === "logout" && event.source === "mobile-menu"),
        "mobile menu should flatten menu-backed actions and emit action selection callbacks"
      );

      if (originalMatchMedia) {
        window.matchMedia = originalMatchMedia;
      }
      navbar.update({}, {});
      await wait(20);

      navbar.update({}, { brandSubtitle: "", contentCenter: null });
      await wait(10);
      assert(!host.querySelector(".ui-navbar-brand-subtitle"), "brand subtitle should not render after clearing");
      assert(!host.querySelector(".ui-navbar-slot-center .center-badge"), "center slot should clear after update");
      assert(!host.querySelector(".ui-navbar-center"), "center region should collapse when it has no content");

      navbar.update({}, { items: [], actions: [], contentEnd: null });
      await wait(10);
      assert(!host.querySelector(".ui-navbar-items"), "items wrapper should not render when there are no items");
      assert(!host.querySelector(".ui-navbar-actions"), "actions wrapper should not render when there are no actions");
      assert(!host.querySelector(".ui-navbar-end"), "end region should collapse when it has no end content or actions");
      const root = host.querySelector(".ui-navbar");
      assert(root && !root.classList.contains("has-items"), "root should drop has-items class when items are cleared");
      assert(root && !root.classList.contains("has-actions"), "root should drop has-actions class when actions are cleared");

      navbar.destroy();
      finish();
    } catch (error) {
      failures.push(error?.message || String(error));
      finish();
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    async function waitFor(predicate, timeoutMs = 1500, stepMs = 20) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const value = predicate();
        if (value) {
          return value;
        }
        await wait(stepMs);
      }
      return null;
    }

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message);
      }
    }

    function finish() {
      if (document.body.dataset.status !== "pending") {
        return;
      }
      const passed = failures.length === 0;
      document.body.dataset.status = passed ? "pass" : "fail";
      results.textContent = `${passed ? "PASS" : "FAIL"}\n${passed ? "Navbar item dropdown regression test passed." : failures.join("\n")}`;
    }
  </script>
</body>
</html>
