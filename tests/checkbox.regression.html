<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkbox Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.checkbox.css">
</head>
<body data-status="pending">
  <div id="booleanHost"></div>
  <div id="explicitHost"></div>
  <pre id="results">Running...</pre>

  <script type="module">
    import { createCheckbox } from "../js/ui/ui.checkbox.js";

    const failures = [];
    const events = [];

    const booleanCheckbox = createCheckbox(document.getElementById("booleanHost"), {
      name: "confirmed",
      label: "Confirmed",
      checked: true,
      onChange(payload) {
        events.push({ kind: "boolean", ...payload });
      },
    });

    assert(booleanCheckbox.getChecked() === true, "boolean checkbox should expose checked state");
    assert(booleanCheckbox.getValue() === true, "boolean checkbox should return boolean value");
    booleanCheckbox.refs.input.click();
    assert(booleanCheckbox.getChecked() === false, "click should toggle boolean checked state");
    assert(booleanCheckbox.getValue() === false, "click should update boolean value");
    assert(events.find((event) => event.kind === "boolean")?.value === false, "boolean onChange should receive next value");

    const explicitCheckbox = createCheckbox(document.getElementById("explicitHost"), {
      name: "followup",
      label: "Needs follow-up",
      value: "followup_required",
      checkedValue: "followup_required",
      uncheckedValue: "",
      onChange(payload) {
        events.push({ kind: "explicit", ...payload });
      },
    });

    assert(explicitCheckbox.getChecked() === true, "explicit checkbox should infer checked from checkedValue");
    assert(explicitCheckbox.getValue() === "followup_required", "explicit checkbox should return checkedValue");
    explicitCheckbox.setChecked(false, { emit: true });
    assert(explicitCheckbox.getValue() === "", "explicit checkbox should return uncheckedValue");
    assert(events.find((event) => event.kind === "explicit")?.value === "", "explicit onChange should receive uncheckedValue");
    explicitCheckbox.setValue("followup_required");
    assert(explicitCheckbox.getChecked() === true, "setValue should infer checked when value matches checkedValue");
    explicitCheckbox.setDisabled(true);
    assert(explicitCheckbox.refs.input.disabled === true, "setDisabled should disable native input");

    finish();

    function assert(condition, message) {
      if (!condition) {
        failures.push(message);
      }
    }

    function finish() {
      if (failures.length) {
        document.body.dataset.status = "fail";
        document.getElementById("results").textContent = `FAIL\n${failures.map((failure) => `- ${failure}`).join("\n")}`;
        return;
      }
      document.body.dataset.status = "pass";
      document.getElementById("results").textContent = "PASS";
    }
  </script>
</body>
</html>
