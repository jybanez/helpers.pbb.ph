<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Incident Editors Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.tokens.css">
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.number.stepper.css">
  <link rel="stylesheet" href="../css/ui/ui.field.group.css">
  <link rel="stylesheet" href="../css/incident/incident.css">
  <link rel="stylesheet" href="../css/incident/incident.base.css">
  <link rel="stylesheet" href="../css/incident/incident.types.css">
  <link rel="stylesheet" href="../css/incident/incident.types.details.editor.css">
  <link rel="stylesheet" href="../css/incident/incident.types.details.viewer.css">
  <link rel="stylesheet" href="../css/incident/incident.teams.assignments.css">
  <link rel="stylesheet" href="../css/incident/incident.teams.assignments.editor.css">
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    #host {
      display: grid;
      gap: 16px;
      max-width: 960px;
    }
    #results {
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body data-status="pending" data-theme="care-light">
    <div id="host">
      <div id="incidentTypesHost"></div>
      <div id="incidentTypesViewerHost"></div>
      <div id="assignmentsHost"></div>
    </div>
  <pre id="results">Running...</pre>

  <script type="module">
    import { incidentTypes } from "../js/incident/incident.types.js";
    import { incidentTeamsAssignments } from "../js/incident/incident.teams.assignments.js";

    const results = document.getElementById("results");
    const failures = [];

    const typeEvents = [];
    const assignmentEvents = [];
    const confirmCancelCalls = [];
    const cancelCalls = [];

    const typeApi = incidentTypes(document.getElementById("incidentTypesHost"), [], {
      editable: true,
      theme: "care-light",
      incident_id: 30,
      categories: [{ id: 1, name: "Fire" }],
      incidentTypes: [
        { id: 10, category_id: 1, name: "Building Fire", description: "Fire affecting a house, building, or other structure." },
        {
          id: 11,
          category_id: 1,
          name: "Vehicle Fire",
          description: "Vehicle-related fire.",
          fields: [{ field_key: "plate", field_label: "Plate Number", input_type: "text", sort_order: 1 }],
        },
      ],
      resources: [],
      removeIncidentType() {},
      onItemChange(nextItem, meta) {
        typeEvents.push({ kind: "item", nextItem, meta });
      },
      onChange(nextList, meta) {
        typeEvents.push({ kind: "list", nextList, meta });
      },
    });

    typeApi.setList([{
      incident_id: 30,
      incident_type_id: 10,
      incident_type_category_id: 1,
      incident_type_category_name: "Fire",
      name: "Building Fire",
      fields: [
        { field_key: "structure", field_label: "Structure", input_type: "text", is_required: true, sort_order: 1 },
        { field_key: "risk_level", field_label: "Risk level", input_type: "select", is_required: true, options: ["Low", "High"], sort_order: 1.5 },
        {
          field_key: "missing_persons",
          field_label: "Missing Persons",
          input_type: "group",
          is_required: true,
          sort_order: 2,
          config_json: JSON.stringify({
            preset: "missingPerson",
            preset_label: "Missing Persons",
            repeatable: true
          }),
        },
      ],
      detail_entries: [],
      resources: [{ id: 501, name: "Fire Truck" }],
      resources_needed: [],
    }]);

    const typeData = typeApi.getData();
    assert(Boolean(typeData[0]?._client_key), "incident types should assign _client_key to unsaved rows");
    assert(
      document.querySelector("#incidentTypesHost .hh-description")?.textContent === "Fire affecting a house, building, or other structure.",
      "incident type editor should render incident type descriptions as header helper text"
    );
    const incidentTypesHeader = document.querySelector("#incidentTypesHost .hh-incident-types-header");
    const incidentTypesRoot = document.querySelector("#incidentTypesHost .hh-incident-types");
    assert(incidentTypesRoot?.dataset.theme === "care-light", "incident types root should preserve shared theme preset ids");
    assert(colorEquals(getComputedStyle(incidentTypesRoot).backgroundColor, "rgb(245, 251, 250)"), "incident types root should use care-light background");
    assert(colorEquals(getComputedStyle(incidentTypesRoot).color, "rgb(23, 48, 45)"), "incident types root should use care-light text color");
    assert(getComputedStyle(incidentTypesHeader).position === "sticky", "incident types list header should stay sticky inside scroll containers");
    assert(getComputedStyle(incidentTypesHeader).top === "0px", "incident types sticky header should anchor to the top of its scroll container by default");

    const typeInput = document.querySelector("#incidentTypesHost .hh-field-row .hh-input");
    const structureRow = document.querySelector('#incidentTypesHost [data-field-key="structure"]');
    const riskSelect = document.querySelector('#incidentTypesHost [data-field-key="risk_level"] .hh-input');
    assert(structureRow?.classList.contains("has-warning"), "required scalar text fields should show warning state when empty");
    assert(typeInput?.getAttribute("aria-invalid") === "true", "required scalar text controls should set aria-invalid when empty");
    assert(structureRow?.querySelector(".hh-field-warning-badge:not([hidden])")?.title.includes("Required"), "required scalar text fields should expose warning details");
    assert(riskSelect?.closest(".hh-field-row")?.classList.contains("has-warning"), "required scalar select fields should show warning state when empty");
    typeInput.value = "Warehouse";
    typeInput.dispatchEvent(new Event("input", { bubbles: true }));
    assert(!structureRow?.classList.contains("has-warning"), "required scalar text warning should clear after input");
    assert(!typeInput?.hasAttribute("aria-invalid"), "required scalar text controls should clear aria-invalid after input");
    riskSelect.value = "High";
    riskSelect.dispatchEvent(new Event("change", { bubbles: true }));
    assert(!riskSelect?.closest(".hh-field-row")?.classList.contains("has-warning"), "required scalar select warning should clear after selection");

    const typeItemEvent = typeEvents.find((entry) => entry.kind === "item" && entry.meta?.reason === "field");
    const typeListEvent = typeEvents.find((entry) => entry.kind === "list" && entry.meta?.reason === "field");
    assert(typeItemEvent?.nextItem?.detail_entries?.[0]?.field_value === "Warehouse", "incident types onItemChange should emit the updated item after field edits");
    assert(typeListEvent?.nextList?.[0]?.detail_entries?.[0]?.field_value === "Warehouse", "incident types onChange should emit the updated list after field edits");

    const groupHiddenName = document.querySelector('#incidentTypesHost [data-field-key="missing_persons"] [data-field-key="name"] .ui-input');
    const groupLastNameInput = document.querySelector('#incidentTypesHost [data-field-key="missing_persons"] [data-field-key="last_name"] .ui-input');
    const groupFirstNameInput = document.querySelector('#incidentTypesHost [data-field-key="missing_persons"] [data-field-key="first_name"] .ui-input');
    const groupGenderSelect = document.querySelector('#incidentTypesHost [data-field-key="missing_persons"] [data-field-key="gender"] .ui-input');
    const groupAgeInput = document.querySelector('#incidentTypesHost [data-field-key="missing_persons"] [data-field-key="age"] .ui-input');
    const groupLastSeenDaysInput = document.querySelector('#incidentTypesHost [data-field-key="missing_persons"] [data-field-key="last_seen_days"] .ui-input');
    const groupLastSeenLocationInput = document.querySelector('#incidentTypesHost [data-field-key="missing_persons"] [data-field-key="last_seen_location"] .ui-input');
    assert(!groupHiddenName, "repeatable preset complete name should be hidden from the editor UI");
    assert(Boolean(groupLastNameInput), "repeatable group fields should render split last name inputs from the shared input renderer");
    assert(Boolean(groupFirstNameInput), "repeatable group fields should render split first name inputs from the shared input renderer");
    assert(Boolean(groupGenderSelect), "repeatable group fields should render child selects from the shared input renderer");
    assert(Boolean(groupAgeInput), "repeatable group fields should render child number inputs from the shared input renderer");
    assert(Boolean(groupLastSeenDaysInput), "preset-backed repeatable group fields should render preset child number inputs without fields[]");
    assert(Boolean(groupLastSeenLocationInput), "preset-backed repeatable group fields should render preset child text inputs without fields[]");
    const groupRoot = document.querySelector('#incidentTypesHost [data-field-key="missing_persons"] .ui-field-group');
    const groupOuterLabel = document.querySelector('#incidentTypesHost [data-field-key="missing_persons"] > .hh-field-label-wrap .hh-field-label');
    const groupOuterRequired = document.querySelector('#incidentTypesHost [data-field-key="missing_persons"] > .hh-field-label-wrap .hh-required');
    assert(groupOuterLabel?.textContent === "Missing Persons", "incident type group fields should render the editor-owned field label");
    assert(groupOuterRequired?.textContent === "Required", "incident type required group fields should render the editor-owned required chip");
    assert(groupRoot?.classList.contains("is-chrome-less"), "incident type group fields should render shared field groups with chrome disabled");
    assert(groupRoot?.dataset.chrome === "false", "incident type group fields should mark shared field groups as chrome-less");
    assert(groupRoot?.querySelector(".ui-field-group-label-row")?.hidden === true, "incident type group fields should hide shared field group outer labels");
    assert(getComputedStyle(groupRoot?.querySelector(".ui-field-group-label-row")).display === "none", "incident type group fields should visually suppress shared field group outer labels");
    const groupRows = document.querySelectorAll('#incidentTypesHost [data-field-key="missing_persons"] .ui-field-group-row');
    assert(groupRows.length >= 3, "repeatable group fields should render resolved preset field rows");
    assert(groupRows[0]?.style.getPropertyValue("--ui-field-group-columns") === "2", "split name declarations should define the first row column count");
    assert(groupRows[1]?.style.getPropertyValue("--ui-field-group-columns") === "2", "array field declarations should define the row column count");
    assert(groupRows[2]?.style.getPropertyValue("--ui-field-group-columns") === "2", "preset row declarations should preserve their column count");
    groupLastNameInput.value = "Dela Cruz";
    groupLastNameInput.dispatchEvent(new Event("input", { bubbles: true }));
    groupFirstNameInput.value = "Juan";
    groupFirstNameInput.dispatchEvent(new Event("input", { bubbles: true }));
    groupGenderSelect.value = "Male";
    groupGenderSelect.dispatchEvent(new Event("change", { bubbles: true }));
    groupAgeInput.value = "17";
    groupAgeInput.dispatchEvent(new Event("input", { bubbles: true }));
    groupAgeInput.dispatchEvent(new Event("blur", { bubbles: true }));
    groupLastSeenDaysInput.value = "2";
    groupLastSeenDaysInput.dispatchEvent(new Event("input", { bubbles: true }));
    groupLastSeenDaysInput.dispatchEvent(new Event("blur", { bubbles: true }));
    groupLastSeenLocationInput.value = "Barangay Hall";
    groupLastSeenLocationInput.dispatchEvent(new Event("input", { bubbles: true }));

    const addMissingPersonButton = document.querySelector('#incidentTypesHost [data-field-key="missing_persons"] .ui-field-group-add');
    addMissingPersonButton.click();
    const groupLastNameInputs = document.querySelectorAll('#incidentTypesHost [data-field-key="missing_persons"] [data-field-key="last_name"] .ui-input');
    const groupFirstNameInputs = document.querySelectorAll('#incidentTypesHost [data-field-key="missing_persons"] [data-field-key="first_name"] .ui-input');
    assert(groupLastNameInputs.length === 2 && groupFirstNameInputs.length === 2, "repeatable group fields should support adding multiple split-name entries");
    groupLastNameInputs[1].value = "Santos";
    groupLastNameInputs[1].dispatchEvent(new Event("input", { bubbles: true }));
    groupFirstNameInputs[1].value = "Maria";
    groupFirstNameInputs[1].dispatchEvent(new Event("input", { bubbles: true }));

    const groupEntry = typeApi.getData()[0]?.detail_entries?.find((entry) => entry.field_key === "missing_persons");
    const groupValue = JSON.parse(groupEntry?.field_value || "[]");
    assert(groupValue[0]?.last_name === "Dela Cruz", "repeatable group fields should serialize child last name values");
    assert(groupValue[0]?.first_name === "Juan", "repeatable group fields should serialize child first name values");
    assert(groupValue[0]?.name === "Dela Cruz, Juan", "repeatable group fields should serialize computed complete name values");
    assert(groupValue[0]?.gender === "Male", "repeatable group fields should serialize child select values");
    assert(groupValue[0]?.age === 17, "repeatable group fields should serialize child number-stepper values");
    assert(groupValue[0]?.last_seen_days === 2, "preset-backed repeatable group fields should serialize preset child number-stepper values");
    assert(groupValue[0]?.last_seen_location === "Barangay Hall", "preset-backed repeatable group fields should serialize preset child text values");
    assert(groupValue[1]?.name === "Santos, Maria", "repeatable group fields should serialize computed names for added entries");

    const incidentTypesViewerHost = document.getElementById("incidentTypesViewerHost");
    incidentTypesViewerHost.style.width = "360px";
    const viewerApi = incidentTypes(incidentTypesViewerHost, [typeApi.getData()[0]], {
      editable: false,
      theme: "care-light",
      categories: [{ id: 1, name: "Fire" }],
      incidentTypes: [{ id: 10, category_id: 1, name: "Building Fire", description: "Fire affecting a house, building, or other structure." }],
    });
    assert(
      document.querySelector("#incidentTypesViewerHost .hh-group-value")?.textContent.includes("Dela Cruz, Juan"),
      "incident type viewer should render repeatable group values"
    );
    assert(
      document.querySelector("#incidentTypesViewerHost .hh-group-value-title")?.textContent === "#1",
      "incident type viewer repeatable group titles should match editor #number labels"
    );
    assert(
      document.querySelector("#incidentTypesViewerHost .hh-group-value")?.textContent.includes("Last seen location"),
      "incident type viewer should resolve preset group labels without fields[]"
    );
    const viewerGroupRow = document.querySelector("#incidentTypesViewerHost .hh-row-group");
    const viewerGroupValue = document.querySelector("#incidentTypesViewerHost .hh-group-value");
    const viewerGroupItem = document.querySelector("#incidentTypesViewerHost .hh-group-value-item");
    const viewerGroupRowStyle = getComputedStyle(viewerGroupRow);
    const viewerGroupRowRect = viewerGroupRow?.getBoundingClientRect();
    const viewerGroupItemRect = viewerGroupItem?.getBoundingClientRect();
    assert(viewerGroupRowStyle.gridTemplateColumns.split(" ").length === 1, "incident type viewer group rows should use a stacked full-width layout");
    assert(viewerGroupItemRect?.right <= viewerGroupRowRect?.right + 1, "incident type viewer group cards should stay inside the viewer row");
    assert(getComputedStyle(viewerGroupValue).width !== "0px", "incident type viewer group values should receive usable width");

    const resourceIncrementButton = document.querySelector("#incidentTypesHost .hh-resource-row .ui-number-stepper-button-increment");
    assert(Boolean(resourceIncrementButton), "incident type resource rows should render the shared numeric stepper");
    resourceIncrementButton.click();
    const resourceItemEvent = [...typeEvents].reverse().find((entry) => entry.kind === "item" && entry.meta?.reason === "resource");
    const resourceListEvent = [...typeEvents].reverse().find((entry) => entry.kind === "list" && entry.meta?.reason === "resource");
    assert(resourceItemEvent?.nextItem?.resources_needed?.[0]?.quantity_needed === 1, "incident type resource stepping should emit the updated item quantity");
    assert(resourceListEvent?.nextList?.[0]?.resources_needed?.[0]?.quantity_needed === 1, "incident type resource stepping should emit the updated list quantity");

    const removeButton = document.querySelector("#incidentTypesHost .hh-remove");
    removeButton.click();
    const removeListEvent = typeEvents.find((entry) => entry.kind === "list" && entry.meta?.reason === "remove");
    assert(Array.isArray(removeListEvent?.nextList) && removeListEvent.nextList.length === 0, "incident types remove should emit the proposed next list without the removed row");

    document.querySelector("#incidentTypesHost .hh-incident-types-header .hh-button").click();
    await wait(40);
    assert(document.activeElement?.matches(".hh-incident-type-search-wrap .hh-input"), "incident type drawer should focus the search field when opened");
    const incidentCategoryRail = document.querySelector(".hh-incident-type-categories");
    const incidentCategoryCard = document.querySelector(".hh-incident-type-category-card");
    assert(getComputedStyle(incidentCategoryRail).alignContent === "start", "incident type drawer categories should align to the top instead of stretching");
    assert(getComputedStyle(incidentCategoryRail).gridAutoRows === "max-content", "incident type drawer categories should keep intrinsic row height");
    assert((incidentCategoryCard?.getBoundingClientRect().height || 0) < 90, "incident type drawer category cards should not stretch vertically");
    const vehicleFireChip = Array.from(document.querySelectorAll(".hh-incident-type-chip")).find((node) => node.textContent.includes("Vehicle Fire"));
    vehicleFireChip?.click();
    await wait(340);
    assert(document.activeElement?.matches("#incidentTypesHost .hh-field-row .hh-input"), "adding an incident type should focus the first editable field");

    const assignmentsApi = incidentTeamsAssignments(document.getElementById("assignmentsHost"), [], {
      theme: "care-light",
      editable: true,
      incident_id: 30,
      operator_id: 7,
      categories: [{ id: 2, name: "Medical" }],
      teams: [
        { id: 91, name: "Responder One", team_category_id: 2 },
        { id: 92, name: "Responder Two", team_category_id: 2 },
      ],
      noticeAlreadyExist() {},
      confirmStatus() { return true; },
      confirmCancel(fromStatus, reasonCode, reasonNote) {
        confirmCancelCalls.push({ fromStatus, reasonCode, reasonNote });
        return true;
      },
      confirmDelete() { return true; },
      requestCancelReason() {
        return Promise.resolve({
          reasonCode: "other",
          reasonNote: "Unit reassigned by command.",
        });
      },
      onCancel(assignmentId, fromStatus, reasonCode, reasonNote) {
        cancelCalls.push({ assignmentId, fromStatus, reasonCode, reasonNote });
      },
      onItemChange(nextItem, meta) {
        assignmentEvents.push({ kind: "item", nextItem, meta });
      },
      onChange(nextList, meta) {
        assignmentEvents.push({ kind: "list", nextList, meta });
      },
    });
    const assignmentsRoot = document.querySelector("#assignmentsHost .hh-incident-teams-assignments");
    assert(assignmentsRoot?.dataset.theme === "care-light", "team assignments root should preserve shared theme preset ids");
    assert(colorEquals(getComputedStyle(assignmentsRoot).backgroundColor, "rgb(245, 251, 250)"), "team assignments root should use care-light background");
    assert(colorEquals(getComputedStyle(assignmentsRoot).color, "rgb(23, 48, 45)"), "team assignments root should use care-light text color");

    assignmentsApi.setList([{
      incident_id: 30,
      team_id: 91,
      assigned_by_operator_id: 7,
      status: "requested",
      contact_person: "",
      team: { id: 91, name: "Responder One", category: { name: "Medical" } },
    }]);

    const assignmentData = assignmentsApi.getData();
    assert(Boolean(assignmentData[0]?._client_key), "team assignments should assign _client_key to unsaved rows");
    const teamListHeader = document.querySelector("#assignmentsHost .hh-team-list-header");
    assert(getComputedStyle(teamListHeader).position === "sticky", "team assignments list header should stay sticky inside scroll containers");
    assert(getComputedStyle(teamListHeader).top === "0px", "team assignments sticky header should anchor to the top of its scroll container by default");

    const contactInput = document.querySelector("#assignmentsHost .hh-contact-wrap .hh-input");
    contactInput.value = "Ana";
    contactInput.dispatchEvent(new Event("input", { bubbles: true }));

    const contactItemEvent = assignmentEvents.find((entry) => entry.kind === "item" && entry.meta?.reason === "contact");
    const contactListEvent = assignmentEvents.find((entry) => entry.kind === "list" && entry.meta?.reason === "contact");
    assert(contactItemEvent?.nextItem?.contact_person === "Ana", "team assignments onItemChange should emit the updated item after contact edits");
    assert(contactListEvent?.nextList?.[0]?.contact_person === "Ana", "team assignments onChange should emit the updated list after contact edits");

    const nextStatusButton = document.querySelector("#assignmentsHost .hh-actions .hh-button");
    nextStatusButton.click();
    await new Promise((resolve) => window.setTimeout(resolve, 0));

    const statusItemEvent = assignmentEvents.find((entry) => entry.kind === "item" && entry.meta?.reason === "status");
    const statusListEvent = assignmentEvents.find((entry) => entry.kind === "list" && entry.meta?.reason === "status");
    assert(statusItemEvent?.nextItem?.status === "accepted", "team assignments status change should emit the candidate next item");
    assert(statusListEvent?.nextList?.[0]?.status === "accepted", "team assignments status change should emit the candidate next list");

    assignmentsApi.setItemBusy(assignmentData[0]._client_key, true, {
      action: "status",
      message: "Updating assignment...",
    });
    const busyCard = document.querySelector("#assignmentsHost .hh-incident-teams-assignments-editor");
    assert(busyCard?.getAttribute("aria-busy") === "true", "busy team assignment should set aria-busy on the card");
    assert(busyCard?.classList.contains("is-busy"), "busy team assignment should add an is-busy class");
    assert(busyCard?.dataset.busyAction === "status", "busy team assignment should expose the busy action");
    assert(busyCard?.querySelector(".hh-assignment-busy")?.textContent.includes("Updating assignment"), "busy team assignment should render a compact busy message");
    assert(Array.from(busyCard?.querySelectorAll("button, input, textarea, select") || []).every((control) => control.disabled), "busy team assignment should disable controls");
    assert(assignmentsApi.getState().busyAssignments[assignmentData[0]._client_key]?.message === "Updating assignment...", "team assignments state should expose the busy map");
    assignmentsApi.clearItemBusy(assignmentData[0]._client_key);
    assert(!document.querySelector("#assignmentsHost .hh-incident-teams-assignments-editor")?.hasAttribute("aria-busy"), "clearItemBusy should remove card busy state");

    const cancelButton = document.querySelector("#assignmentsHost .hh-icon-button");
    cancelButton.click();
    await Promise.resolve();
    await Promise.resolve();
    await new Promise((resolve) => window.setTimeout(resolve, 20));
    const cancelItemEvent = assignmentEvents.find((entry) => entry.kind === "item" && entry.meta?.reason === "cancel");
    const cancelListEvent = assignmentEvents.find((entry) => entry.kind === "list" && entry.meta?.reason === "cancel");
    assert(confirmCancelCalls[0]?.reasonCode === "other", "team assignments cancel should pass requestCancelReason output into confirmCancel");
    assert(confirmCancelCalls[0]?.reasonNote === "Unit reassigned by command.", "team assignments cancel should preserve requestCancelReason details");
    assert(cancelCalls[0]?.reasonCode === "other", "team assignments cancel should call onCancel with requestCancelReason output");
    assert(cancelItemEvent?.nextItem?.status === "cancelled", "team assignments cancel should emit the candidate cancelled item");
    assert(cancelItemEvent?.nextItem?.cancel_reason_note === "Unit reassigned by command.", "team assignments cancel should emit the candidate cancel note");
    assert(cancelListEvent?.nextList?.[0]?.status === "cancelled", "team assignments cancel should emit the candidate cancelled list");

    document.querySelector("#assignmentsHost .hh-team-list-header .hh-button").click();
    await wait(40);
    assert(document.activeElement?.matches(".hh-team-search-wrap .hh-input"), "team assignment drawer should focus the search field when opened");
    const teamCategoryRail = document.querySelector(".hh-team-categories");
    const teamCategoryCard = document.querySelector(".hh-team-category-card");
    assert(getComputedStyle(teamCategoryRail).alignContent === "start", "team assignment drawer categories should align to the top instead of stretching");
    assert(getComputedStyle(teamCategoryRail).gridAutoRows === "max-content", "team assignment drawer categories should keep intrinsic row height");
    assert((teamCategoryCard?.getBoundingClientRect().height || 0) < 90, "team assignment drawer category cards should not stretch vertically");
    window.setTimeout(() => {
      document.querySelector("#assignmentsHost .hh-contact-wrap .hh-input")?.focus();
    }, 80);
    await wait(260);
    assert(document.activeElement?.matches(".hh-team-search-wrap .hh-input"), "team assignment drawer should recover search focus when outside focus is restored during open");
    const responderTwoChip = Array.from(document.querySelectorAll(".hh-team-chip")).find((node) => node.textContent.includes("Responder Two"));
    responderTwoChip?.click();
    await wait(340);
    assert(document.activeElement?.matches("#assignmentsHost .hh-contact-wrap .hh-input"), "adding a team assignment should focus the contact-person field");

    typeApi.destroy();
    viewerApi.destroy();
    assignmentsApi.destroy();

    if (failures.length) {
      document.body.dataset.status = "fail";
      results.textContent = `FAIL\n${failures.map((line) => `- ${line}`).join("\n")}`;
    } else {
      document.body.dataset.status = "pass";
      results.textContent = "PASS";
    }

    function assert(condition, message) {
      if (!condition) {
        failures.push(message);
      }
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function colorEquals(actual, expected) {
      return String(actual || "").replace(/\s+/g, " ").trim() === expected;
    }
  </script>
</body>
</html>
