<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspace Bridge Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.modal.css">
  <link rel="stylesheet" href="../css/ui/ui.toast.css">
  <link rel="stylesheet" href="../css/ui/ui.dialog.css">
  <link rel="stylesheet" href="../css/ui/ui.window.css">
  <link rel="stylesheet" href="../css/ui/ui.iframe.host.css">
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    #surface {
      height: 480px;
      border: 1px solid #263146;
      border-radius: 10px;
      background: #0b1220;
      overflow: hidden;
    }
    #results {
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body data-status="pending">
  <div id="surface"></div>
  <pre id="results">Running...</pre>

  <script type="module">
    import { createWindowManager } from "../js/ui/ui.window.js";
    import { installWorkspaceUiBridgeHost } from "../js/ui/ui.workspace.bridge.js";

    const failures = [];
    const results = document.getElementById("results");
    const surface = document.getElementById("surface");
    const fixtureUrl = new URL("../samples/iframe/workspace-ui-bridge.fixture.html", window.location.href).href;

    window.addEventListener("error", (event) => {
      failures.push(`error: ${event.message}`);
      finish();
    });
    window.addEventListener("unhandledrejection", (event) => {
      failures.push(`rejection: ${String(event.reason?.message || event.reason || "unknown")}`);
      finish();
    });

    try {
      const fallbackFrame = document.createElement("iframe");
      fallbackFrame.src = fixtureUrl;
      fallbackFrame.title = "Fallback fixture";
      fallbackFrame.style.width = "0";
      fallbackFrame.style.height = "0";
      fallbackFrame.style.border = "0";
      document.body.appendChild(fallbackFrame);
      await waitForIframeApi(fallbackFrame);
      await fallbackFrame.contentWindow.__workspaceBridgeFixture.runToast();
      await wait(300);
      assert(Boolean(fallbackFrame.contentDocument.querySelector(".ui-toast")), "toast should render locally inside iframe when no host is installed");
      fallbackFrame.contentWindow.__workspaceBridgeFixture.runAutoActionModal();
      await wait(300);
      assert(Boolean(fallbackFrame.contentDocument.querySelector(".ui-modal-root")), "plain helper action modal should render locally inside iframe when no host is installed");
      fallbackFrame.contentDocument.querySelector(".ui-action-modal-button.ui-button-primary")?.click();
      await wait(450);
      fallbackFrame.remove();

      installWorkspaceUiBridgeHost();
      const manager = createWindowManager({ container: surface });
      const bridgeFrame = document.createElement("iframe");
      bridgeFrame.src = fixtureUrl;
      bridgeFrame.title = "Workspace bridge fixture";
      bridgeFrame.style.width = "100%";
      bridgeFrame.style.height = "100%";
      bridgeFrame.style.border = "0";
      const bridgeWrapper = document.createElement("section");
      bridgeWrapper.setAttribute("data-ui-window-fill", "true");
      bridgeWrapper.appendChild(bridgeFrame);
      const win = manager.createWindow({
        title: "Bridge Child",
        width: 760,
        height: 420,
        content: bridgeWrapper,
      });
      win.focus();

      await waitForIframeApi(bridgeFrame);
      assert(await bridgeFrame.contentWindow.__workspaceBridgeFixture.isBridgeAvailable(), "bridge handshake should succeed for hosted iframe");

      await bridgeFrame.contentWindow.__workspaceBridgeFixture.runToast();
      await wait(300);
      assert(Boolean(document.body.querySelector(".ui-toast")), "delegated toast should render in parent document");
      assert(!bridgeFrame.contentDocument.querySelector(".ui-toast"), "delegated toast should not render inside bridged iframe");

      bridgeFrame.contentWindow.__workspaceBridgeFixture.runAutoActionModal();
      await wait(300);
      assert(Boolean(document.body.querySelector(".ui-modal-root")), "plain helper action modal should render in parent document when hosted in same-origin workspace");
      assert(!bridgeFrame.contentDocument.querySelector(".ui-modal-root"), "plain helper action modal should not render inside the bridged iframe");
      document.body.querySelector(".ui-action-modal-button.ui-button-primary")?.click();
      await wait(450);

      bridgeFrame.contentWindow.__workspaceBridgeFixture.runAutoFormModal();
      await wait(300);
      assert(Boolean(document.body.querySelector(".ui-form-modal")), "plain helper form modal should render in parent document when hosted in same-origin workspace");
      assert(!bridgeFrame.contentDocument.querySelector(".ui-form-modal"), "plain helper form modal should not render inside the bridged iframe");
      Array.from(document.body.querySelectorAll(".ui-action-modal-button")).find((button) => button.textContent.includes("Save"))?.click();
      await wait(450);

      const initialLogText = bridgeFrame.contentDocument.querySelector("#log")?.textContent || "";

      bridgeFrame.contentWindow.__workspaceBridgeFixture.runBridgeLoginForm();
      await wait(300);
      assert(Boolean(document.body.querySelector(".ui-form-modal")), "explicit bridge login form should render in parent document");
      assert(!bridgeFrame.contentDocument.querySelector(".ui-form-modal"), "explicit bridge login form should not render inside the bridged iframe");
      Array.from(document.body.querySelectorAll(".ui-action-modal-button")).find((button) => button.textContent.includes("Cancel"))?.click();
      await wait(450);
      assert((bridgeFrame.contentDocument.querySelector("#log")?.textContent || "") !== initialLogText, "explicit bridge login form should round-trip a result back to the child iframe");

      const afterLoginLogText = bridgeFrame.contentDocument.querySelector("#log")?.textContent || "";
      bridgeFrame.contentWindow.__workspaceBridgeFixture.runBridgeReauthForm();
      await wait(300);
      assert(Boolean(document.body.querySelector(".ui-form-modal")), "explicit bridge reauth form should render in parent document");
      assert(!bridgeFrame.contentDocument.querySelector(".ui-form-modal"), "explicit bridge reauth form should not render inside the bridged iframe");
      Array.from(document.body.querySelectorAll(".ui-action-modal-button")).find((button) => button.textContent.includes("Cancel"))?.click();
      await wait(450);
      assert((bridgeFrame.contentDocument.querySelector("#log")?.textContent || "") !== afterLoginLogText, "explicit bridge reauth form should round-trip a result back to the child iframe");

      const invalidResult = await bridgeFrame.contentWindow.__workspaceBridgeFixture.runInvalidBridgeForm();
      await wait(150);
      assert(invalidResult?.ok === true, "malformed modal.form.open payload should reject");
      assert(String(invalidResult?.message || "").includes("payload.rows must be an array"), "malformed payload rejection should mention rows array requirement");
      assert(!document.body.querySelector(".ui-form-modal"), "malformed payload should not leave a parent form modal mounted");
      assert(!bridgeFrame.contentDocument.querySelector(".ui-form-modal"), "malformed payload should not render a child form modal");

      const unsupportedResult = await bridgeFrame.contentWindow.__workspaceBridgeFixture.runUnsupportedBridgeForm();
      await wait(150);
      assert(unsupportedResult?.ok === true, "unsupported row-type payload should reject");
      assert(String(unsupportedResult?.message || "").includes("Unsupported row type"), "unsupported row-type rejection should mention unsupported row type");
      assert(!document.body.querySelector(".ui-form-modal"), "unsupported row-type payload should not leave a parent form modal mounted");
      assert(!bridgeFrame.contentDocument.querySelector(".ui-form-modal"), "unsupported row-type payload should not render a child form modal");
    } catch (error) {
      failures.push(`exception: ${String(error?.message || error)}`);
    }

    finish();

    function assert(condition, message) {
      if (!condition) {
        failures.push(message);
      }
    }

    function finish() {
      if (failures.length) {
        document.body.dataset.status = "fail";
        results.textContent = `FAIL\n${failures.map((item) => `- ${item}`).join("\n")}`;
      } else {
        document.body.dataset.status = "pass";
        results.textContent = "PASS";
      }
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    async function waitForIframeApi(iframe) {
      await waitFor(() => {
        try {
          return Boolean(iframe?.contentWindow?.__workspaceBridgeFixture);
        } catch {
          return false;
        }
      });
      return iframe.contentWindow.__workspaceBridgeFixture;
    }

    async function waitFor(predicate, timeoutMs = 9000) {
      const started = Date.now();
      while (Date.now() - started < timeoutMs) {
        if (predicate()) {
          return true;
        }
        await wait(50);
      }
      throw new Error("Timed out waiting for workspace bridge condition.");
    }

  </script>
</body>
</html>
