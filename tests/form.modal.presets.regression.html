<!doctype html>
<html lang="en" data-theme="care-light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form Modal Presets Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.tokens.css">
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.modal.css">
  <link rel="stylesheet" href="../css/ui/ui.form.modal.css">
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: var(--ui-bg);
      color: var(--ui-text);
      font-family: var(--ui-font);
    }
    #results {
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body data-theme="care-light" data-status="pending">
  <pre id="results">Running...</pre>

  <script type="module">
    import {
      createAccountFormModal,
      createChangePasswordFormModal,
      createLoginFormModal,
      createReauthFormModal,
      createStatusUpdateFormModal,
      createReasonFormModal,
    } from "../js/ui/ui.form.modal.presets.js";

    const results = document.getElementById("results");
    const failures = [];
    const expectedTextColor = getComputedStyle(document.documentElement).getPropertyValue("--ui-text").trim();
    const avatarPreviewSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#2d4775"/><stop offset="1" stop-color="#111827"/></linearGradient></defs><rect width="128" height="128" rx="64" fill="url(#g)"/><circle cx="64" cy="48" r="22" fill="#d7e0f4" fill-opacity="0.92"/><path d="M29 106c7-19 22-29 35-29s28 10 35 29" fill="#d7e0f4" fill-opacity="0.92"/></svg>`;
    const avatarPreviewUrl = `data:image/svg+xml;utf8,${encodeURIComponent(avatarPreviewSvg)}`;
    const loginMediaSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96"><rect width="96" height="96" rx="20" fill="#164e63"/><circle cx="48" cy="48" r="24" fill="#e0f2fe"/></svg>`;
    const loginBackgroundSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160"><rect width="320" height="160" fill="#0f172a"/><path d="M0 118c64-30 104-35 151-12s88 14 169-26v80H0z" fill="#2dd4bf" fill-opacity=".35"/></svg>`;
    const loginMediaUrl = `data:image/svg+xml;utf8,${encodeURIComponent(loginMediaSvg)}`;
    const loginBackgroundUrl = `data:image/svg+xml;utf8,${encodeURIComponent(loginBackgroundSvg)}`;

    const presetLoginModal = createLoginFormModal({
      mediaUrl: loginMediaUrl,
      mediaAlt: "PBB Chat",
      backgroundImageUrl: loginBackgroundUrl,
      backgroundImageAlt: "",
      backgroundTone: "dark",
      fields: {
        identifier: "user_email",
        password: "user_password",
      },
      initialValues: {
        user_email: "operator@pbb.ph",
        user_password: "wrong-password",
      },
      async onSubmit(values, ctx) {
        await wait(80);
        if (values.user_password !== "correct-password") {
          ctx.setErrors({ user_password: "Invalid password." });
          return false;
        }
        return true;
      },
    });

    presetLoginModal.open();
    await wait(80);
    Array.from(document.querySelectorAll(".ui-modal-footer .ui-button")).find((button) => /login/i.test(button.textContent || "")).click();
    await wait(180);

    const loginBranding = document.querySelector(".ui-form-modal-branding");
    const loginBrandingMedia = loginBranding?.querySelector(".ui-form-modal-branding-media");
    const loginBrandingBackground = loginBranding?.querySelector(".ui-form-modal-branding-bg");
    assert(Boolean(loginBranding), "preset login should render URL-based branding when provided");
    assert(loginBranding?.classList.contains("is-tone-dark"), "preset login branding should apply requested background tone");
    assert(loginBrandingMedia?.getAttribute("src") === loginMediaUrl, "preset login branding should render foreground media URL");
    assert(loginBrandingMedia?.getAttribute("alt") === "PBB Chat", "preset login branding should render foreground media alt text");
    assert(loginBrandingBackground?.getAttribute("src") === loginBackgroundUrl, "preset login branding should render background image URL");
    assert(loginBrandingBackground?.getAttribute("aria-hidden") === "true", "decorative login background should be hidden from assistive tech");
    const presetPasswordError = document.querySelector('input[name="user_password"]')?.closest(".ui-form-modal-field")?.querySelector(".ui-form-modal-field-error");
    assert(presetLoginModal.getValues().user_email === "operator@pbb.ph", "preset login should preserve remapped identifier field");
    assert(presetPasswordError?.textContent.includes("Invalid password."), "preset login should render error on remapped password field");

    presetLoginModal.destroy();
    await wait(80);

    const blockingPresetLoginModal = createLoginFormModal({
      showCloseButton: false,
      closeOnBackdrop: false,
      closeOnEscape: false,
      showCancelButton: false,
      initialValues: {
        email: "operator@pbb.ph",
        password: "correct-password",
      },
      onSubmit() {
        return true;
      },
    });

    blockingPresetLoginModal.open();
    await wait(80);
    const blockingPresetFooterLabels = Array.from(document.querySelectorAll(".ui-modal-footer .ui-button")).map((button) => button.textContent.trim());
    assert(!blockingPresetFooterLabels.some((label) => /cancel/i.test(label)), "preset login should pass showCancelButton false through to createFormModal");
    assert(blockingPresetFooterLabels.some((label) => /login/i.test(label)), "preset login should keep submit visible when Cancel is hidden");
    assert(document.querySelector(".ui-modal-close").hidden === true, "preset login should pass showCloseButton false through to createFormModal");
    blockingPresetLoginModal.destroy();
    await wait(80);

    const presetLoginSuccessModal = createLoginFormModal({
      fields: {
        identifier: "user_email",
        password: "user_password",
      },
      initialValues: {
        user_email: "operator@pbb.ph",
        user_password: "correct-password",
      },
      async onSubmit() {
        await wait(80);
        return true;
      },
    });

    presetLoginSuccessModal.open();
    await wait(80);
    presetLoginSuccessModal.refs.form.requestSubmit();
    await wait(500);
    assert(document.querySelector(".ui-modal-root") === null, "preset login should close on successful native form submit");

    const reauthModal = createReauthFormModal({
      fields: {
        identifier: "account_email",
        password: "reauth_password",
      },
      identifierValue: "supervisor@pbb.ph",
      async onSubmit(values, ctx) {
        await wait(80);
        if (values.reauth_password !== "correct-password") {
          ctx.setErrors({ reauth_password: "Password does not match the active session." });
          return false;
        }
        return true;
      },
    });

    reauthModal.open();
    await wait(80);
    const lockedIdentifier = document.querySelector('input[name="account_email"]');
    assert(lockedIdentifier?.disabled === true, "reauth preset should render locked identifier field");
    reauthModal.setValues({ reauth_password: "wrong-password" });
    Array.from(document.querySelectorAll(".ui-modal-footer .ui-button")).find((button) => /continue/i.test(button.textContent || "")).click();
    await wait(180);
    const reauthError = document.querySelector('input[name="reauth_password"]')?.closest(".ui-form-modal-field")?.querySelector(".ui-form-modal-field-error");
    assert(reauthError?.textContent.includes("active session"), "reauth preset should render error on remapped password field");

    reauthModal.destroy();
    await wait(80);

    const reauthSuccessModal = createReauthFormModal({
      fields: {
        identifier: "account_email",
        password: "reauth_password",
      },
      identifierValue: "supervisor@pbb.ph",
      initialValues: {
        reauth_password: "correct-password",
      },
      async onSubmit() {
        await wait(80);
        return true;
      },
    });

    reauthSuccessModal.open();
    await wait(80);
    reauthSuccessModal.refs.form.requestSubmit();
    await wait(500);
    assert(document.querySelector(".ui-modal-root") === null, "reauth preset should close on successful native form submit");

    const statusModal = createStatusUpdateFormModal({
      fields: {
        status: "incident_status",
        remarks: "notes",
        notify: "notify_teams",
      },
      statusOptions: [
        { label: "Pending", value: "pending" },
        { label: "Resolved", value: "resolved" },
      ],
      initialValues: {
        incident_status: "pending",
        notes: "Awaiting team dispatch.",
        notify_teams: true,
      },
      async onSubmit() {
        await wait(80);
        return true;
      },
    });

    statusModal.open();
    await wait(80);
    const statusValues = statusModal.getValues();
    assert(statusValues.incident_status === "pending", "status preset should use remapped status field name");
    assert(statusValues.notes === "Awaiting team dispatch.", "status preset should use remapped remarks field name");
    assert(statusValues.notify_teams === true, "status preset should use remapped notify field name");

    statusModal.destroy();
    await wait(80);

    const statusSuccessModal = createStatusUpdateFormModal({
      fields: {
        status: "incident_status",
        remarks: "notes",
        notify: "notify_teams",
      },
      statusOptions: [
        { label: "Pending", value: "pending" },
        { label: "Resolved", value: "resolved" },
      ],
      initialValues: {
        incident_status: "resolved",
        notes: "Resolved by dispatch.",
        notify_teams: false,
      },
      async onSubmit() {
        await wait(80);
        return true;
      },
    });

    statusSuccessModal.open();
    await wait(80);
    statusSuccessModal.refs.form.requestSubmit();
    await wait(500);
    assert(document.querySelector(".ui-modal-root") === null, "status preset should close on successful native form submit");

    const reasonModal = createReasonFormModal({
      fields: {
        reasonCode: "cancel_reason",
        reasonDetails: "remarks",
        confirmText: "confirm_cancel",
      },
      reasonOptions: [
        { label: "Duplicate Record", value: "duplicate_record" },
        { label: "Operational Override", value: "operational_override" },
      ],
      confirmPhrase: "CANCEL",
      initialValues: {
        cancel_reason: "operational_override",
        remarks: "Unsafe current routing.",
        confirm_cancel: "WRONG",
      },
      async onSubmit(values, ctx) {
        await wait(80);
        if (values.confirm_cancel !== "CANCEL") {
          ctx.setErrors({ confirm_cancel: "Type CANCEL to confirm." });
          return false;
        }
        return true;
      },
    });

    reasonModal.open();
    await wait(80);
    Array.from(document.querySelectorAll(".ui-modal-footer .ui-button")).find((button) => /confirm/i.test(button.textContent || "")).click();
    await wait(180);
    const reasonValues = reasonModal.getValues();
    const reasonAlert = document.querySelector(".ui-form-modal-alert.is-danger");
    const confirmError = document.querySelector('input[name="confirm_cancel"]')?.closest(".ui-form-modal-field")?.querySelector(".ui-form-modal-field-error");
    const confirmInput = document.querySelector('input[name="confirm_cancel"]');
    assert(colorEquals(getComputedStyle(reasonAlert).color, expectedTextColor), "reason preset danger alert should use readable theme text color");
    assert(reasonValues.cancel_reason === "operational_override", "reason preset should use remapped reason field name");
    assert(reasonValues.remarks === "Unsafe current routing.", "reason preset should use remapped details field name");
    assert(reasonModal.getState().open === true, "reason preset should keep modal open when confirmation phrase is invalid");
    assert(Boolean(String(confirmError?.textContent || "").trim()), "reason preset should surface an error on the remapped confirmation field");
    assert(confirmInput?.getAttribute("aria-invalid") === "true", "reason preset should mark the remapped confirmation field invalid");

    reasonModal.destroy();
    await wait(80);

    const reasonSuccessModal = createReasonFormModal({
      fields: {
        reasonCode: "cancel_reason",
        reasonDetails: "remarks",
        confirmText: "confirm_cancel",
      },
      reasonOptions: [
        { label: "Duplicate Record", value: "duplicate_record" },
        { label: "Operational Override", value: "operational_override" },
      ],
      confirmPhrase: "CANCEL",
      initialValues: {
        cancel_reason: "duplicate_record",
        remarks: "Duplicate uplink mapping.",
        confirm_cancel: "CANCEL",
      },
      async onSubmit() {
        await wait(80);
        return true;
      },
    });

    reasonSuccessModal.open();
    await wait(80);
    reasonSuccessModal.refs.form.requestSubmit();
    await wait(500);
    assert(document.querySelector(".ui-modal-root") === null, "reason preset should close on successful native form submit");

    const reasonConditionalModal = createReasonFormModal({
      fields: {
        reasonCode: "cancel_reason",
        reasonDetails: "remarks",
      },
      reasonOptions: [
        { label: "Operational Override", value: "operational_override" },
        { label: "Other", value: "other" },
      ],
      detailsRequiredFor: ["other"],
      initialValues: {
        cancel_reason: "operational_override",
        remarks: "",
      },
      async onSubmit() {
        await wait(50);
        return true;
      },
    });

    reasonConditionalModal.open();
    await wait(80);
    reasonConditionalModal.refs.form.requestSubmit();
    await wait(500);
    assert(document.querySelector(".ui-modal-root") === null, "reason preset should allow empty details when the selected reason is not in detailsRequiredFor");

    const reasonConditionalRequiredModal = createReasonFormModal({
      fields: {
        reasonCode: "cancel_reason",
        reasonDetails: "remarks",
      },
      reasonOptions: [
        { label: "Operational Override", value: "operational_override" },
        { label: "Other", value: "other" },
      ],
      detailsRequiredFor: ["other"],
      initialValues: {
        cancel_reason: "other",
        remarks: "",
      },
      async onSubmit() {
        await wait(50);
        return true;
      },
    });

    reasonConditionalRequiredModal.open();
    await wait(80);
    reasonConditionalRequiredModal.refs.form.requestSubmit();
    await wait(180);
    const conditionalDetailsError = document.querySelector('textarea[name="remarks"]')?.closest(".ui-form-modal-field")?.querySelector(".ui-form-modal-field-error");
    assert(reasonConditionalRequiredModal.getState().open === true, "reason preset should stay open when conditional details are required and missing");
    assert(Boolean(String(conditionalDetailsError?.textContent || "").trim()), "reason preset should surface a details error when detailsRequiredFor matches the selected reason");

    reasonConditionalRequiredModal.destroy();
    await wait(80);

    const accountExtraActionCalls = [];
    let accountSubmitValues = null;
    const accountModal = createAccountFormModal({
      avatar: {
        previewUrl: avatarPreviewUrl,
      },
      fields: {
        avatar: "avatar_file",
        name: "display_name",
        email: "contact_email",
      },
      initialValues: {
        display_name: "Operator One",
        contact_email: "operator@pbb.ph",
        contact_number: "+63 917 123 4567",
      },
      extraRows: [
        [{ type: "text", content: "Keep contact details current for escalation routing." }],
        [{
          type: "input",
          input: "tel",
          name: "contact_number",
          label: "Contact Number",
        }],
      ],
      extraActionsPlacement: "start",
      extraActions: [{
        id: "change-password",
        label: "Change Password",
        onClick(values, _ctx, actionId) {
          accountExtraActionCalls.push({ values, actionId });
          return false;
        },
      }],
      async onSubmit(values) {
        accountSubmitValues = values;
        await wait(80);
        return true;
      },
    });

    accountModal.open();
    await wait(80);
    assert(Boolean(document.querySelector(".ui-form-modal-avatar-picker")), "account preset should render the helper-owned avatar picker when enabled");
    assert(document.querySelector(".ui-form-modal-avatar-image")?.hidden === false, "account preset avatar picker should show the current preview when previewUrl is provided");
    assert(Boolean(document.querySelector('input[name="display_name"]')), "account preset should render remapped name field");
    assert(Boolean(document.querySelector('input[name="contact_email"]')), "account preset should render remapped email field");
    assert(Boolean(document.querySelector('input[name="contact_number"]')), "account preset should append additive extra rows");
    const accountSplitAction = document.querySelector('.ui-action-modal-button.is-footer-split-start');
    assert((accountSplitAction?.textContent || "").includes("Change Password"), "account preset should support split start extra actions");
    accountSplitAction?.click();
    await wait(80);
    assert(accountExtraActionCalls.length === 1, "account preset should invoke extra action callback");
    assert(accountExtraActionCalls[0]?.values?.contact_email === "operator@pbb.ph", "account preset should pass current remapped values to extra actions");
    assert(accountExtraActionCalls[0]?.actionId === "change-password", "account preset should pass the extra action id to callbacks");
    assert(document.querySelector(".ui-modal-root") !== null, "account preset extra action should keep modal open by default");

    const avatarInput = document.querySelector(".ui-form-modal-avatar-input");
    const selectedAvatar = new File(["avatar"], "operator.png", { type: "image/png" });
    Object.defineProperty(avatarInput, "files", {
      configurable: true,
      value: [selectedAvatar],
    });
    avatarInput.dispatchEvent(new Event("change", { bubbles: true }));
    await wait(80);
    assert(accountModal.getValues().avatar_file instanceof File, "account preset should expose the selected avatar as a File in getValues()");
    assert(accountModal.getValues().avatar_file.name === "operator.png", "account preset should keep the selected avatar file metadata");
    accountModal.refs.form.requestSubmit();
    await wait(500);
    assert(accountSubmitValues?.avatar_file instanceof File, "account preset should include the selected avatar File in submit values");
    assert(accountSubmitValues?.avatar_file?.name === "operator.png", "account preset should submit the selected avatar file under the remapped field name");
    assert(document.querySelector(".ui-modal-root") === null, "account preset should close on successful submit after avatar selection");

    const changePasswordModal = createChangePasswordFormModal({
      fields: {
        currentPassword: "current_password",
        newPassword: "next_password",
        confirmPassword: "confirm_password",
      },
      initialValues: {
        current_password: "old-secret",
        next_password: "new-secret",
        confirm_password: "wrong-secret",
      },
      async onSubmit(values, ctx) {
        await wait(80);
        if (values.next_password !== values.confirm_password) {
          ctx.setErrors({ confirm_password: "Confirmation password does not match." });
          return false;
        }
        return true;
      },
    });

    changePasswordModal.open();
    await wait(80);
    assert(Boolean(document.querySelector('input[name="current_password"]')), "change-password preset should render remapped current password field");
    assert(Boolean(document.querySelector('input[name="next_password"]')), "change-password preset should render remapped new password field");
    assert(Boolean(document.querySelector('input[name="confirm_password"]')), "change-password preset should render remapped confirm password field");
    changePasswordModal.refs.form.requestSubmit();
    await wait(180);
    const confirmPasswordError = document.querySelector('input[name="confirm_password"]')?.closest(".ui-form-modal-field")?.querySelector(".ui-form-modal-field-error");
    assert((confirmPasswordError?.textContent || "").includes("does not match"), "change-password preset should surface confirm-password validation errors");

    changePasswordModal.destroy();
    await wait(80);

    const changePasswordSuccessModal = createChangePasswordFormModal({
      initialValues: {
        current_password: "old-secret",
        new_password: "new-secret",
        confirm_password: "new-secret",
      },
      async onSubmit() {
        await wait(80);
        return true;
      },
    });

    changePasswordSuccessModal.open();
    await wait(80);
    changePasswordSuccessModal.refs.form.requestSubmit();
    await wait(500);
    assert(document.querySelector(".ui-modal-root") === null, "change-password preset should close on successful native form submit");

    if (failures.length) {
      document.body.dataset.status = "fail";
      results.textContent = `FAIL\n${failures.map((line) => `- ${line}`).join("\n")}`;
    } else {
      document.body.dataset.status = "pass";
      results.textContent = "PASS";
    }

    function assert(condition, message) {
      if (!condition) {
        failures.push(message);
      }
    }

    function colorEquals(actual, expected) {
      return normalizeColor(actual) === normalizeColor(expected);
    }

    function normalizeColor(value) {
      const probe = document.createElement("span");
      probe.style.color = value;
      document.body.appendChild(probe);
      const normalized = getComputedStyle(probe).color;
      probe.remove();
      return normalized;
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
