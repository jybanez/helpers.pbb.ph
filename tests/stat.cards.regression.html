<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stat Cards Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.tokens.css">
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.icons.css">
  <link rel="stylesheet" href="../css/ui/ui.stat.cards.css">
  <style>
    body { margin: 0; padding: 16px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    #host { width: 720px; }
    #results { margin-top: 12px; white-space: pre-wrap; font-family: Consolas, "Courier New", monospace; font-size: 12px; }
  </style>
</head>
<body data-status="pending">
  <div id="host"></div>
  <pre id="results">Running...</pre>

  <script type="module">
    import { createStatCards } from "../js/ui/ui.stat.cards.js";

    const failures = [];
    const host = document.getElementById("host");
    const results = document.getElementById("results");
    const events = [];

    try {
      const cards = createStatCards(host, [
        {
          id: "risk",
          label: "People at Risk",
          value: 61,
          unit: "people",
          note: "Across 5 source hubs",
          detail: "Highest source: Apas, 20 people",
          icon: "population.people-at-risk",
          tone: "warning",
          trend: { direction: "up", label: "+12" },
          action: { label: "View population", value: "population" },
        },
        {
          id: "helped",
          label: "People Helped",
          value: 8,
          unit: "people",
          note: "Verified accomplishments",
          icon: "population.people-helped",
          tone: "success",
        },
      ], {
        ariaLabel: "SITREP metrics",
        columns: 2,
        selectable: true,
        selectedId: "helped",
        onSelect(item, meta) {
          events.push({ item, meta });
        },
      });

      let root = host.querySelector(".ui-stat-cards");
      assert(Boolean(root), "stat card root should render");
      assert(root.getAttribute("aria-label") === "SITREP metrics", "root should expose aria label");
      assert(root.dataset.columns === "2", "columns option should normalize to dataset");
      assert(root.classList.contains("ui-stat-cards--columns-2"), "columns class should render");
      assert(root.querySelectorAll(".ui-stat-card").length === 2, "cards should render item count");

      const risk = root.querySelector('[data-id="risk"]');
      const helped = root.querySelector('[data-id="helped"]');
      assert(risk?.tagName.toLowerCase() === "button", "selectable cards should render buttons");
      assert(risk?.classList.contains("ui-stat-card--warning"), "tone class should render");
      assert(risk?.querySelector('[data-icon="population.people-at-risk"]'), "icon should render through ui.icons");
      assert(risk?.querySelector(".ui-stat-card-value")?.textContent === "61", "numeric value should render");
      assert(risk?.querySelector(".ui-stat-card-unit")?.textContent === "people", "unit should render");
      assert(risk?.querySelector(".ui-stat-card-trend--up")?.textContent === "+12", "trend should render");
      assert(risk?.querySelector(".ui-stat-card-action")?.dataset.value === "population", "action metadata should render");
      assert(helped?.classList.contains("is-selected"), "selected card should render selected class");
      assert(helped?.getAttribute("aria-pressed") === "true", "selected interactive card should set aria-pressed");

      const rootRect = root.getBoundingClientRect();
      const riskRect = risk.getBoundingClientRect();
      assert(riskRect.right <= rootRect.right + 1, "card should stay inside root width");

      risk.click();
      root = host.querySelector(".ui-stat-cards");
      assert(events.length === 1 && events[0].item.id === "risk", "onSelect should receive selected item");
      assert(events[0].meta.id === "risk", "onSelect meta should include id");
      assert(root.querySelector('[data-id="risk"]')?.classList.contains("is-selected"), "click should update selected state");

      cards.update([
        { id: "records", label: "Current Records", value: 1245, icon: "assets.clipboard", tone: "info" },
      ], {
        columns: "auto",
        size: "sm",
        chrome: false,
        selectable: false,
        formatter(value) {
          return `${value} records`;
        },
      });
      root = host.querySelector(".ui-stat-cards");
      assert(root.classList.contains("ui-stat-cards--sm"), "size should update");
      assert(root.classList.contains("is-chrome-less"), "chrome false should render chrome-less class");
      assert(root.dataset.selectable === "false", "selectable false should update dataset");
      assert(root.querySelector(".ui-stat-card")?.tagName.toLowerCase() === "article", "non-selectable cards should render articles");
      assert(root.querySelector(".ui-stat-card-value")?.textContent === "1245 records", "formatter should render values");

      const state = cards.getState();
      assert(state.items.length === 1 && state.items[0].id === "records", "getState should expose normalized items");
      assert(state.options.chrome === false && state.options.size === "sm", "getState should expose normalized options");

      cards.setItems([]);
      assert(host.querySelector(".ui-stat-cards-empty")?.textContent === "No metrics to display.", "empty state should render");

      cards.destroy();
      assert(host.children.length === 0, "destroy should clear host");

      finish();
    } catch (error) {
      failures.push(error?.message || String(error));
      finish();
    }

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message);
      }
    }

    function finish() {
      const passed = failures.length === 0;
      document.body.dataset.status = passed ? "pass" : "fail";
      results.textContent = `${passed ? "PASS" : "FAIL"}\n${passed ? "Stat cards regression test passed." : failures.join("\n")}`;
    }
  </script>
</body>
</html>
