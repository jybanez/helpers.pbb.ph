<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form Modal Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.modal.css">
  <link rel="stylesheet" href="../css/ui/ui.form.modal.css">
  <link rel="stylesheet" href="../css/ui/ui.select.css">
  <link rel="stylesheet" href="../css/ui/ui.tree.select.css">
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    #results {
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body data-status="pending">
  <pre id="results">Running...</pre>

  <script type="module">
    import { createFormModal } from "../js/ui/ui.form.modal.js";

    const results = document.getElementById("results");
    const failures = [];

    const loginModal = createFormModal({
      title: "Login",
      busyMessage: "Signing in...",
      submitLabel: "Login",
      rows: [
        [{ type: "input", input: "email", name: "email", label: "Email", value: "operator@pbb.ph", required: true }],
        [{ type: "input", input: "password", name: "password", label: "Password", value: "", required: true }],
      ],
      async onSubmit(values, ctx) {
        await wait(80);
        if (values.password !== "correct-password") {
          ctx.setErrors({ password: "Invalid password." });
          return false;
        }
        return true;
      },
    });

    loginModal.open();
    await wait(80);

    const getPasswordInput = () => document.querySelector('input[name="password"]');
    const getPrimaryButton = () => Array.from(document.querySelectorAll(".ui-modal-footer .ui-button")).find((button) => /login|submit|save/i.test(button.textContent || ""));
    const getPasswordError = () => {
      const field = getPasswordInput()?.closest(".ui-form-modal-field");
      return field?.querySelector(".ui-form-modal-field-error");
    };

    getPrimaryButton().click();
    await wait(120);

    assert(loginModal.getState().open === true, "required validation should keep modal open");
    assert(getPasswordError()?.textContent.includes("required"), "required validation should render field error");
    assert(document.activeElement === getPasswordInput(), "first invalid field should receive focus");

    loginModal.setValues({ password: "wrong-password" });
    getPrimaryButton().click();
    await wait(180);

    assert(loginModal.getState().open === true, "falsy submit result should keep modal open");
    assert(getPasswordError()?.textContent.includes("Invalid password."), "app-supplied field error should render");

    loginModal.destroy();
    await wait(80);
    assert(document.querySelector(".ui-modal-root") === null, "destroy should remove login modal from DOM");

    const crudModal = createFormModal({
      title: "Create User",
      busyMessage: "Saving user...",
      submitLabel: "Save User",
      rows: [
        [{ type: "input", input: "email", name: "email", label: "Email", value: "exists@pbb.ph", required: true }],
        [{
          type: "select",
          name: "role",
          label: "Role",
          value: "operator",
          options: [
            { label: "Operator", value: "operator" },
            { label: "Admin", value: "admin" },
          ],
        }],
      ],
      async onSubmit(values, ctx) {
        await wait(80);
        if (values.email === "exists@pbb.ph") {
          ctx.setFormError("Unable to save record.");
          return false;
        }
        return true;
      },
    });

    crudModal.open();
    await wait(80);
    Array.from(document.querySelectorAll(".ui-modal-footer .ui-button")).find((button) => /save/i.test(button.textContent || "")).click();
    await wait(180);

    const formError = document.querySelector(".ui-form-modal-form-error");
    assert(crudModal.getState().open === true, "form-level error should keep modal open");
    assert(formError && formError.hidden === false, "form-level error should be visible");
    assert(formError.textContent.includes("Unable to save record."), "form-level error should render helper-supplied text");

    crudModal.destroy();
    await wait(80);
    assert(document.querySelector(".ui-modal-root") === null, "destroy should remove CRUD modal from DOM");

    const successModal = createFormModal({
      title: "Create Mapping",
      busyMessage: "Creating mapping...",
      submitLabel: "Create",
      rows: [
        [{ type: "input", input: "text", name: "barangayCode", label: "Barangay Code", value: "072217001", required: true }],
      ],
      async onSubmit() {
        await wait(80);
        return true;
      },
    });

    successModal.open();
    await wait(80);
    Array.from(document.querySelectorAll(".ui-modal-footer .ui-button")).find((button) => /create/i.test(button.textContent || "")).click();
    await wait(500);

    assert(document.querySelector(".ui-modal-root") === null, "truthy submit should close and remove modal root");

    let changePasswordClicks = 0;
    let busyExtraClicks = 0;

    const accountModal = createFormModal({
      title: "Account",
      submitLabel: "Save",
      extraActionsPlacement: "start",
      rows: [
        [{ type: "input", input: "text", name: "display_name", label: "Display Name", value: "Operator One", required: true }],
      ],
      extraActions: [
        {
          id: "change-password",
          label: "Change Password",
          variant: "ghost",
          onClick(values, ctx) {
            changePasswordClicks += 1;
            assert(values.display_name === "Operator One", "extraActions should receive current form values");
            assert(ctx.actionId === "change-password", "extraActions context should expose actionId");
            return false;
          },
        },
      ],
      async onSubmit() {
        await wait(50);
        return false;
      },
    });

    accountModal.open();
    await wait(80);

    const getFooterLabels = () => Array.from(document.querySelectorAll(".ui-modal-footer .ui-button .ui-action-modal-button-label")).map((node) => node.textContent.trim());
    const findFooterButton = (label) => Array.from(document.querySelectorAll(".ui-modal-footer .ui-button")).find((button) => button.textContent.includes(label));

    assert(
      JSON.stringify(getFooterLabels()) === JSON.stringify(["Change Password", "Cancel", "Save"]),
      "extraActions should render before helper-owned Cancel and Submit actions",
    );
    assert(
      findFooterButton("Change Password")?.classList.contains("is-footer-split-start"),
      "extraActionsPlacement: start should split extra actions from helper-owned Cancel and Submit buttons",
    );

    findFooterButton("Change Password").click();
    await wait(100);

    assert(changePasswordClicks === 1, "extraActions onClick should run");
    assert(accountModal.getState().open === true, "extraActions should not close by default");

    accountModal.destroy();
    await wait(80);
    assert(document.querySelector(".ui-modal-root") === null, "destroy should remove extra-actions modal from DOM");

    const busyExtraModal = createFormModal({
      title: "Busy Extra Actions",
      submitLabel: "Save",
      rows: [
        [{ type: "input", input: "text", name: "name", label: "Name", value: "Operator One", required: true }],
      ],
      extraActions: [
        {
          id: "change-password",
          label: "Change Password",
          variant: "ghost",
          onClick() {
            busyExtraClicks += 1;
            return false;
          },
        },
      ],
      async onSubmit() {
        await wait(600);
        return true;
      },
    });

    busyExtraModal.open();
    await wait(80);
    findFooterButton("Save").click();
    await wait(120);

    const busyExtraButton = findFooterButton("Change Password");
    assert(busyExtraModal.isBusy() === true, "submit should place form modal into busy state");
    assert(busyExtraButton?.hasAttribute("disabled"), "extraActions should disable during helper-owned busy state");

    busyExtraButton?.click();
    await wait(80);
    assert(busyExtraClicks === 0, "disabled extraActions should not run during busy state");

    await wait(900);
    assert(busyExtraModal.getState().open === false, "truthy busy submit should close the busy extra-actions modal");
    assert(document.querySelector(".ui-modal-root") === null, "truthy busy submit should close and remove modal root");

    const keyboardSubmitModal = createFormModal({
      title: "Keyboard Submit",
      busyMessage: "Signing in...",
      submitLabel: "Login",
      rows: [
        [{ type: "input", input: "email", name: "email", label: "Email", value: "operator@pbb.ph", required: true }],
        [{ type: "input", input: "password", name: "password", label: "Password", value: "correct-password", required: true }],
      ],
      async onSubmit() {
        await wait(80);
        return true;
      },
    });

    keyboardSubmitModal.open();
    await wait(80);
    keyboardSubmitModal.refs.form.requestSubmit();
    await wait(500);

    assert(document.querySelector(".ui-modal-root") === null, "truthy native form submit should also close and remove modal root");

    const hubModal = createFormModal({
      title: "Edit Hub",
      mode: "edit",
      submitLabel: "Save Hub",
      context: {
        badge: "CITY",
        summary: "Philippines / Region VII / Cebu / Cebu City",
      },
      rows: [
        [{
          type: "display",
          name: "locationSummary",
          label: "Location",
          span: 2,
        }],
        [
          {
            type: "input",
            input: "text",
            name: "hub_name",
            label: "Hub Name",
            readonlyOn: ["edit"],
          },
          {
            type: "input",
            input: "text",
            name: "token",
            label: "Token",
            requiredOn: ["create"],
            hiddenOn: ["edit"],
          },
        ],
        [{ type: "hidden", name: "generated_name", value: "CEBU CITY, CEBU" }],
        [{ type: "input", input: "text", name: "domain", label: "Domain", value: "city-cebu.pbb.ph", span: 2, required: true }],
      ],
      initialValues: {
        locationSummary: "CEBU CITY, CEBU",
        hub_name: "CEBU CITY, CEBU",
      },
      async onSubmit() {
        await wait(50);
        return false;
      },
    });

    hubModal.open();
    await wait(100);

    const getLocationDisplay = () => Array.from(document.querySelectorAll(".ui-form-modal-display-value")).find((node) => node.textContent.includes("CEBU CITY"));
    const getContextStrip = () => document.querySelector(".ui-form-modal-context");
    const getHiddenGeneratedName = () => document.querySelector('input[type="hidden"][name="generated_name"]');
    const getTokenInput = () => document.querySelector('input[name="token"]');
    const getDomainField = () => document.querySelector('input[name="domain"]')?.closest(".ui-form-modal-field");
    const getHubNameInput = () => document.querySelector('input[name="hub_name"]');
    const getRenderedRows = () => Array.from(document.querySelectorAll(".ui-form-modal-rows > .ui-form-modal-row"));

    assert(hubModal.getState().mode === "edit", "getState should expose current mode");
    assert(getContextStrip()?.textContent.includes("Philippines / Region VII / Cebu / Cebu City"), "context option should render top-level summary strip");
    assert(Boolean(getLocationDisplay()), "display item should render visible context text");
    assert(Boolean(getHiddenGeneratedName()), "hidden item should render hidden input");
    assert(hubModal.getValues().generated_name === "CEBU CITY, CEBU", "hidden item should participate in getValues");
    assert(getTokenInput() === null, "hiddenOn should omit the field in edit mode");
    assert(getHubNameInput()?.hasAttribute("readonly"), "readonlyOn should set readonly in edit mode");
    assert(getDomainField()?.classList.contains("is-span-2"), "span: 2 should apply full-width field class");
    assert(getRenderedRows().length === 3, "hidden-only rows should not render empty visible rows");

    hubModal.update({ mode: "create" });
    await wait(100);

    const tokenInputAfterUpdate = getTokenInput();
    assert(hubModal.getState().mode === "create", "update should apply new mode");
    assert(Boolean(tokenInputAfterUpdate), "hiddenOn field should render when mode changes");
    assert(tokenInputAfterUpdate?.hasAttribute("required"), "requiredOn should mark field required in create mode");
    assert(getRenderedRows().length === 3, "hidden-only rows should stay collapsed even when another field in an existing row becomes visible");

    hubModal.destroy();
    await wait(80);
    assert(document.querySelector(".ui-modal-root") === null, "destroy should remove mode/rules modal from DOM");

    let conditionalSubmitValues = null;
    const conditionalModal = createFormModal({
      title: "Conditional Fields",
      submitLabel: "Save",
      rows: [
        [{
          type: "select",
          name: "input_type",
          label: "Input Type",
          value: "text",
          options: [
            { label: "Text", value: "text" },
            { label: "Number", value: "number" },
            { label: "Select", value: "select" },
          ],
        }],
        [{
          type: "input",
          input: "text",
          name: "default_value",
          label: "Default Value",
          value: "Alpha",
          visibleWhen: { input_type: ["text", "number"] },
        }],
        [{
          type: "input",
          input: "number",
          name: "min",
          label: "Min",
          required: true,
          visibleWhen: { input_type: "number" },
        }],
        [{
          type: "textarea",
          name: "options_text",
          label: "Options",
          visibleWhen: { input_type: "select" },
        }],
      ],
      async onSubmit(values) {
        conditionalSubmitValues = values;
        await wait(20);
        return false;
      },
    });

    conditionalModal.open();
    await wait(100);

    const getConditionalInputType = () => document.querySelector('select[name="input_type"]');
    const getConditionalDefaultValue = () => document.querySelector('input[name="default_value"]');
    const getConditionalMin = () => document.querySelector('input[name="min"]');
    const getConditionalOptions = () => document.querySelector('textarea[name="options_text"]');
    const conditionalSaveButton = () => Array.from(document.querySelectorAll(".ui-modal-footer .ui-button")).find((button) => /save/i.test(button.textContent || ""));

    assert(Boolean(getConditionalDefaultValue()), "visibleWhen array rules should render matching dependent fields");
    assert(getConditionalMin() === null, "visibleWhen exact-match rules should hide non-matching fields");
    assert(getConditionalOptions() === null, "visibleWhen should hide unrelated fields");
    assert(!Object.prototype.hasOwnProperty.call(conditionalModal.getValues(), "min"), "hidden visibleWhen fields should be omitted from getValues");

    getConditionalInputType().value = "number";
    getConditionalInputType().dispatchEvent(new Event("change", { bubbles: true }));
    await wait(100);

    assert(Boolean(getConditionalMin()), "changing the controlling field should re-render newly visible fields");
    getConditionalMin().value = "5";
    getConditionalMin().dispatchEvent(new Event("input", { bubbles: true }));
    await wait(60);

    getConditionalInputType().value = "text";
    getConditionalInputType().dispatchEvent(new Event("change", { bubbles: true }));
    await wait(100);

    assert(getConditionalMin() === null, "visibleWhen-hidden fields should disappear when the rule stops matching");
    assert(!Object.prototype.hasOwnProperty.call(conditionalModal.getValues(), "min"), "visibleWhen-hidden fields should stay out of submit values");

    conditionalSaveButton()?.click();
    await wait(120);
    assert(!Object.prototype.hasOwnProperty.call(conditionalSubmitValues || {}, "min"), "submit values should omit fields hidden by visibleWhen");

    getConditionalInputType().value = "number";
    getConditionalInputType().dispatchEvent(new Event("change", { bubbles: true }));
    await wait(100);

    assert(getConditionalMin()?.value === "5", "visibleWhen-hidden fields should restore their previous value when shown again");

    getConditionalInputType().value = "select";
    getConditionalInputType().dispatchEvent(new Event("change", { bubbles: true }));
    await wait(100);

    assert(Boolean(getConditionalOptions()), "visibleWhen array rules should render alternate matching fields");
    assert(getConditionalDefaultValue() === null, "fields hidden by visibleWhen should be removed from the DOM");

    conditionalModal.destroy();
    await wait(80);
    assert(document.querySelector(".ui-modal-root") === null, "destroy should remove conditional-visibility modal from DOM");

    const apiErrorsModal = createFormModal({
      title: "API Error Mapping",
      submitLabel: "Save",
      rows: [
        [{ type: "input", input: "text", name: "domain", label: "Domain", value: "city-cebu.pbb.ph", required: true }],
      ],
      async onSubmit(_values, ctx) {
        await wait(50);
        ctx.applyApiErrors({
          errors: {
            domain: ["Domain already exists."],
            _form: "Unable to save record.",
          },
        });
        return false;
      },
    });

    apiErrorsModal.open();
    await wait(80);
    Array.from(document.querySelectorAll(".ui-modal-footer .ui-button")).find((button) => /save/i.test(button.textContent || "")).click();
    await wait(180);

    const mappedFieldError = document.querySelector('input[name="domain"]')?.closest(".ui-form-modal-field")?.querySelector(".ui-form-modal-field-error");
    const mappedFormError = document.querySelector(".ui-form-modal-form-error");
    assert(apiErrorsModal.getState().open === true, "applyApiErrors should keep modal open when submit returns false");
    assert(mappedFieldError?.textContent.includes("Domain already exists."), "applyApiErrors should map backend field errors");
    assert(mappedFormError?.textContent.includes("Unable to save record."), "applyApiErrors should map backend form error");

    apiErrorsModal.destroy();
    await wait(80);
    assert(document.querySelector(".ui-modal-root") === null, "destroy should remove API error mapping modal from DOM");

    const uplinkModal = createFormModal({
      title: "Add Uplink",
      submitLabel: "Save Uplink",
      rows: [
        [{
          type: "ui.select",
          name: "uplink_hub_ids",
          label: "Uplinks",
          searchable: true,
          multiple: true,
          closeOnSelect: false,
          options: [
            { label: "CEBU CITY CORE", value: "hub-cebu-city" },
            { label: "MANDAUE CITY CORE", value: "hub-mandaue-city" },
            { label: "LAPU-LAPU CITY CORE", value: "hub-lapu-lapu-city" },
          ],
          required: true,
        }],
      ],
      async onSubmit() {
        await wait(50);
        return false;
      },
    });

    uplinkModal.open();
    await wait(100);

    const getUplinkField = () => document.querySelector(".ui-form-modal-field.is-ui-select");
    const getUplinkTrigger = () => getUplinkField()?.querySelector(".ui-select-trigger");
    const getUplinkError = () => getUplinkField()?.querySelector(".ui-form-modal-field-error");
    uplinkModal.setErrors({ uplink_hub_ids: "Select at least one uplink." });
    await wait(80);
    assert(getUplinkError()?.textContent.includes("Select at least one uplink."), "ui.select should render helper-applied field error");
    assert(getUplinkTrigger()?.getAttribute("aria-invalid") === "true", "ui.select trigger should receive aria-invalid on helper error");

    getUplinkTrigger()?.click();
    await wait(80);
    const floatingMenu = document.querySelector(".ui-select-menu");
    assert(Boolean(floatingMenu), "ui.select should render an open menu");
    assert(floatingMenu?.parentElement === document.body, "ui.select menu should mount at document.body to avoid modal clipping");
    getUplinkTrigger()?.click();
    await wait(80);

    uplinkModal.setValues({ uplink_hub_ids: ["hub-cebu-city"] });
    await wait(80);
    const uplinkValues = uplinkModal.getValues();
    assert(Array.isArray(uplinkValues.uplink_hub_ids) && uplinkValues.uplink_hub_ids.length === 1, "ui.select should participate in getValues with selected values");

    uplinkModal.clearErrors();
    uplinkModal.refs.formError.hidden = true;
    uplinkModal.refs.formError.textContent = "";
    const mapped = uplinkModal.applyApiErrors({
      errors: {
        "uplink_hub_ids.0": ["Selected uplink is already attached to this hub."],
      },
    });
    await wait(80);
    assert(mapped.fieldErrors["uplink_hub_ids.0"]?.includes("already attached"), "applyApiErrors should preserve dotted backend keys in the mapped response");
    assert(getUplinkError()?.textContent.includes("already attached"), "applyApiErrors should map dotted backend keys onto the base ui.select field");

    uplinkModal.destroy();
    await wait(80);
    assert(document.querySelector(".ui-modal-root") === null, "destroy should remove ui.select integration modal from DOM");

    const resourceModal = createFormModal({
      title: "Assign Resource",
      submitLabel: "Save Resource",
      rows: [
        [{
          type: "ui.treeSelect",
          name: "resource_type_id",
          label: "Resource",
          searchable: true,
          options: [
            {
              id: "medical",
              label: "Medical",
              children: [
                { id: "ambulance", label: "Ambulance" },
                { id: "triage", label: "Triage Nurse" },
              ],
            },
            {
              id: "fire",
              label: "Fire Response",
              children: [
                { id: "engine", label: "Fire Engine" },
                { id: "rescue", label: "Rescue Truck" },
              ],
            },
          ],
          required: true,
        }],
      ],
      async onSubmit() {
        await wait(50);
        return false;
      },
    });

    resourceModal.open();
    await wait(100);

    const getResourceField = () => document.querySelector(".ui-form-modal-field.is-ui-treeselect");
    const getResourceTrigger = () => getResourceField()?.querySelector(".ui-tree-select-trigger");
    const getResourceError = () => getResourceField()?.querySelector(".ui-form-modal-field-error");
    resourceModal.setErrors({ resource_type_id: "Select one resource." });
    await wait(80);
    assert(getResourceError()?.textContent.includes("Select one resource."), "ui.treeSelect should render helper-applied field error");
    assert(getResourceTrigger()?.getAttribute("aria-invalid") === "true", "ui.treeSelect trigger should receive aria-invalid on helper error");

    getResourceTrigger()?.click();
    await wait(80);
    const floatingTreeMenu = document.querySelector(".ui-tree-select-menu");
    const modalRoot = document.querySelector(".ui-modal-root");
    assert(Boolean(floatingTreeMenu), "ui.treeSelect should render an open menu");
    assert(floatingTreeMenu?.parentElement === document.body, "ui.treeSelect menu should mount at document.body to avoid modal clipping");
    assert(
      Number.parseInt(window.getComputedStyle(floatingTreeMenu).zIndex || "0", 10) > Number.parseInt(window.getComputedStyle(modalRoot).zIndex || "0", 10),
      "ui.treeSelect menu should layer above the modal root z-index",
    );

    const resourceSearch = document.querySelector(".ui-tree-select-search");
    resourceSearch.value = "ambu";
    resourceSearch.dispatchEvent(new Event("input", { bubbles: true }));
    await wait(80);
    const ambulanceOption = Array.from(document.querySelectorAll(".ui-tree-select-option")).find((node) => node.textContent.includes("Ambulance"));
    ambulanceOption?.click();
    await wait(80);

    const resourceValues = resourceModal.getValues();
    assert(resourceValues.resource_type_id === "ambulance", "ui.treeSelect should participate in getValues with the selected leaf value");
    assert(getResourceTrigger()?.textContent.includes("Medical / Ambulance"), "ui.treeSelect trigger should show the selected path");

    resourceModal.destroy();
    await wait(80);
    assert(document.querySelector(".ui-modal-root") === null, "destroy should remove ui.treeSelect integration modal from DOM");

    if (failures.length) {
      document.body.dataset.status = "fail";
      results.textContent = `FAIL\n${failures.map((line) => `- ${line}`).join("\n")}`;
    } else {
      document.body.dataset.status = "pass";
      results.textContent = "PASS";
    }

    function assert(condition, message) {
      if (!condition) {
        failures.push(message);
      }
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
