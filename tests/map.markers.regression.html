<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map Markers Regression Test</title>
  <link rel="stylesheet" href="../css/ui/ui.tokens.css">
  <link rel="stylesheet" href="../css/ui/ui.components.css">
  <link rel="stylesheet" href="../css/ui/ui.icons.css">
  <link rel="stylesheet" href="../css/ui/ui.map.markers.css">
  <style>
    body { margin: 0; padding: 16px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    #host { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
    #results { margin-top: 12px; white-space: pre-wrap; font-family: Consolas, "Courier New", monospace; font-size: 12px; }
  </style>
</head>
<body data-status="pending">
  <div id="host"></div>
  <pre id="results">Running...</pre>

  <script type="module">
    import { createMapMarker, createMapClusterMarker, getMapMarkerClass } from "../js/ui/ui.map.markers.js";

    const failures = [];
    const host = document.getElementById("host");
    const results = document.getElementById("results");

    try {
      assert(!("maplibregl" in window), "test should not provide MapLibre globals");
      assert(typeof createMapMarker === "function", "createMapMarker should export");
      assert(typeof createMapClusterMarker === "function", "createMapClusterMarker should export");
      assert(typeof getMapMarkerClass === "function", "getMapMarkerClass should export");

      const marker = createMapMarker({
        id: "incident-123",
        type: "incident",
        tone: "warning",
        icon: "hazard.flood",
        label: "Flood incident",
        count: 3,
        selected: true,
        active: true,
        pulse: true,
        size: "lg",
        meta: { source: "test" },
      });
      host.appendChild(marker);
      assert(marker instanceof HTMLElement, "createMapMarker should return HTMLElement");
      assert(marker.dataset.id === "incident-123", "id dataset should render");
      assert(marker.dataset.markerId === "incident-123", "markerId dataset should render");
      assert(marker.dataset.type === "incident", "type dataset should render");
      assert(marker.dataset.shape === "pin", "incident should default to pin shape");
      assert(marker.dataset.tone === "warning", "tone dataset should render");
      assert(marker.dataset.selected === "true", "selected dataset should render");
      assert(marker.dataset.active === "true", "active dataset should render");
      assert(marker.dataset.pulse === "true", "pulse dataset should render");
      assert(marker.classList.contains("ui-map-marker--lg"), "size class should render");
      assert(marker.classList.contains("is-selected"), "selected class should render");
      assert(marker.classList.contains("is-active"), "active class should render");
      assert(marker.classList.contains("is-pulsing"), "pulse class should render");
      assert(marker.getAttribute("role") === "img", "marker should expose image role");
      assert(marker.getAttribute("aria-label") === "Flood incident", "marker should expose accessible label");
      assert(marker.querySelector('[data-icon="hazard.flood"]'), "marker should render icon");
      assert(marker.querySelector(".ui-map-marker-count")?.textContent === "3", "marker count should render");
      assert(marker.__uiMapMarker?.meta?.source === "test", "marker metadata should be retained");

      const markerTypes = [
        ["source-hub", "hub"],
        ["target-hub", "hub"],
        ["hotspot", "hotspot"],
        ["route", "route"],
        ["boundary-centroid", "hub"],
      ];
      markerTypes.forEach(([type, shape]) => {
        const node = createMapMarker({ type, tone: "info", label: `${type} marker` });
        host.appendChild(node);
        assert(node.dataset.type === type, `${type} marker should preserve type`);
        assert(node.dataset.shape === shape, `${type} marker should default to ${shape}`);
        assert(node.querySelector(`.ui-map-marker-shape--${shape}`), `${type} marker should render ${shape} shape`);
      });

      const custom = createMapMarker({
        type: "incident",
        shape: "dot",
        tone: "success",
        muted: true,
        color: "rgb(10, 200, 120)",
        label: "Custom dot",
      });
      host.appendChild(custom);
      assert(custom.dataset.shape === "dot", "custom shape should render");
      assert(custom.classList.contains("is-muted"), "muted class should render");
      assert(custom.style.getPropertyValue("--ui-map-marker-color") === "rgb(10, 200, 120)", "custom color CSS variable should render");

      const cluster = createMapClusterMarker({
        count: 14,
        tone: "critical",
        label: "14 incidents",
        selected: true,
        active: true,
      });
      host.appendChild(cluster);
      assert(cluster.dataset.shape === "cluster", "cluster marker should use cluster shape");
      assert(cluster.classList.contains("ui-map-marker--cluster"), "cluster class should render");
      assert(cluster.querySelector(".ui-map-marker-count")?.textContent === "14", "cluster count should render");
      assert(cluster.getAttribute("aria-label") === "14 incidents", "cluster accessible label should render");

      const className = getMapMarkerClass({ type: "route", tone: "danger", size: "sm", active: true });
      assert(className.includes("ui-map-marker--route"), "getMapMarkerClass should include type class");
      assert(className.includes("ui-map-marker--danger"), "getMapMarkerClass should include tone class");
      assert(className.includes("ui-map-marker--sm"), "getMapMarkerClass should include size class");
      assert(className.includes("is-active"), "getMapMarkerClass should include active class");

      finish();
    } catch (error) {
      failures.push(error?.message || String(error));
      finish();
    }

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message);
      }
    }

    function finish() {
      const passed = failures.length === 0;
      document.body.dataset.status = passed ? "pass" : "fail";
      results.textContent = `${passed ? "PASS" : "FAIL"}\n${passed ? "Map markers regression test passed." : failures.join("\n")}`;
    }
  </script>
</body>
</html>
