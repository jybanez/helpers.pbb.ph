<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheduler Demo</title>
  <link rel="stylesheet" href="./css/ui/ui.tokens.css">
  <link rel="stylesheet" href="./css/ui/ui.components.css">
  <link rel="stylesheet" href="./css/ui/ui.scheduler.css">
  <style>
    body { margin: 0; padding: 24px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .page { max-width: 1200px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid #263146; border-radius: 10px; background: #111826; padding: 14px; display: grid; gap: 10px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .back { color: #b2c2e5; text-decoration: none; font-size: 13px; }
    #host { border: 1px solid #2b3750; border-radius: 8px; padding: 10px; background: #0b1220; }
    .log { margin: 0; white-space: pre-wrap; font-size: 12px; color: #b2c2e5; font-family: Consolas, "Courier New", monospace; border: 1px solid #2b3750; border-radius: 8px; background: #0b1220; padding: 10px; height: 220px; overflow: auto; }
  </style>
</head>
<body>
  <main class="page" data-theme="dark">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">← Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
      </div>
      <h1 class="ui-title">Scheduler Demo</h1>
      <p>Month and week calendar primitives with event/slot callbacks.</p>
    </section>

    <section class="panel">
      <div id="host"></div>
    </section>

    <section class="panel">
      <h2 class="ui-title">Event Log</h2>
      <pre id="log" class="log">No events yet.</pre>
    </section>
  </main>
  <script type="module">
    import { createScheduler } from "./js/ui/ui.scheduler.js";

    const page = document.querySelector("main.page");
    const log = document.getElementById("log");
    const now = new Date();
    const pad = (value) => String(value).padStart(2, "0");
    const dateAt = (days, hour = 9, minute = 0) => {
      const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() + days, hour, minute, 0, 0);
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:00`;
    };

    function writeLog(label, payload) {
      const line = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(payload ?? {}, null, 2)}\n`;
      log.textContent = log.textContent === "No events yet." ? line : `${line}\n${log.textContent}`;
    }

    const scheduler = createScheduler(document.getElementById("host"), {
      date: now,
      events: [
        { id: "e-1", title: "Morning Briefing", start: dateAt(-1, 8, 30), color: "#4f89ff" },
        { id: "e-2", title: "Responder Dispatch", start: dateAt(0, 10, 0), color: "#2abf7b" },
        { id: "e-3", title: "Operator Training", start: dateAt(2, 14, 0), color: "#ffb347" },
        { id: "e-4", title: "Resource Audit", start: dateAt(3, 16, 0), color: "#ff6a89" },
      ],
    }, {
      view: "month",
      weekStartsOn: 1,
      onViewChange(view) {
        writeLog("scheduler.view", { view });
      },
      onDateChange(date) {
        writeLog("scheduler.date", { date: date.toISOString() });
      },
      onSlotClick(slot) {
        writeLog("scheduler.slot", { date: slot.date.toISOString(), view: slot.view });
      },
      onEventClick(entry) {
        writeLog("scheduler.event", { id: entry.id, title: entry.title, start: entry.start.toISOString() });
      },
    });

    window.schedulerDemo = { scheduler };
    document.getElementById("themeToggle").addEventListener("click", () => {
      const next = page.dataset.theme === "dark" ? "light" : "dark";
      page.dataset.theme = next;
      writeLog("theme.toggle", { theme: next });
    });
  </script>
</body>
</html>
