<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Inspector Demo</title>
  <link rel="stylesheet" href="./css/ui/ui.tokens.css">
  <link rel="stylesheet" href="./css/ui/ui.components.css">
  <link rel="stylesheet" href="./css/ui/ui.data.inspector.css">
  <style>
    body { margin: 0; padding: 24px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .page { max-width: 1100px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid #263146; border-radius: 10px; background: #111826; padding: 14px; display: grid; gap: 10px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .back { color: #b2c2e5; text-decoration: none; font-size: 13px; }
    #host { border: 1px solid #2b3750; border-radius: 8px; padding: 10px; background: #0b1220; }
    .log { margin: 0; white-space: pre-wrap; font-size: 12px; color: #b2c2e5; font-family: Consolas, "Courier New", monospace; border: 1px solid #2b3750; border-radius: 8px; background: #0b1220; padding: 10px; height: 220px; overflow: auto; }
  </style>
</head>
<body>
  <main class="page" data-theme="dark">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">← Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
        <button id="loadIncidentBtn" class="ui-button" type="button">Load Incident Payload</button>
        <button id="loadUiStateBtn" class="ui-button" type="button">Load UI State Payload</button>
      </div>
      <h1 class="ui-title">Data Inspector Demo</h1>
    </section>
    <section class="panel">
      <div id="host"></div>
    </section>
    <section class="panel">
      <h2 class="ui-title">Event Log</h2>
      <pre id="log" class="log">No events yet.</pre>
    </section>
  </main>
  <script type="module">
    import { createDataInspector } from "./js/ui/ui.data.inspector.js";

    const page = document.querySelector("main.page");
    const host = document.getElementById("host");
    const log = document.getElementById("log");
    function writeLog(label, payload) {
      const line = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(payload ?? {}, null, 2)}\n`;
      log.textContent = log.textContent === "No events yet." ? line : `${line}\n${log.textContent}`;
    }

    const samples = {
      incident: {
        id: 16,
        status: "active",
        caller: { id: 11, name: "Maria Santos", mobile: "+63..." },
        team_assignments: [{ id: 20, team_id: 3, status: "en_route" }],
      },
      uiState: {
        theme: "dark",
        route: "/incidents/16",
        filters: { status: ["active", "pending"], search: "fire" },
        pagination: { page: 3, perPage: 20, total: 468 },
      },
    };

    const inspector = createDataInspector(host, samples.incident, {
      expandDepth: 2,
      onCopyPath(path) {
        writeLog("inspector.copyPath", { path });
      },
    });

    document.getElementById("loadIncidentBtn").addEventListener("click", () => {
      inspector.update(samples.incident);
      writeLog("inspector.update", { sample: "incident" });
    });
    document.getElementById("loadUiStateBtn").addEventListener("click", () => {
      inspector.update(samples.uiState);
      writeLog("inspector.update", { sample: "uiState" });
    });
    document.getElementById("themeToggle").addEventListener("click", () => {
      const next = page.dataset.theme === "dark" ? "light" : "dark";
      page.dataset.theme = next;
      writeLog("theme.toggle", { theme: next });
    });
  </script>
</body>
</html>
